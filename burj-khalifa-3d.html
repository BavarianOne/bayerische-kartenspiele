<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏗️ Burj Khalifa 3D — Photorealistic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  canvas { display: block; }

  #ui-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
    display: flex; flex-direction: column;
  }

  #top-bar {
    pointer-events: auto;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 22px;
    background: linear-gradient(180deg, rgba(5,5,20,0.9) 0%, transparent 100%);
  }

  #title {
    color: #f0e8d0; font-size: 1.2rem; font-weight: 700;
    letter-spacing: 0.5px; text-shadow: 0 0 30px rgba(200,170,100,0.2);
  }
  #title span { color: #c9a84c; }

  #controls-row {
    pointer-events: auto;
    display: flex; gap: 8px; align-items: center;
  }

  .ctrl-btn {
    pointer-events: auto;
    padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    background: rgba(255,255,255,0.06); color: #c0b8a0;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    backdrop-filter: blur(12px); transition: all 0.25s;
    display: flex; align-items: center; gap: 6px;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.2); }
  .ctrl-btn.active { background: rgba(201,168,76,0.2); color: #c9a84c; border-color: rgba(201,168,76,0.3); box-shadow: 0 0 25px rgba(201,168,76,0.1); }

  #info-panel {
    pointer-events: auto;
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(5,5,20,0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 18px 28px;
    color: #d0c8b0;
    font-size: 0.85rem;
    text-align: center;
    max-width: 92vw;
    box-shadow: 0 8px 50px rgba(0,0,0,0.6);
    transition: opacity 0.5s, transform 0.5s;
  }
  #info-panel.hidden { opacity: 0; transform: translateX(-50%) translateY(25px); pointer-events: none; }
  #info-panel h3 { color: #c9a84c; font-size: 1.05rem; margin-bottom: 4px; }
  #info-panel p { color: #a09880; font-size: 0.8rem; line-height: 1.5; }
  #info-panel .stat-row { display: flex; gap: 24px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  #info-panel .stat { text-align: center; }
  #info-panel .stat-val { color: #f0e8d0; font-size: 1.15rem; font-weight: 700; }
  #info-panel .stat-lbl { color: #706050; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.8px; }

  #hint {
    position: absolute; bottom: 105px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.2);
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    animation: pulse-hint 4s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes pulse-hint { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }

  #loading {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #050510; z-index: 999;
    color: #c9a84c; font-size: 1.1rem; font-weight: 600;
    transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner { width: 36px; height: 36px; border: 3px solid rgba(201,168,76,0.15); border-top-color: #c9a84c; border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .sub { color: rgba(255,255,255,0.3); font-size: 0.75rem; font-weight: 400; margin-top: 8px; }

  @media (max-width: 600px) {
    #title { font-size: 0.85rem; }
    .ctrl-btn { padding: 6px 10px; font-size: 0.65rem; }
    #info-panel { padding: 12px 16px; font-size: 0.7rem; bottom: 18px; }
    #info-panel .stat-row { gap: 12px; }
    #hint { bottom: 80px; font-size: 0.6rem; }
  }
</style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// Expose for debugging
window._THREE = THREE;

// ─── Scene Setup ───────────────────────────────────────────────
const scene = new THREE.Scene();
window._scene = scene; // debug
scene.fog = new THREE.FogExp2(0x87ceeb, 0.0008);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 1, 8000);
camera.position.set(1200, 500, 1200);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
window._renderer = renderer;
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

// ─── Post-Processing ───────────────────────────────────────────
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.3,   // strength
  0.5,   // radius
  0.1    // threshold
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ─── Controls ──────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 400, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 50;
controls.maxDistance = 4000;
controls.maxPolarAngle = Math.PI / 2.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.8;
controls.update();

// ─── HDR Environment Map (procedural) ──────────────────────────
function createProceduralEnvMap() {
  const size = 256;
  const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(size);
  const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);

  // Create a nice sky/ground environment
  const envScene = new THREE.Scene();

  // Sky dome
  const skyGeo = new THREE.SphereGeometry(500, 32, 32);
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 512; skyCanvas.height = 512;
  const ctx = skyCanvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#1a2a5a');
  grad.addColorStop(0.3, '#4a7abb');
  grad.addColorStop(0.5, '#87ceeb');
  grad.addColorStop(0.7, '#e8d0a0');
  grad.addColorStop(0.85, '#c08850');
  grad.addColorStop(1, '#5a3a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 512);
  // Add some clouds
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 30; i++) {
    const cx = Math.random() * 512;
    const cy = 100 + Math.random() * 200;
    const r = 20 + Math.random() * 60;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  const skyTex = new THREE.CanvasTexture(skyCanvas);
  skyTex.magFilter = THREE.LinearFilter;
  skyTex.minFilter = THREE.LinearMipmapLinearFilter;

  const skyMat = new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  envScene.add(sky);

  // Sun
  const sunGeo = new THREE.SphereGeometry(10, 16, 16);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffeedd });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  sun.position.set(100, 200, -200);
  envScene.add(sun);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(1000, 1000);
  const groundMat = new THREE.MeshBasicMaterial({ color: 0x8a7a6a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -1;
  envScene.add(ground);

  cubeCamera.position.set(0, 50, 0);
  cubeCamera.update(renderer, envScene);

  return cubeRenderTarget.texture;
}

const envMap = createProceduralEnvMap();
scene.environment = envMap;
// Background set after first render to avoid uninitialized cube texture
let bgSet = false;

// ─── Lighting ──────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x4466aa, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 3.0);
sunLight.position.set(80, 150, 60);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 4096;
sunLight.shadow.mapSize.height = 4096;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 400;
sunLight.shadow.camera.left = -120;
sunLight.shadow.camera.right = 120;
sunLight.shadow.camera.top = 120;
sunLight.shadow.camera.bottom = -120;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.5);
fillLight.position.set(-80, 60, -100);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffcc88, 0.8);
rimLight.position.set(-60, 100, -120);
scene.add(rimLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x5a3a2a, 0.5);
scene.add(hemiLight);

// ─── Ground ────────────────────────────────────────────────────
// Reflective ground plane
const groundCanvas = document.createElement('canvas');
groundCanvas.width = 512; groundCanvas.height = 512;
const gctx = groundCanvas.getContext('2d');
gctx.fillStyle = '#3a3530';
gctx.fillRect(0, 0, 512, 512);
// Add subtle pattern
for (let i = 0; i < 200; i++) {
  const x = Math.random() * 512;
  const y = Math.random() * 512;
  const s = 1 + Math.random() * 3;
  gctx.fillStyle = `rgba(80,75,70,${Math.random() * 0.3})`;
  gctx.fillRect(x, y, s, s);
}
const groundTex = new THREE.CanvasTexture(groundCanvas);
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
groundTex.repeat.set(40, 40);

const groundMat = new THREE.MeshStandardMaterial({
  map: groundTex,
  color: 0x6a6050,
  roughness: 0.7,
  metalness: 0.1,
  envMapIntensity: 0.3,
});
const groundGeo = new THREE.PlaneGeometry(800, 800);
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
ground.receiveShadow = true;
scene.add(ground);

// ─── Materials ─────────────────────────────────────────────────
// Generate window texture
function createWindowTexture(w, h, lit = false) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Base
  ctx.fillStyle = lit ? '#1a2a3a' : '#2a3a4a';
  ctx.fillRect(0, 0, w, h);

  // Window grid
  const cols = 8;
  const rows = 20;
  const gapX = w / cols;
  const gapY = h / rows;
  const winW = gapX * 0.6;
  const winH = gapY * 0.55;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * gapX + (gapX - winW) / 2;
      const y = r * gapY + (gapY - winH) / 2;

      if (lit) {
        // Some windows lit, some dark
        const isLit = Math.random() > 0.4;
        if (isLit) {
          const brightness = 0.3 + Math.random() * 0.7;
          ctx.fillStyle = `rgba(255,220,150,${brightness})`;
        } else {
          ctx.fillStyle = 'rgba(10,15,25,0.8)';
        }
      } else {
        ctx.fillStyle = 'rgba(100,140,180,0.3)';
      }
      ctx.fillRect(x, y, winW, winH);

      // Window frame
      ctx.strokeStyle = 'rgba(200,200,220,0.1)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, winW, winH);
    }
  }

  // Horizontal floor lines
  ctx.strokeStyle = 'rgba(150,160,180,0.15)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= rows; r++) {
    const y = r * gapY;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  return new THREE.CanvasTexture(canvas);
}

const windowTexDay = createWindowTexture(256, 512, false);
const windowTexNight = createWindowTexture(256, 512, true);

const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0x88bbdd,
  metalness: 0.0,
  roughness: 0.05,
  transparent: true,
  opacity: 0.4,
  envMapIntensity: 1.0,
  clearcoat: 0.2,
  clearcoatRoughness: 0.3,
  side: THREE.DoubleSide,
});

const structureMat = new THREE.MeshPhysicalMaterial({
  color: 0x8899aa,
  metalness: 0.7,
  roughness: 0.25,
  envMapIntensity: 1.2,
});

const darkMat = new THREE.MeshPhysicalMaterial({
  color: 0x556677,
  metalness: 0.6,
  roughness: 0.35,
  envMapIntensity: 0.8,
});

const spireMat = new THREE.MeshPhysicalMaterial({
  color: 0xccccdd,
  metalness: 0.9,
  roughness: 0.15,
  envMapIntensity: 1.5,
});

const deckMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  metalness: 0.0,
  roughness: 0.02,
  transparent: true,
  opacity: 0.4,
  envMapIntensity: 0.8,
  clearcoat: 0.3,
});

// Night materials
const nightGlassMat = new THREE.MeshPhysicalMaterial({
  color: 0xffcc44,
  metalness: 0.0,
  roughness: 0.15,
  transparent: true,
  opacity: 0.6,
  emissive: 0xffaa33,
  emissiveIntensity: 0.8,
  envMapIntensity: 0.3,
});

const nightStructureMat = new THREE.MeshPhysicalMaterial({
  color: 0x1a2a3a,
  metalness: 0.5,
  roughness: 0.5,
  emissive: 0x0a1520,
  emissiveIntensity: 0.15,
  envMapIntensity: 0.3,
});

// ═══════════════════════════════════════════════════════════════
// BURJ KHALIFA — Realistic Spiraling Y-Shape Model
// Based on SOM Architects data (public domain) — 27 setbacks, spiral
// ═══════════════════════════════════════════════════════════════

const buildingGroup = new THREE.Group();
window._bg = buildingGroup; // debug
const REAL_HEIGHT = 828;         // meters — 1 unit = 1 meter
const M = 1;
const TOTAL_HEIGHT = REAL_HEIGHT;

// ─── Real setback heights (meters above ground) ─────────────────
// Data: SOM Architects / Burj Dubai archive (public domain)
// 27 mechanical setbacks + continuous tapering spiral
const SETBACKS_M = [
  0,      // Ground / podium
  7,      // Podium top
  50,     // First major setback
  105,    // Mech floor 17-18
  155,    // Second setback
  200,
  255,    // Mech floor 40-42
  300,
  345,    // Third setback
  400,
  450,
  500,    // Mech floor 73-75
  540,
  585,
  625,    // Mech floor 109-110
  655,
  700,
  730,    // Mech floor 136-138
  755,
  772,
  785,    // Near top
  795,
  808,
  815,
  820,
  824,
  826,
  828,    // Tip
];

// Mechanical floor heights in real meters
const MECH_FLOORS_M = [0, 7, 50, 105, 200, 255, 345, 450, 500, 585, 625, 700, 730, 755, 772, 785, 795, 808, 815, 820, 824, 826, 828];

// Wing angles (120° apart for Y-shape)
const WING_ANGLES = [0, Math.PI * 2 / 3, Math.PI * 4 / 3];

// ─── Core cross-section at given height fraction ────────────────
function getCoreRadius(t) {
  // Hexagonal core, tapers from 30m radius at base to 3m at top
  const baseR = 30 / M;
  const topR  = 3  / M;
  return baseR * Math.pow(topR / baseR, t);
}

// ─── Wing dimensions at given height fraction and wing index ────
// Wing 0 tapers first, then wing 1, then wing 2 (asymmetric setbacks)
function getWingDims(t, wingIdx) {
  const baseLen  = 35 / M;   // Y-arm length at base
  const baseW    = 18 / M;   // Y-arm width at base
  const topLen   = 2  / M;   // Y-arm length at top
  const topW     = 1  / M;   // Y-arm width at top

  // Each wing drops out at different heights (asymmetric spiral)
  const wingDropT = [0.55, 0.75, 0.92][wingIdx];
  if (t > wingDropT) return null;

  // Scale factor for this wing
  const s = Math.pow(t / wingDropT, 0.7);

  const len = baseLen * Math.pow(topLen / baseLen, s);
  const w   = baseW   * Math.pow(topW   / baseW,   s);

  // Y-rotation: each wing rotates ~30° over its active height
  const rotRange = Math.PI / 6;  // 30 degrees
  const rot = wingIdx * rotRange * s;

  return { len, w, rot };
}

// ─── Build one horizontal slice of the tower ───────────────────
function buildSlice(yBottom, yTop, tBottom, tTop) {
  const group = new THREE.Group();
  const sliceH = yTop - yBottom;
  const tMid = (tBottom + tTop) / 2;

  // Central hexagonal core
  const rB = getCoreRadius(tBottom);
  const rT = getCoreRadius(tTop);
  if (rB > 0.1) {
    const coreGeo = new THREE.CylinderGeometry(rT, rB, sliceH, 6);
    const core = new THREE.Mesh(coreGeo, structureMat);
    core.position.y = yBottom + sliceH / 2;
    core.castShadow = true;
    core.receiveShadow = true;
    group.add(core);
  }

  // Three Y-wings
  for (let wi = 0; wi < 3; wi++) {
    const dims = getWingDims(tMid, wi);
    if (!dims) continue;

    const angle = WING_ANGLES[wi];
    const dist  = rB + dims.len * 0.55;

    const px = Math.cos(angle + dims.rot) * dist;
    const pz = Math.sin(angle + dims.rot) * dist;

    // Wing structure
    const geo = new THREE.BoxGeometry(dims.w, sliceH, dims.len);
    const mesh = new THREE.Mesh(geo, structureMat);
    mesh.position.set(px, yBottom + sliceH / 2, pz);
    mesh.rotation.y = -(angle + dims.rot);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);

    // Glass panel (slightly inset)
    const glassGeo = new THREE.BoxGeometry(dims.w * 0.85, sliceH * 0.82, dims.len * 0.82);
    const glass = new THREE.Mesh(glassGeo, glassMat);
    glass.position.set(px, yBottom + sliceH / 2, pz);
    glass.rotation.y = -(angle + dims.rot);
    group.add(glass);

    // Floor band every ~3 floors (visual rhythm)
    if (Math.random() < 0.03) {
      const bandGeo = new THREE.BoxGeometry(dims.w * 1.06, 0.08, dims.len * 1.06);
      const band = new THREE.Mesh(bandGeo, darkMat);
      band.position.set(px, yBottom, pz);
      band.rotation.y = -(angle + dims.rot);
      group.add(band);
    }
  }

  return group;
}

// ─── Build full tower from setback data ─────────────────────────
function buildTower() {
  const group = new THREE.Group();

  // Number of vertical slices per setback section
  const SLICES_PER_STAGE = 8;

  for (let s = 0; s < SETBACKS_M.length - 1; s++) {
    const yB = SETBACKS_M[s]     / M;
    const yT = SETBACKS_M[s + 1] / M;
    const tB = SETBACKS_M[s]     / REAL_HEIGHT;
    const tT = SETBACKS_M[s + 1] / REAL_HEIGHT;

    for (let i = 0; i < SLICES_PER_STAGE; i++) {
      const t0 = tB + (tT - tB) * (i       / SLICES_PER_STAGE);
      const t1 = tB + (tT - tB) * ((i + 1) / SLICES_PER_STAGE);
      const y0 = yB + (yT - yB) * (i       / SLICES_PER_STAGE);
      const y1 = yB + (yT - yB) * ((i + 1) / SLICES_PER_STAGE);

      group.add(buildSlice(y0, y1, t0, t1));
    }

    // Mechanical floor ring at each setback
    const mechR = getCoreRadius(tT) * 1.3;
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(mechR, 0.08, 6, 6),
      darkMat
    );
    ring.position.y = yT;
    ring.rotation.x = Math.PI / 2;
    group.add(ring);
  }

  return group;
}

// ─── Podium / Base ──────────────────────────────────────────────
function buildPodium() {
  const g = new THREE.Group();

  // Podium (first 7m, widened base)
  const podiumH = SETBACKS_M[1] / M;
  const podiumGeo = new THREE.CylinderGeometry(40 / M, 45 / M, podiumH, 6);
  const podium = new THREE.Mesh(podiumGeo, structureMat);
  podium.position.y = podiumH / 2;
  podium.castShadow = true;
  podium.receiveShadow = true;
  g.add(podium);

  // Y-wing bases at podium
  for (let wi = 0; wi < 3; wi++) {
    const angle = WING_ANGLES[wi];
    const dist  = 35 / M;

    const baseGeo = new THREE.BoxGeometry(18 / M, podiumH, 35 / M);
    const base = new THREE.Mesh(baseGeo, structureMat);
    base.position.set(
      Math.cos(angle) * dist,
      podiumH / 2,
      Math.sin(angle) * dist
    );
    base.rotation.y = -angle;
    base.castShadow = true;
    g.add(base);
  }

  // Decorative rings on podium
  for (let i = 0; i < 4; i++) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(38 / M - i * 1.5 / M, 0.12, 6, 48),
      darkMat
    );
    ring.position.y = 1 + i * 1.4;
    ring.rotation.x = Math.PI / 2;
    g.add(ring);
  }

  return g;
}

// ─── Spire / Antenna ───────────────────────────────────────────
function buildSpire() {
  const g = new THREE.Group();
  const spireBase = (REAL_HEIGHT - 200) / M;  // spire starts ~200m up
  const tipY = REAL_HEIGHT / M;

  // Main spire shaft (tapered)
  const segs = 20;
  for (let i = 0; i < segs; i++) {
    const t  = i       / segs;
    const tN = (i + 1) / segs;
    const yB = spireBase + (tipY - spireBase) * t;
    const yT = spireBase + (tipY - spireBase) * tN;
    const rB = (1.8 - t  * 1.6) / M;
    const rT = (1.8 - tN * 1.6) / M;
    if (rB < 0.02) continue;
    const spireSeg = new THREE.Mesh(
      new THREE.CylinderGeometry(rT, rB, yT - yB, 6),
      spireMat
    );
    spireSeg.position.y = yB + (yT - yB) / 2;
    spireSeg.castShadow = true;
    g.add(spireSeg);
  }

  // Antenna needle tip
  const needle = new THREE.Mesh(
    new THREE.ConeGeometry(0.04, 4 / M, 4),
    spireMat
  );
  needle.position.y = tipY + 2 / M;
  g.add(needle);

  // Warning beacon
  const beacon = new THREE.Mesh(
    new THREE.SphereGeometry(0.15, 8, 8),
    new THREE.MeshPhysicalMaterial({
      color: 0xff2222,
      emissive: 0xff0000,
      emissiveIntensity: 2.0,
    })
  );
  beacon.position.y = tipY + 3 / M;
  g.add(beacon);

  // Spire lights (aviation warnings along shaft)
  for (let i = 0; i < 16; i++) {
    const t = i / 16;
    const lightY = spireBase + (tipY - spireBase) * t;
    const light = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 6, 6),
      new THREE.MeshPhysicalMaterial({
        color: 0xff6644,
        emissive: 0xff4422,
        emissiveIntensity: 0.3 + t * 0.7,
      })
    );
    light.position.set(
      Math.cos(t * Math.PI * 6) * 0.3 / M,
      lightY,
      Math.sin(t * Math.PI * 6) * 0.3 / M
    );
    g.add(light);
  }

  return g;
}

// ─── Observation Decks ──────────────────────────────────────────
function buildDecks() {
  const g = new THREE.Group();

  // "At The Top" deck at 555m → floor 124
  const deck1Y = 555 / M;
  const deck1R = 3.5 / M;
  const deck1 = new THREE.Mesh(
    new THREE.CylinderGeometry(deck1R * 1.2, deck1R * 1.25, 0.4, 12),
    deckMat
  );
  deck1.position.y = deck1Y;
  deck1.castShadow = true;
  g.add(deck1);

  // "At The Top Sky" deck at 720m
  const deck2Y = 720 / M;
  const deck2R = 2 / M;
  const deck2 = new THREE.Mesh(
    new THREE.CylinderGeometry(deck2R * 1.15, deck2R * 1.2, 0.35, 12),
    deckMat
  );
  deck2.position.y = deck2Y;
  deck2.castShadow = true;
  g.add(deck2);

  return g;
}

// ─── Assemble ──────────────────────────────────────────────────
buildingGroup.add(buildPodium());
buildingGroup.add(buildTower());
buildingGroup.add(buildDecks());
buildingGroup.add(buildSpire());

scene.add(buildingGroup);

// ─── Surrounding City ──────────────────────────────────────────
function addBuilding(x, z, w, h, d, color) {
  const mat = new THREE.MeshPhysicalMaterial({
    color, metalness: 0.4, roughness: 0.5, envMapIntensity: 0.4,
  });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Windows
  const winMat = new THREE.MeshPhysicalMaterial({
    color: 0x88bbdd, metalness: 0.0, roughness: 0.1,
    transparent: true, opacity: 0.3, envMapIntensity: 0.2,
  });
  const win = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.65, h * 0.55), winMat);
  win.position.set(x, h / 2, z + d / 2 + 0.05);
  scene.add(win);
}

// ─── Palm Trees ────────────────────────────────────────────────
function createPalm(x, z) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.22, 2.8, 6),
    new THREE.MeshPhysicalMaterial({ color: 0x5a4a38, roughness: 0.9 })
  );
  trunk.position.y = 1.4;
  trunk.castShadow = true;
  g.add(trunk);

  const frondMat = new THREE.MeshPhysicalMaterial({ color: 0x2a5a2a, roughness: 0.8 });
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
    const frond = new THREE.Mesh(new THREE.ConeGeometry(0.7, 0.06, 4), frondMat);
    frond.position.set(Math.cos(a) * 0.5, 2.8 + Math.random() * 0.2, Math.sin(a) * 0.5);
    frond.rotation.z = Math.cos(a) * 0.7;
    frond.rotation.x = Math.sin(a) * 0.7;
    g.add(frond);
  }
  g.position.set(x, 0, z);
  scene.add(g);
}

// ─── State & UI ────────────────────────────────────────────────
let isNight = false;

document.getElementById('btn-rotate').addEventListener('click', () => {
  controls.autoRotate = !controls.autoRotate;
  document.getElementById('btn-rotate').classList.toggle('active');
});

document.getElementById('btn-night').addEventListener('click', () => {
  isNight = !isNight;
  const btn = document.getElementById('btn-night');
  btn.classList.toggle('active');
  btn.innerHTML = isNight ? '☀️ Tag' : '🌙 Nacht';
  updateDayNight();
});

document.getElementById('btn-info').addEventListener('click', () => {
  document.getElementById('btn-info').classList.toggle('active');
  document.getElementById('info-panel').classList.toggle('hidden');
});

document.getElementById('btn-reset').addEventListener('click', () => {
  camera.position.set(1200, 500, 1200);
    controls.target.set(0, 400, 0);
  controls.update();
});

function updateDayNight() {
  if (isNight) {
    // Night environment
    const canvas = document.createElement('canvas');
    canvas.width = 2; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#050510');
    grad.addColorStop(0.3, '#0a0a2a');
    grad.addColorStop(0.5, '#0a0a1a');
    grad.addColorStop(0.7, '#050510');
    grad.addColorStop(1, '#020205');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 2, 512);
    const tex = new THREE.CanvasTexture(canvas);
    const nightEnv = new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide });
    const skySphere = new THREE.Mesh(new THREE.SphereGeometry(500, 16, 16), nightEnv);
    skySphere.name = 'nightSky';
    scene.add(skySphere);

    scene.fog = new THREE.FogExp2(0x050510, 0.0015);
    sunLight.intensity = 0.2;
    ambientLight.intensity = 0.15;
    hemiLight.intensity = 0.1;
    bloomPass.strength = 0.8;

    // Switch materials
    buildingGroup.traverse(child => {
      if (child.isMesh) {
        if (child.material === glassMat || child.material === deckMat) {
          child.material = nightGlassMat;
        } else if (child.material === structureMat || child.material === darkMat) {
          child.material = nightStructureMat;
        }
      }
    });

    // Stars
    if (!scene.getObjectByName('stars')) {
      const g = new THREE.BufferGeometry();
      const p = new Float32Array(3000 * 3);
      for (let i = 0; i < 3000 * 3; i++) {
        p[i] = (Math.random() - 0.5) * 1200;
        if (i % 3 === 1) p[i] = Math.abs(p[i]) * 0.2 + 100;
      }
      g.setAttribute('position', new THREE.BufferAttribute(p, 3));
      const stars = new THREE.Points(g, new THREE.PointsMaterial({
        color: 0xffffff, size: 0.4, transparent: true, opacity: 0.9,
      }));
      stars.name = 'stars';
      scene.add(stars);
    }
    scene.getObjectByName('stars').visible = true;

  } else {
    // Day
    const sky = scene.getObjectByName('nightSky');
    if (sky) scene.remove(sky);

    scene.fog = new THREE.FogExp2(0x87ceeb, 0.0012);
    scene.background = envMap;
    sunLight.intensity = 3.0;
    ambientLight.intensity = 0.3;
    hemiLight.intensity = 0.5;
    bloomPass.strength = 0.3;

    buildingGroup.traverse(child => {
      if (child.isMesh) {
        if (child.material === nightGlassMat) {
          child.material = glassMat;
        } else if (child.material === nightStructureMat) {
          child.material = structureMat;
        }
      }
    });

    if (scene.getObjectByName('stars')) {
      scene.getObjectByName('stars').visible = false;
    }
  }
}

// ─── Resize ────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

// ─── Animation Loop ────────────────────────────────────────────
let _animFrame = 0;
function animate() {
  requestAnimationFrame(animate);
  _animFrame++;
  if (!bgSet) {
    scene.background = envMap;
    bgSet = true;
  }
  controls.update();
  // Skip first few frames to let scene initialize
  if (_animFrame > 2) {
    try { composer.render(); } catch(e) { console.warn('composer error:', e.message); }
  }
}

// ─── Start ─────────────────────────────────────────────────────
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 600);

animate();
