    .fact-title { font-weight: bold; color: #4ecdc4; margin-bottom: 4px; }
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; font-size: 0.8rem; color: #aaa; }
    .stat { background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 8px; }
    .stat span { color: #ffd700; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }

    .speed-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #ffd700; }

    @media (max-width: 768px) { .top-left, .top-right { min-width: auto; padding: 10px; } .top-right { right: 10px; top: 10px; } .bottom-center { bottom: 10px; } .btn { padding: 8px 12px; font-size: 0.8rem; } h2 { font-size: 1rem; } .title-main { font-size: 1.1rem; } .info-panel { left: 10px; right: 10px; max-width: none; bottom: 10px; } .hint { font-size: 0.75rem; padding: 8px 16px; } }

          lastMouseX = p.mouseX;
          lastMouseY = p.mouseY;
          autoRotate = false;

    // ============ KLASSEN ============
    class Sun {
      constructor(p) {
        this.p = p;
        this.radius = 30;
        this.coronaParticles = [];
        for (let i = 0; i < 200; i++) {
          this.coronaParticles.push({
            angle: p.random(p.TWO_PI),
            radius: p.random(35, 80),
            speed: p.random(0.002, 0.01),
            size: p.random(2, 8),
            hue: p.random(40, 60),
            phase: p.random(p.TWO_PI)
          });
        }
        this.flares = [];
        for (let i = 0; i < 12; i++) {
          this.flares.push({
            angle: p.random(p.TWO_PI),
            length: p.random(40, 100),
            speed: p.random(0.01, 0.03),
            width: p.random(3, 8),
            phase: p.random(p.TWO_PI)
          });
        }
      }

      draw(p, frame) {
        // Corona/glow layers
        p.noStroke();
        for (let i = 5; i > 0; i--) {
          const alpha = 15 / i;
          const r = this.radius + i * 8;
          const hue = 50 + p.sin(frame * 0.03 + i) * 10;
          p.fill(hue, 90, 100, alpha);
          p.sphere(r, 32, 32);
        }

        // Sun surface
        p.push();
        p.rotateY(frame * 0.001);
        p.rotateZ(frame * 0.0005);        // Surface texture using noise
        const detail = 32;
        p.beginShape(p.TRIANGLE_STRIP);
        for (let lat = 0; lat <= detail; lat++) {
          const theta = p.map(lat, 0, detail, 0, p.PI);
          for (let lon = 0; lon <= detail; lon++) {
            const phi = p.map(lon, 0, detail, 0, p.TWO_PI);
            const nx = p.sin(theta) * p.cos(phi);
            const ny = p.sin(theta) * p.sin(phi);
            const nz = p.cos(theta);
            
            // Noise-based surface displacement
            const n = p.noise(nx * 2 + frame * 0.001, ny * 2, nz * 2 + frame * 0.0005);
            const r = this.radius * (1 + n * 0.02);
            
            const hue = 45 + p.sin(n * 10 + frame * 0.02) * 15;
            const sat = 80 + n * 20;
            p.fill(hue, sat, 100);
            
            p.vertex(r * nx, r * ny, r * nz);
          }
        }
        p.endShape();
        p.pop();

        // Corona particles
        p.blendMode(p.ADD);
        this.coronaParticles.forEach(part => {
          const a = part.angle + frame * part.speed;
          const r = part.radius + p.sin(frame * 0.01 + part.phase) * 5;
          const x = p.cos(a) * r;
          const y = p.sin(a) * r;
          const z = p.sin(a * 2 + part.phase) * r * 0.3;
          const sz = part.size * (0.5 + p.sin(frame * 0.05 + part.phase) * 0.5);
          p.fill(part.hue, 80, 100, 20);
          p.push();
          p.translate(x, y, z);
          p.rotateY(frame * 0.01);
          p.sphere(sz, 8, 8);
          p.pop();
        });
        p.blendMode(p.BLEND);

        // Solar flares
        this.flares.forEach(flare => {
          const a = flare.angle + frame * flare.speed;
          const len = flare.length + p.sin(frame * 0.05 + flare.phase) * 20;
          p.stroke(50, 100, 100, 30);
          p.strokeWeight(flare.width);
          p.beginShape();
          p.vertex(0, 0, 0);
          for (let i = 0; i <= 5; i++) {
            const t = i / 5;
            const r = (this.radius + len * t) * (1 + p.noise(a, frame * 0.01, i) * 0.3);
            p.vertex(p.cos(a) * r, p.sin(a) * r, p.sin(a * 3) * r * 0.2);
          }
          p.endShape();
        });
        p.noStroke();
      }
    }

    class Planet {
      constructor(p, data, index) {
        this.p = p;
        this.data = data;
        this.index = index;
        this.angle = p.random(p.TWO_PI);
        this.orbitRadius = data.dist * 25; // Scale factor
        this.radius = p.map(data.radius, 2440, 69911, 4, 28); // Visual scaling
        this.rotationSpeed = p.random(0.005, 0.02);
        this.rotationAngle = p.random(p.TWO_PI);
        this.axialTilt = p.random(-0.3, 0.3);
        this.moons = this.generateMoons(data);
        this.orbitSpeed = 365.25 / data.orbitDays * 0.1; // Relative to Earth
        this.color = data.color;
        this.emojiColor = data.emojiColor;
        this.emoji = data.emoji;
        this.name = data.name;
        this.facts = data.facts;
        this.info = data.info;
        
        // Generate surface texture
        this.surfaceNoise = [];
        for (let i = 0; i < 1000; i++) {
          this.surfaceNoise.push({
            theta: p.random(p.PI),
            phi: p.random(p.TWO_PI),
            brightness: p.random(-15, 15),
            size: p.random(0.5, 2)
          });
        }
      }

      generateMoons(data) {
        const moons = [];
        if (data.name === 'Erde') {
          moons.push({ name: 'Mond', dist: 8, radius: 1.5, color: [180, 180, 180], angle: 0, speed: 0.05 });
        } else if (data.name === 'Mars') {
          moons.push({ name: 'Phobos', dist: 3, radius: 0.4, color: [150, 130, 110], angle: 0, speed: 0.3 });
          moons.push({ name: 'Deimos', dist: 5, radius: 0.3, color: [140, 120, 100], angle: 2, speed: 0.1 });
        } else if (data.name === 'Jupiter') {
          moons.push({ name: 'Io', dist: 12, radius: 1.8, color: [255, 180, 100], angle: 0, speed: 0.15 });
          moons.push({ name: 'Europa', dist: 16, radius: 1.6, color: [200, 200, 220], angle: 1, speed: 0.08 });
          moons.push({ name: 'Ganymed', dist: 22, radius: 2.2, color: [160, 150, 140], angle: 2, speed: 0.04 });
          moons.push({ name: 'Kallisto', dist: 30, radius: 2, color: [130, 120, 110], angle: 3, speed: 0.02 });
        } else if (data.name === 'Saturn') {
          moons.push({ name: 'Titan', dist: 20, radius: 2.2, color: [200, 170, 120], angle: 0, speed: 0.03 });
          moons.push({ name: 'Enceladus', dist: 10, radius: 0.6, color: [255, 255, 255], angle: 2, speed: 0.1 });
        }
        return moons;
      }

      update(frame) {
        this.angle += this.orbitSpeed * timeSpeed * 0.01;
        this.rotationAngle += this.rotationSpeed * timeSpeed;
      }

      draw(p, frame, isSelected) {
        this.update(frame);
        
        const x = p.cos(this.angle) * this.orbitRadius;
        const z = p.sin(this.angle) * this.orbitRadius;
        const y = p.sin(this.angle * 0.5 + this.index) * 2; // Slight orbital inclination

        p.push();
        p.translate(x, y, z);
        p.rotateZ(this.axialTilt);
        p.rotateY(this.rotationAngle);

        // Planet body
        this.drawPlanet(p, isSelected);

        // Moons
        this.moons.forEach(moon => {
          moon.angle += moon.speed * timeSpeed;
          const mx = p.cos(moon.angle) * moon.dist;
          const mz = p.sin(moon.angle) * moon.dist;
          p.push();
          p.translate(mx, 0, mz);
          p.fill(moon.color[0], moon.color[1], moon.color[2]);
          p.sphere(moon.radius, 12, 12);
          p.pop();
          
          // Moon orbit line
          if (showOrbits) {
            p.stroke(100, 20, 100, 20);
            p.strokeWeight(0.5);
            p.noFill();
            p.beginShape();
            for (let i = 0; i <= 32; i++) {
              const a = (i / 32) * p.TWO_PI;
              p.vertex(p.cos(a) * moon.dist, 0, p.sin(a) * moon.dist);
            }
            p.endShape();
            p.noStroke();
          }
        });

        // Selection highlight
        if (isSelected) {
          p.noFill();
          p.stroke(60, 100, 100, 80);
          p.strokeWeight(3);
          p.sphere(this.radius + 3, 24, 24);
          p.noStroke();
        }

        p.pop();
      }

      drawPlanet(p, isSelected) {
        // Main sphere with procedural texture
        const detail = 24;
        p.beginShape(p.TRIANGLE_STRIP);
        for (let lat = 0; lat <= detail; lat++) {
          const theta = p.map(lat, 0, detail, 0, p.PI);
          for (let lon = 0; lon <= detail; lon++) {
            const phi = p.map(lon, 0, detail, 0, p.TWO_PI);
            const nx = p.sin(theta) * p.cos(phi);
            const ny = p.sin(theta) * p.sin(phi);
            const nz = p.cos(theta);
            
            // Base color with noise variation
            let h = this.getHueFromColor(this.color[0]);
            let s = this.getSatFromColor(this.color[1]);
            let b = this.getBriFromColor(this.color[2]);
            
            const n = p.noise(nx * 3 + this.index * 10, ny * 3, nz * 3 + frame * 0.001);
            h += n * 20 - 10;
            s += n * 10 - 5;
            b += n * 10 - 5;
            
            // Surface features
            this.surfaceNoise.forEach(sn => {
              const dx = nx - p.sin(sn.theta) * p.cos(sn.phi);
              const dy = ny - p.sin(sn.theta) * p.sin(sn.phi);
              const dz = nz - p.cos(sn.theta);
              const dist = p.sqrt(dx*dx + dy*dy + dz*dz);
              if (dist < 0.1) {
                b += sn.brightness;
              }
            });
            
            p.fill(h % 360, p.constrain(s, 0, 100), p.constrain(b, 0, 100));
            p.vertex(this.radius * nx, this.radius * ny, this.radius * nz);
          }
        }
        p.endShape();

        // Rings for Saturn
        if (this.name === 'Saturn') {
          this.drawRings(p);
        }
      }

      drawRings(p) {
        const ringInner = this.radius * 1.3;
        const ringOuter = this.radius * 2.3;
        const segments = 64;
        
        p.push();
        p.rotateX(p.PI / 2);
        for (let r = ringInner; r < ringOuter; r += 2) {
          const alpha = p.map(r, ringInner, ringOuter, 60, 10);
          const hue = 40;
          p.stroke(hue, 30, 90, alpha);
          p.strokeWeight(1.5);
          p.noFill();
          p.beginShape();
          for (let i = 0; i <= segments; i++) {
            const a = (i / segments) * p.TWO_PI;
            const wobble = p.noise(r * 0.1, a, frame * 0.001) * 3;
            p.vertex(p.cos(a) * (r + wobble), 0, p.sin(a) * (r + wobble));
          }
          p.endShape();
        }
        p.noStroke();
        p.pop();
      }

      getHueFromColor(r) { return r; }
      getSatFromColor(g) { return g; }
      getBriFromColor(b) { return b; }
    }

    class DwarfPlanet {

    class Comet {
      constructor(p, data, index) {
        this.p = p;
        this.data = data;
        this.index = index;
        this.perihelion = data.perihelion * 25;
        this.aphelion = data.aphelion * 25;
        this.semiMajor = (this.perihelion + this.aphelion) / 2;
        this.eccentricity = (this.aphelion - this.perihelion) / (this.aphelion + this.perihelion);
        this.period = data.period / 365.25 * 100; // Scaled time
        this.meanAnomaly = p.random(p.TWO_PI);
        this.inclination = p.radians(data.inclination);
        this.argPerihelion = p.random(p.TWO_PI);
        this.longAscNode = p.random(p.TWO_PI);
        this.color = data.color;
        this.tailLen = data.tailLen;
        this.nucleusRadius = 1.5;
        this.tailParticles = [];
        for (let i = 0; i < 50; i++) {
          this.tailParticles.push({
            offset: p.random(0.1, 1),
            side: p.random(-0.3, 0.3),
            size: p.random(0.5, 2),
            brightness: p.random(30, 100)
          });
        }
        this.name = data.name;
        this.facts = data.facts;
        this.isVisible = true;
      }

      getPosition(frame) {
        const n = p.TWO_PI / this.period; // Mean motion
        const M = (this.meanAnomaly + n * frame * timeSpeed * 0.01) % p.TWO_PI;
        
        // Solve Kepler's equation (simplified)
        let E = M;
        for (let i = 0; i < 5; i++) {
          E = M + this.eccentricity * p.sin(E);
        }
        
        // True anomaly
        const nu = 2 * p.atan(p.sqrt((1 + this.eccentricity) / (1 - this.eccentricity)) * p.tan(E / 2));
        
        // Distance
        const r = this.semiMajor * (1 - this.eccentricity * this.eccentricity) / (1 + this.eccentricity * p.cos(nu));
        
        // Position in orbital plane
        const x_orb = r * p.cos(nu);
        const y_orb = r * p.sin(nu);
        const z_orb = 0;
        
        // Rotate to 3D space
        const cosW = p.cos(this.argPerihelion);
        const sinW = p.sin(this.argPerihelion);
        const cosI = p.cos(this.inclination);
        const sinI = p.sin(this.inclination);
        const cosO = p.cos(this.longAscNode);
        const sinO = p.sin(this.longAscNode);
        
        const x = (cosW * cosO - sinW * sinO * cosI) * x_orb + (-sinW * cosO - cosW * sinO * cosI) * y_orb;
        const y = (cosW * sinO + sinW * cosO * cosI) * x_orb + (-sinW * sinO + cosW * cosO * cosI) * y_orb;
        const z = sinW * sinI * x_orb + cosW * sinI * y_orb;
        
        return { x, y, z, r, nu };
      }

      draw(p, frame, isSelected) {
        const pos = this.getPosition(frame);
        
        // Only draw if not too far
        if (pos.r > 500) return;
        
        p.push();
        p.translate(pos.x, pos.y, pos.z);
        
        // Orient tail away from sun
        const toSun = p.createVector(-pos.x, -pos.y, -pos.z);
        toSun.normalize();
        
        // Nucleus
        p.fill(this.color[0], this.color[1], this.color[2]);
        p.sphere(this.nucleusRadius, 12, 12);
        
        // Coma (glow)
        p.noStroke();
        for (let i = 3; i > 0; i--) {
          p.fill(this.color[0], this.color[1], 100, 15 / i);
          p.sphere(this.nucleusRadius * (1 + i * 0.5), 8, 8);
        }
        
        // Tail
        this.drawTail(p, toSun, pos.r);
        
        if (isSelected) {
          p.noFill();
          p.stroke(60, 100, 100, 80);
          p.strokeWeight(2);
          p.sphere(this.nucleusRadius + 4, 12, 12);
          p.noStroke();
        }
        
        p.pop();
      }

      drawTail(p, toSun, dist) {
        // Tail points away from sun
        const tailDir = p.createVector(toSun.x, toSun.y, toSun.z);
        tailDir.mult(-1);
        
        // Dust tail (curved)
        p.blendMode(p.ADD);
        p.noStroke();
        
        for (let i = 0; i < this.tailParticles.length; i++) {
          const tp = this.tailParticles[i];
          const t = i / this.tailParticles.length;
          const len = this.tailLen * 10 * (0.5 + p.noise(frame * 0.01, i) * 0.5) * (1 - dist / 500);
          
          // Curved tail
          const curve = p.sin(frame * 0.02 + i * 0.5) * 0.3;
          const tx = tailDir.x * len * t + curve * len * (1-t);
          const ty = tailDir.y * len * t;
          const tz = tailDir.z * len * t - curve * len * (1-t);
          
          const alpha = tp.brightness * (1 - t) * 0.5;
          p.fill(this.color[0], this.color[1], 100, alpha);
          p.push();
          p.translate(tx, ty, tz);
          p.sphere(tp.size * (1 - t * 0.5), 6, 6);
          p.pop();
        }
        
        // Ion tail (straight, blue)
        for (let i = 0; i < 20; i++) {
          const t = i / 20;
          const len = this.tailLen * 15 * (1 - dist / 500);
          const tx = tailDir.x * len * t;
          const ty = tailDir.y * len * t;
          const tz = tailDir.z * len * t;
          const alpha = 40 * (1 - t);
          p.fill(200, 80, 100, alpha);
          p.push();
          p.translate(tx, ty, tz);
          p.sphere((1 - t) * 2, 6, 6);
          p.pop();
        }
        
        p.blendMode(p.BLEND);
      }
    }

    class Asteroid {
      constructor(p, index) {
        this.p = p;
        this.index = index;
        this.orbitRadius = p.random(ASTEROID_BELT.inner, ASTEROID_BELT.outer) * 25;
        this.angle = p.random(p.TWO_PI);
        this.orbitSpeed = p.random(0.001, 0.003) * (25 / this.orbitRadius * 25);
        this.radius = p.random(0.3, 1.5);
        this.rotationSpeed = p.random(0.01, 0.05);
        this.rotationAngle = p.random(p.TWO_PI);
        this.tilt = p.random(-0.5, 0.5);
        this.color = p.random([
          [120, 20, 40], [130, 15, 35], [110, 25, 45], 
          [140, 10, 30], [100, 30, 50]
        ]);
        this.shape = this.generateShape();
      }

      generateShape() {
        const verts = [];
        const detail = 6;
        for (let i = 0; i <= detail; i++) {
          const theta = p.map(i, 0, detail, 0, p.PI);
          for (let j = 0; j <= detail; j++) {
            const phi = p.map(j, 0, detail, 0, p.TWO_PI);
            const r = 1 + p.noise(i * 0.5, j * 0.5, this.index) * 0.4;
            verts.push({ theta, phi, r });
          }
        }
        return verts;
      }

      draw(p, frame) {
        this.angle += this.orbitSpeed * timeSpeed;
        this.rotationAngle += this.rotationSpeed * timeSpeed;
        
        const x = p.cos(this.angle) * this.orbitRadius;
        const z = p.sin(this.angle) * this.orbitRadius;
        const y = p.sin(this.angle * 3 + this.index) * this.orbitRadius * 0.05;

        p.push();
        p.translate(x, y, z);
        p.rotateY(this.rotationAngle);
        p.rotateZ(this.tilt);
        
        p.fill(this.color[0], this.color[1], this.color[2]);
        p.sphere(this.radius, 6, 6);
        p.pop();
      }
    }

    // ============ HILFSFUNKTIONEN ============
    function setupCamera(p) {
      const camX = p.cos(cameraAngle) * cameraDistance * p.cos(p.radians(cameraTilt));
      const camY = cameraDistance * p.sin(p.radians(cameraTilt));
      const camZ = p.sin(cameraAngle) * cameraDistance * p.cos(p.radians(cameraTilt));
      
      p.camera(camX, camY, camZ, 0, 0, 0, 0, 1, 0);
      p.perspective(p.PI / 3, p.width / p.height, 1, 5000);
    }

    function drawStarfield(p) {
      p.push();
      p.noStroke();
      starfield.forEach(star => {
        const twinkle = star.brightness + p.sin(frame * star.twinkleSpeed + star.twinkleOffset) * 20;
        p.fill(60, 10, twinkle);
        p.push();
        p.translate(star.x, star.y, star.z);
        p.sphere(star.size, 4, 4);
        p.pop();
      });
      p.pop();
    }

    function drawOrbits(p) {
      p.noFill();
      p.strokeWeight(0.8);
      
      // Planet orbits
      PLANETS.forEach((data, i) => {
        const r = data.dist * 25;
        const hue = 60;
        p.stroke(hue, 20, 60, 30);
        p.beginShape();
        for (let j = 0; j <= 64; j++) {
          const a = (j / 64) * p.TWO_PI;
          p.vertex(p.cos(a) * r, 0, p.sin(a) * r);
        }
        p.endShape();
      });

      // Dwarf planet orbits
      DWARF_PLANETS.forEach((data, i) => {
        const r = data.dist * 25;
        p.stroke(300, 30, 50, 20);
        p.beginShape();
        for (let j = 0; j <= 64; j++) {
          const a = (j / 64) * p.TWO_PI;
          p.vertex(p.cos(a) * r, p.sin(a * 2) * r * 0.1, p.sin(a) * r);
        }
        p.endShape();
      });

      // Asteroid belt
      p.stroke(40, 20, 50, 15);
      p.strokeWeight(0.5);
      for (let r = ASTEROID_BELT.inner * 25; r < ASTEROID_BELT.outer * 25; r += 15) {
        p.beginShape();
        for (let j = 0; j <= 64; j++) {
          const a = (j / 64) * p.TWO_PI;
          const wobble = p.noise(r * 0.01, a, frame * 0.0005) * 3;
          p.vertex(p.cos(a) * (r + wobble), 0, p.sin(a) * (r + wobble));
        }
        p.endShape();
      }

      // Comet orbits (dashed)
      COMETS.forEach((data, i) => {
        if (data.aphelion > 100) return; // Skip very long period comets for orbit drawing
        p.stroke(200, 50, 80, 15);
        p.strokeWeight(0.5);
        const peri = data.perihelion * 25;
        const aph = Math.min(data.aphelion, 50) * 25;
        const a = (peri + aph) / 2;
        const e = (aph - peri) / (aph + peri);
        p.beginShape();
        for (let j = 0; j <= 64; j++) {
          const nu = (j / 64) * p.TWO_PI;
          const r = a * (1 - e * e) / (1 + e * p.cos(nu));
          p.vertex(p.cos(nu) * r, 0, p.sin(nu) * r);
        }
        p.endShape();
      });

      p.noStroke();
    }

    function drawLabels(p) {
      p.push();
      p.fill(255);
      p.noStroke();
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(12);
      
      // Planet labels
      planets.forEach(planet => {
        const x = p.cos(planet.angle) * planet.orbitRadius;
        const z = p.sin(planet.angle) * planet.orbitRadius;
        const y = p.sin(planet.angle * 0.5 + planet.index) * 2;
        
        // Project to screen
        const screenPos = getScreenPosition(p, x, y, z + planet.radius + 10);
        if (screenPos) {
          p.fill(planet.emojiColor);
          p.text(planet.emoji + ' ' + planet.name, screenPos.x, screenPos.y);
        }
      });

      // Dwarf planet labels
      if (showDwarfs) {
        dwarfPlanets.forEach(dp => {
          const x = p.cos(dp.angle) * dp.orbitRadius;
          const z = p.sin(dp.angle) * dp.orbitRadius;
          const y = p.sin(dp.angle * 2 + dp.index) * dp.orbitRadius * 0.1 * dp.orbitalInclination;
          
          const screenPos = getScreenPosition(p, x, y, z + dp.radius + 8);
          if (screenPos) {
            p.fill(dp.emojiColor);
            p.textSize(10);
            p.text(dp.emoji + ' ' + dp.name, screenPos.x, screenPos.y);
          }
        });
      }

      // Comet labels
      if (showComets) {
        comets.forEach(comet => {
          const pos = comet.getPosition(frame);
          if (pos.r > 500) return;
          const screenPos = getScreenPosition(p, pos.x, pos.y, pos.z + 10);
          if (screenPos) {
            p.fill(comet.color[0], comet.color[1], 100);
            p.textSize(10);
            p.text('☄ ' + comet.name, screenPos.x, screenPos.y);
          }
        });
      }
      p.pop();
    }

    function getScreenPosition(p, x, y, z) {
      // Simple projection for label placement
      const camX = p.cos(cameraAngle) * cameraDistance * p.cos(p.radians(cameraTilt));
      const camY = cameraDistance * p.sin(p.radians(cameraTilt));
      const camZ = p.sin(cameraAngle) * cameraDistance * p.cos(p.radians(cameraTilt));
      
      const dx = x - camX;
      const dy = y - camY;
      const dz = z - camZ;
      
      const dist = p.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist > 1000) return null;
      
      // Simplified - just use a basic projection
      const fov = p.PI / 3;
      const aspect = p.width / p.height;
      const scale = p.height / (2 * p.tan(fov / 2));
      
      // Project
      const px = (dx / dz) * scale + p.width / 2;
      const py = (dy / dz) * scale + p.height / 2;
      
      if (px < 0 || px > p.width || py < 0 || py > p.height) return null;
      if (dz < 0) return null; // Behind camera
      
      return { x: px, y: py };
    }

    function checkPlanetClick(p) {
      // Check planets
      for (let planet of planets) {
        const x = p.cos(planet.angle) * planet.orbitRadius;
        const z = p.sin(planet.angle) * planet.orbitRadius;
        const y = p.sin(planet.angle * 0.5 + planet.index) * 2;
        
        const screenPos = getScreenPosition(p, x, y, z);
        if (screenPos) {
          const d = p.dist(p.mouseX, p.mouseY, screenPos.x, screenPos.y);
          if (d < planet.radius * 2 + 10) {
            selectPlanet(planet);
            return;
          }
        }
      }

      // Check dwarf planets
      if (showDwarfs) {
        for (let dp of dwarfPlanets) {
          const x = p.cos(dp.angle) * dp.orbitRadius;
          const z = p.sin(dp.angle) * dp.orbitRadius;
          const y = p.sin(dp.angle * 2 + dp.index) * dp.orbitRadius * 0.1 * dp.orbitalInclination;
          
          const screenPos = getScreenPosition(p, x, y, z);
          if (screenPos) {
            const d = p.dist(p.mouseX, p.mouseY, screenPos.x, screenPos.y);
            if (d < dp.radius * 3 + 10) {
              selectPlanet(dp);
              return;
            }
          }
        }
      }

      // Check comets
      if (showComets) {
        for (let comet of comets) {
          const pos = comet.getPosition(frame);
          if (pos.r > 500) continue;
          const screenPos = getScreenPosition(p, pos.x, pos.y, pos.z);
          if (screenPos) {
            const d = p.dist(p.mouseX, p.mouseY, screenPos.x, screenPos.y);
            if (d < 20) {
              selectPlanet(comet);
              return;
            }
          }
        }
      }

      // Clicked empty space - deselect
      selectedPlanet = null;
      closeInfo();
    }

    function selectPlanet(planet) {
      selectedPlanet = planet;
      showInfo(planet);
    }

      title.innerHTML = `${obj.emoji} ${obj.name}`;
      
      let html = '';
      if (obj.facts) {
        obj.facts.forEach((fact, i) => {
          html += `<div class="fact"><div class="fact-title">💡 Wusstest du?</div>${fact}</div>`;
        });
      }
      content.innerHTML = html;
      
      let statsHtml = '';
      if (obj.data) {
        statsHtml += `<div class="stat">📏 Entfernung: <span>${obj.data.dist} AE</span></div>`;
        statsHtml += `<div class="stat">📅 Umlaufzeit: <span>${obj.data.orbitDays} Tage</span></div>`;
        statsHtml += `<div class="stat">📐 Radius: <span>${obj.data.radius} km</span></div>`;
      } else if (obj.period) {
        statsHtml += `<div class="stat">📅 Periode: <span>${obj.period} Jahre</span></div>`;
        statsHtml += `<div class="stat">☀️ Perihel: <span>${obj.perihelion} AE</span></div>`;
        statsHtml += `<div class="stat">📐 Aphel: <span>${obj.aphelion} AE</span></div>`;
      }
      statsHtml += `<div class="stat">${obj.info}</div>`;
      stats.innerHTML = statsHtml;
      
      panel.classList.add('open');
    }

    function closeInfo() {
      const panel = document.getElementById('infoPanel');
      panel.classList.remove('open');
      selectedPlanet = null;
    }

    // ============ UI FUNKTIONEN ============

    function animateCameraTo(target) {
      // Animate camera to look at target
      const startAngle = cameraAngle;
      const startTilt = cameraTilt;
      const startDist = cameraDistance;
      
      // Target position
      let targetX, targetY, targetZ;
      if (target.getPosition) {
        const pos = target.getPosition(frame);
        targetX = pos.x;
        targetY = pos.y;
        targetZ = pos.z;
      } else {
        targetX = Math.cos(target.angle) * target.orbitRadius;
        targetZ = Math.sin(target.angle) * target.orbitRadius;
        targetY = Math.sin(target.angle * 0.5 + target.index) * 2;
      }
      
      // Calculate target camera angle
      const targetAngle = Math.atan2(targetZ, targetX);
      const targetDist = Math.min(Math.max(Math.sqrt(targetX*targetX + targetZ*targetZ) * 2, 80), 300);
      const targetTilt = 20;
      
      const duration = 1000; // ms
      const startTime = Date.now();
      
      function animate() {
        const elapsed = Date.now() - startTime;
        const t = Math.min(elapsed / duration, 1);
        const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // ease in out quad
        
        cameraAngle = startAngle + (targetAngle - startAngle) * eased;
        cameraTilt = startTilt + (targetTilt - startTilt) * eased;
        cameraDistance = startDist + (targetDist - startDist) * eased;
        
        updateZoomUI();
        
        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          autoRotate = false;
        }
      }
      animate();
    }

    function togglePause() {
      isPaused = !isPaused;
      const btn = document.getElementById('btnPause');
      btn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
      btn.classList.toggle('active', isPaused);
    }

    function resetView() {
      cameraAngle = 0;
      cameraTilt = 30;
      cameraDistance = 200;
      timeSpeed = 1.0;
      isPaused = false;
      autoRotate = true;
      selectedPlanet = null;
      closeInfo();
      updateZoomUI();
      updateSpeedUI();
      document.getElementById('zoomSlider').value = 200;
      document.getElementById('speedSlider').value = 100;
      document.getElementById('tiltSlider').value = 30;
      document.getElementById('btnPause').textContent = '⏸️ Pause';
      document.getElementById('btnPause').classList.remove('active');
    }

    function setZoom(val) {
      cameraDistance = parseInt(val);
      document.getElementById('zoomVal').textContent = val;
      autoRotate = false;
    }

    function setSpeed(val) {
      timeSpeed = val / 100;
      const display = (timeSpeed).toFixed(1) + '×';
      document.getElementById('speedVal').textContent = display;
      document.getElementById('speedVal2').textContent = display;
      document.getElementById('speedFill').style.width = (val * 0.6) + '%';
    }

    function setTilt(val) {
      cameraTilt = parseInt(val);
      document.getElementById('tiltVal').textContent = val + '°';
      autoRotate = false;
    }

    function updateZoomUI() {
      document.getElementById('zoomSlider').value = Math.round(cameraDistance);
      document.getElementById('zoomVal').textContent = Math.round(cameraDistance);
    }

    function updateSpeedUI() {
      const val = Math.round(timeSpeed * 100);
      document.getElementById('speedSlider').value = val;
      const display = timeSpeed.toFixed(1) + '×';
      document.getElementById('speedVal').textContent = display;
      document.getElementById('speedVal2').textContent = display;
      document.getElementById('speedFill').style.width = (val * 0.6) + '%';
    }
