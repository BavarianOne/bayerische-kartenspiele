<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌌 Sternenhimmel – Dein Astronomie-Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030310;--fg:#e8e8f0;--muted:#6a6a8a;--gold:#ffd44a;--cyan:#4ad1ff;
  --panel:rgba(10,10,30,0.92);--panel-border:rgba(255,212,74,0.2);
  --btn:linear-gradient(135deg,#1a1a3a,#0d0d20);--btn-h:linear-gradient(135deg,#2a2a5a,#1a1a40);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;touch-action:none}
#canvas{display:block;width:100%;height:100%}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
.panel{pointer-events:auto;background:var(--panel);border:1px solid var(--panel-border);border-radius:16px;padding:14px 16px;backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#top{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-width:300px}
#bottom{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
#left{position:absolute;top:50%;left:12px;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px}
#right{position:absolute;top:50%;right:12px;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;align-items:flex-end}
@media(max-width:700px){
  #left,#right{position:static;transform:none;flex-direction:row;flex-wrap:wrap;justify-content:center;width:100%;padding:0 12px}
  #top,#bottom{position:static;transform:none;margin:8px 0}
  #ui{display:flex;flex-direction:column;align-items:center}
}
h1{font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:0.5px;text-shadow:0 0 8px rgba(255,212,74,0.4)}
label{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:4px}
input,select,button{font-family:inherit;background:var(--btn);border:1px solid rgba(255,212,74,0.15);color:var(--fg);border-radius:10px;padding:10px 14px;font-size:0.9rem;outline:none;transition:all 0.15s}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,212,74,0.2)}
button{cursor:pointer;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
button:hover{background:var(--btn-h);border-color:var(--gold);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.primary{background:linear-gradient(135deg,var(--gold),#e8b800);color:#030310;border:none}
button.primary:hover{box-shadow:0 4px 20px rgba(255,212,74,0.4)}
.slider-wrap{display:flex;align-items:center;gap:10px;min-width:260px}
input[type=range]{flex:1;appearance:none;height:6px;background:rgba(255,212,74,0.15);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold);cursor:pointer}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{background:rgba(74,209,255,0.1);border:1px solid rgba(74,209,255,0.3);color:var(--cyan);padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:600}
#info{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:20;max-width:90vw;text-align:center}
.info-card{pointer-events:auto;background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:12px 16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:pop 0.2s cubic-bezier(0.2,0.8,0.2,1.2)}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.info-title{font-weight:700;color:var(--gold);font-size:1rem;margin-bottom:4px}
.info-body{font-size:0.85rem;color:var(--fg);line-height:1.5}
.info-dist{color:var(--cyan);font-size:0.75rem;margin-top:4px}
.btn-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.small{font-size:0.75rem;padding:8px 10px}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="top" class="panel">
    <h1>🌌 Sternenhimmel Simulator</h1>
    <div class="row">
      <label>Standort</label>
      <input id="locInput" placeholder="z.B. München, Deutschland" style="min-width:220px">
      <button id="btnGPS" class="btn-icon" title="Aktuellen Standort nutzen">📍</button>
      <button id="btnGeo" class="btn-icon primary" title="Standort suchen">🔍</button>
    </div>
    <div class="row" style="margin-top:8px">
      <span class="chip" id="locDisplay">Standort wird geladen…</span>
    </div>
  </div>

  <div id="left" class="panel slider-wrap">
    <label>Zeit</label>
    <div class="row" style="gap:6px;align-items:center">
      <button id="btnTimeBack" class="small" title="1 Stunde zurück">⏪</button>
      <input id="timeSlider" type="range" min="-43200" max="43200" value="0" step="60" title="±12 Stunden" style="flex:1">
      <button id="btnTimeFwd" class="small" title="1 Stunde vorwärts">⏩</button>
    </div>
    <span id="timeDisplay" style="min-width:80px;color:var(--gold);font-variant-numeric:tabular-nums;font-size:0.85rem">Jetzt</span>
    <button id="btnNow" class="small">Jetzt</button>
    <button id="btnPlay" class="small">▶</button>
  </div>

  <div id="right" class="panel">
    <div class="row">
      <button id="btnConstell" class="small">☰ Sternbilder</button>
      <button id="btnNames" class="small">🏷 Namen</button>
      <button id="btnPlanets" class="small">🪐 Planeten</button>
      <button id="btnGrid" class="small">📐 Grid</button>
    </div>
    <div class="row" style="margin-top:6px">
      <button id="btnMilkyWay" class="small">☁ Milchstraße</button>
      <button id="btnCompass" class="small">🧭 Kompass</button>
    </div>
  </div>

  <div id="bottom" class="panel slider-wrap">
    <label>Zoom</label>
    <input id="zoomSlider" type="range" min="30" max="120" value="60" step="1">
    <span id="zoomDisplay" style="min-width:45px;color:var(--gold)">60°</span>
  </div>
</div>

<div id="info"></div>

// ──────────────────────────────────────────────────────────────
//  MATHEMATIK & KOORDINATENTRANSFORMATION
// ──────────────────────────────────────────────────────────────

const D2R = Math.PI/180, R2D = 180/Math.PI, TAU = 2*Math.PI
const J2000 = new Date('2000-01-01T12:00:00Z').getTime()/86400000

function norm(a){ while(a<0)a+=TAU; while(a>=TAU)a-=TAU; return a }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)) }

function julianDay(date){ return date.getTime()/86400000 + 2440587.5 }
function centuryFromJ2000(jd){ return (jd - 2451545.0)/36525 }

function earthPos(T){
  const L = norm(280.46646*D2R + 36000.76983*D2R*T)
  const g = norm(357.52911*D2R + 35999.05029*D2R*T)
  const lambda = L + 1.9146*D2R*Math.sin(g) + 0.01999*D2R*Math.sin(2*g)
  const R = 1.00014 - 0.01671*Math.cos(g) - 0.00014*Math.cos(2*g)
  return {lambda, R}
}

function planetPos(idx, T){
  const [name,sym,color,P,a,i,e] = PLANETS[idx]
  if(name==='Mond') return moonPos(T)
  const n = TAU/P * 365.25
  const M = norm(n*T)
  let E = M + e*Math.sin(M)
  for(let k=0;k<4;k++) E = M + e*Math.sin(E)
  const v = 2*Math.atan(Math.sqrt((1+e)/(1-e))*Math.tan(E/2))
  const r = a*(1-e*Math.cos(E))
  const theta = v
  const xh = r*Math.cos(theta)
  const yh = r*Math.sin(theta)*Math.cos(i*D2R)
  const zh = r*Math.sin(theta)*Math.sin(i*D2R)
  const {lambda, R} = earthPos(T)
  const xe = R*Math.cos(lambda)
  const ye = R*Math.sin(lambda)
  const x = xh - xe
  const y = yh - ye
  const z = zh
  const dist = Math.sqrt(x*x+y*y+z*z)
  const ra = Math.atan2(y, x)
  const dec = Math.asin(z/dist)
  return {ra:norm(ra), dec, dist, name, sym, color, mag: calcMag(dist, idx)}
}

function moonPos(T){
  const L = norm(218.316*D2R + 481267.881*D2R*T)
  const M = norm(134.963*D2R + 477198.867*D2R*T)
  const F = norm(93.272*D2R + 483202.017*D2R*T)
  const lon = L + 6.289*D2R*Math.sin(M) + 1.274*D2R*Math.sin(2*F-M) + 0.658*D2R*Math.sin(2*F)
  const lat = 5.128*D2R*Math.sin(F) + 0.280*D2R*Math.sin(M+F) + 0.277*D2R*Math.sin(M-F)
  const dist = 385000 - 20905*Math.cos(M) - 3699*Math.cos(2*F-M)
  const ra = lon, dec = lat
  return {ra:norm(ra), dec, dist:dist/149597870.7, name:'Mond', sym:'☽', color:'#f0f0f0', mag:-12.7}
}

function calcMag(dist, idx){
  const absMag = [-0.4,-4.4,-3.9,-1.5,-9.4,-8.9,-7.1,-6.9,-12.7][idx]
  return absMag + 5*Math.log10(dist)
}

function eq2hor(ra, dec, lat, lon, lst){
  const ha = norm(lst - ra)
  const sinDec = Math.sin(dec), cosDec = Math.cos(dec)
  const sinLat = Math.sin(lat), cosLat = Math.cos(lat)
  const sinAlt = sinDec*sinLat + cosDec*cosLat*Math.cos(ha)
  const alt = Math.asin(clamp(sinAlt,-1,1))
  let az = Math.atan2(-Math.sin(ha), Math.tan(dec)*cosLat - sinLat*Math.cos(ha))
  if(az<0) az+=TAU
  return {alt, az}
}

function localSiderealTime(jd, lon){
  const T = (jd - 2451545.0)/36525
  let gmst = 280.46061837 + 360.98564736629*(jd-2451545.0) + 0.000387933*T*T - T*T*T/38710000
  return norm((gmst + lon)*D2R)
}

  H = canvas.height = Math.floor(innerHeight*DPR)

}

let cam = {az:0.2, alt:0.37, fov:60*D2R, targetAlt:0.37, targetAz:0.2}

function projectStar(ra, dec, lst){
  const {alt, az} = eq2hor(ra, dec, observer.lat, observer.lon, lst)
  if(alt <= 0) return null
  const dAz = norm(az - cam.az)
  const dAlt = alt - cam.alt
  const cosC = Math.sin(cam.alt)*Math.sin(alt) + Math.cos(cam.alt)*Math.cos(alt)*Math.cos(dAz)
  if(cosC <= 0) return null
  const sinC = Math.sqrt(1-cosC*cosC)
  const x = Math.cos(alt)*Math.sin(dAz)/sinC
  const y = (Math.sin(alt)*Math.cos(cam.alt) - Math.cos(alt)*Math.sin(cam.alt)*Math.cos(dAz))/sinC
  const scale = 0.5*Math.min(W,H)/DPR / Math.tan(cam.fov/2)
  return {x:W/(2*DPR)+x*scale, y:H/(2*DPR)-y*scale, alt, az, dist:cosC}
}

function drawBackground(){
  // Dunkler Nachthimmel mit subtiler Vignette
  // ctx.setTransform(1, 0, 0, 1, 0, 0) entfernt - nutzt DPR-Transform aus render()
  const grad = ctx.createRadialGradient(W/(2*DPR), H/(2*DPR), 0, W/(2*DPR), H/(2*DPR), Math.max(W,H)/(2*DPR));
  grad.addColorStop(0, '#080818');
  grad.addColorStop(1, '#020208');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W/DPR, H/DPR);
}

function drawMilkyWay(lst){
  if(!showMW) return
  ctx.save()
  ctx.globalAlpha=0.04
  ctx.strokeStyle='#fff'
  ctx.lineWidth=60
  ctx.lineCap='round'
  ctx.beginPath()
  let first=true
  for(let ra=0; ra<TAU; ra+=0.02){
    const dec = -0.05*Math.sin(ra*2) + 0.02*Math.sin(ra*5)
    const p = projectStar(ra, dec, lst)
    if(p){
      if(first){ ctx.moveTo(p.x,p.y); first=false }
      else ctx.lineTo(p.x,p.y)
    }
  }
  ctx.stroke()
  ctx.restore()
}

function drawGrid(lst){
  if(!showGrid) return
  ctx.save()
  ctx.strokeStyle='rgba(255,212,74,0.05)'; ctx.lineWidth=1
  // Azimuth Linien
  for(let az=0; az<TAU; az+=TAU/12){
    ctx.beginPath()
    let first=true
    for(let alt=0.05; alt<Math.PI/2; alt+=0.02){
      const dAz = norm(az - cam.az)
      const cosC = Math.sin(cam.alt)*Math.sin(alt) + Math.cos(cam.alt)*Math.cos(alt)*Math.cos(dAz)
      if(cosC<=0) continue
      const sinC = Math.sqrt(1-cosC*cosC)
      const x = Math.cos(alt)*Math.sin(dAz)/sinC
      const y = (Math.sin(alt)*Math.cos(cam.alt) - Math.cos(alt)*Math.sin(cam.alt)*Math.cos(dAz))/sinC
      const scale = 0.5*Math.min(W,H)/DPR / Math.tan(cam.fov/2)
      if(first){ ctx.moveTo(W/(2*DPR)+x*scale, H/(2*DPR)-y*scale); first=false }
      else ctx.lineTo(W/(2*DPR)+x*scale, H/(2*DPR)-y*scale)
    }
    ctx.stroke()
  }
  // Höhenkreise
  for(let alt=15*D2R; alt<80*D2R; alt+=15*D2R){
    ctx.beginPath()
    let first=true
    for(let az=0; az<=TAU; az+=TAU/60){
      const dAz = norm(az - cam.az)
      const cosC = Math.sin(cam.alt)*Math.sin(alt) + Math.cos(cam.alt)*Math.cos(alt)*Math.cos(dAz)
      if(cosC<=0) continue
      const sinC = Math.sqrt(1-cosC*cosC)
      const x = Math.cos(alt)*Math.sin(dAz)/sinC
      const y = (Math.sin(alt)*Math.cos(cam.alt) - Math.cos(alt)*Math.sin(cam.alt)*Math.cos(dAz))/sinC
      const scale = 0.5*Math.min(W,H)/DPR / Math.tan(cam.fov/2)
      if(first){ ctx.moveTo(W/(2*DPR)+x*scale, H/(2*DPR)-y*scale); first=false }
      else ctx.lineTo(W/(2*DPR)+x*scale, H/(2*DPR)-y*scale)
    }
    ctx.stroke()
  }
  ctx.restore()
}

function drawCompass(){
  if(!showCompass) return
  ctx.save()
  const r=55, cx=W/DPR-r-15, cy=r+15
  ctx.translate(cx,cy)
  ctx.rotate(-cam.az)
  ctx.strokeStyle='rgba(255,212,74,0.3)'; ctx.lineWidth=2
  ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.stroke()
  ctx.fillStyle='var(--gold)'; ctx.font='bold 10px Outfit'; ctx.textAlign='center'; ctx.textBaseline='middle'
  for(let a=0; a<TAU; a+=TAU/8){
    const label = ['N','NO','O','SO','S','SW','W','NW'][a/(TAU/8)]
    const x = Math.sin(a)*r*1.15, y = -Math.cos(a)*r*1.15
    ctx.fillText(label, x, y)
  }
  // Nadel
  ctx.strokeStyle='var(--gold)'; ctx.lineWidth=3
  ctx.beginPath(); ctx.moveTo(0,-r*0.8); ctx.lineTo(0,0); ctx.stroke()
  ctx.restore()
}

function drawStars(lst){
  // Sortiere nach Helligkeit (hellere zuletzt = oben)
  const visible = []
  for(const s of STARS){
    const p = projectStar(s.ra, s.dec, lst)
    if(p){
      // Größe basierend auf Magnitude
            const baseSize = Math.max(2, 8 - s.mag*1.5)
            const size = baseSize * (0.5 + 0.5*p.dist) * (60/cam.fov*R2D)
            visible.push({...s, ...p, size})
    }
  }
  visible.sort((a,b)=>b.mag - a.mag)

  for(const s of visible){
          const brightness = Math.pow(2.512, -s.mag) * s.dist
          const alpha = Math.min(1, brightness * 3)
          const twinkle = 0.8 + 0.2*Math.sin(Date.now()*0.001 + s.ra*100)
          const r = Math.max(1.5, s.size*twinkle)

          // 🔧 VIEWPORT CLIPPING: Skip stars whose glow would be off-screen
          const cvsW = W/DPR, cvsH = H/DPR
          const glowMargin = r + 8
          if (s.x < -glowMargin || s.x > cvsW + glowMargin || s.y < -glowMargin || s.y > cvsH + glowMargin) continue

          ctx.beginPath()
          ctx.arc(s.x, s.y, r, 0, TAU)
          ctx.fillStyle = `rgba(255,255,255,${alpha*twinkle})`
          // DISABLE shadow completely - was causing white canvas bleed
          // ctx.shadowBlur = Math.min(3, s.size)
          // ctx.shadowColor = `rgba(255,255,255,${alpha*0.05})`
          ctx.fill()
        }
  return visible
}

function drawConstellations(lst, visibleStars){
  if(!showConstell) return
  const starMap = {}
  for(const s of visibleStars) starMap[s.name] = s
  
  ctx.save()
  ctx.strokeStyle='rgba(74,209,255,0.3)'
  ctx.lineWidth=1.5
  ctx.lineCap='round'
  ctx.lineJoin='round'
  
  for(const [abbr, names] of Object.entries(CONSTELLATIONS)){
    const pts = names.map(n=>starMap[n]).filter(p=>p)
    if(pts.length < 2) continue
    ctx.beginPath()
    ctx.moveTo(pts[0].x, pts[0].y)
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y)
    ctx.stroke()
  }
  ctx.restore()
}

function drawNames(lst, visibleStars){
  if(!showNames) return
  const starMap = {}
  for(const s of visibleStars) starMap[s.name] = s
  
  ctx.save()
  ctx.font='11px Outfit'
  ctx.textAlign='center'
  ctx.textBaseline='bottom'
  
  for(const [abbr, names] of Object.entries(CONSTELLATIONS)){
    const pts = names.map(n=>starMap[n]).filter(p=>p)
    if(pts.length === 0) continue
    // Nur hellster Stern des Sternbildes beschriften
    const brightest = pts.reduce((a,b)=>a.mag<b.mag?a:b)
    if(brightest.mag < 2.5){
      ctx.fillStyle='rgba(255,212,74,0.9)'
      ctx.fillText(brightest.name, brightest.x, brightest.y - brightest.size - 4)
    }
  }
  ctx.restore()
}

function drawPlanets(lst){
  if(!showPlanets) return
  const jd = julianDay(new Date(Date.now() + timeOffset*1000))
  const T = centuryFromJ2000(jd)
  
  ctx.save()
  ctx.font='14px Outfit'
  ctx.textAlign='center'
  ctx.textBaseline='middle'
  
  for(let i=0;i<PLANETS.length;i++){
    const pl = planetPos(i, T)
    const p = projectStar(pl.ra, pl.dec, lst)
    if(!p) continue
    
    // Planetenscheibe
    const size = Math.max(8, 12 * (60/cam.fov*R2D))
    const grad = ctx.createRadialGradient(p.x-size*0.3, p.y-size*0.3, 0, p.x, p.y, size)
    grad.addColorStop(0, pl.color+'ee')
    grad.addColorStop(1, pl.color+'88')
    ctx.beginPath()
    ctx.arc(p.x, p.y, size, 0, TAU)
    ctx.fillStyle = grad
    // Disable shadow to prevent white canvas bleed
    // ctx.shadowBlur = 4
    // ctx.shadowColor = pl.color+'44'
    ctx.fill()
    // ctx.shadowBlur = 0
    
    // Planetensymbol
    ctx.fillStyle = '#fff'
    ctx.font = 'bold 16px Outfit'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText(pl.sym, p.x, p.y)
    
    // Planetenname
    ctx.font = '10px Outfit'
    ctx.fillStyle = 'rgba(255,255,255,0.8)'
    ctx.textBaseline = 'top'
    ctx.fillText(pl.name, p.x, p.y + size + 2)
  }
  ctx.restore()
}

// ──────────────────────────────────────────────────────────────
//  INFO-CARD (Hover/Tap)
// ──────────────────────────────────────────────────────────────

function showInfo(obj, x, y){
  const info = document.getElementById('info')
  if(!obj){
    info.innerHTML = ''
    return
  }
  let html = `<div class="info-card">`
  html += `<div class="info-title">${obj.name || 'Unbekannt'}</div>`
  html += `<div class="info-body">`
  if(obj.bayer) html += `${obj.bayer}<br>`
  if(obj.mag !== undefined) html += `Helligkeit: ${obj.mag.toFixed(2)} mag<br>`
  if(obj.dist !== undefined) html += `<span class="info-dist">Entfernung: ${obj.dist.toFixed(2)} AE</span>`
  if(obj.alt !== undefined) html += `<br>Höhe: ${(obj.alt*R2D).toFixed(1)}° · Azimut: ${(obj.az*R2D).toFixed(1)}°`
  html += `</div></div>`
  info.innerHTML = html
}

// ──────────────────────────────────────────────────────────────
//  HAUPT-RENDER-LOOP
// ──────────────────────────────────────────────────────────────

function render(){
  const now = new Date(Date.now() + timeOffset*1000)
  const jd = julianDay(now)
  const lst = localSiderealTime(jd, observer.lon)
  
  // Kamera sanft bewegen
  cam.alt += (cam.targetAlt - cam.alt) * 0.05
  cam.az += (cam.targetAz - cam.az) * 0.05
  
  // 🔧 EXPLIZITES CLEAR + DUNKER HINTERGRUND (fixes white canvas)
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0)
  ctx.fillStyle = '#030310'
  ctx.fillRect(0, 0, W/DPR, H/DPR)
  
  drawBackground()
  drawMilkyWay(lst)
  drawGrid(lst)
  
  const visibleStars = drawStars(lst)
  drawConstellations(lst, visibleStars)
  drawNames(lst, visibleStars)
  drawPlanets(lst)
  drawCompass()
  
  requestAnimationFrame(render)
}

// Maus-Drag
let isDragging = false
let dragStartX = 0, dragStartY = 0
let dragStartAz = 0, dragStartAlt = 0

canvas.addEventListener('mousedown', e => {
  isDragging = true
  dragStartX = e.clientX
  dragStartY = e.clientY
  dragStartAz = cam.targetAz
  dragStartAlt = cam.targetAlt
})

canvas.addEventListener('mousemove', e => {
  if(isDragging){
    const dx = e.clientX - dragStartX
    const dy = e.clientY - dragStartY
    const sens = 0.005 * (cam.fov*R2D/60)
    cam.targetAz = norm(dragStartAz - dx * sens)
    cam.targetAlt = clamp(dragStartAlt + dy * sens, 5*D2R, 85*D2R)
  }
  
  // Hover-Info
  if(!isDragging){
    const rect = canvas.getBoundingClientRect()
    const mx = e.clientX - rect.left
    const my = e.clientY - rect.top
    const now = new Date(Date.now() + timeOffset*1000)
    const jd = julianDay(now)
    const lst = localSiderealTime(jd, observer.lon)
    
    let found = null
    for(const s of STARS){
      const p = projectStar(s.ra, s.dec, lst)
      if(p && Math.abs(p.x - mx) < 15 && Math.abs(p.y - my) < 15){
        found = {name: s.name, bayer: s.bayer, mag: s.mag, alt: p.alt, az: p.az}
        break
      }
    }
    if(!found){
      const jd2 = julianDay(new Date(Date.now() + timeOffset*1000))
      const T = centuryFromJ2000(jd2)
      for(let i=0;i<PLANETS.length;i++){
        const pl = planetPos(i, T)
        const p = projectStar(pl.ra, pl.dec, lst)
        if(p && Math.abs(p.x - mx) < 20 && Math.abs(p.y - my) < 20){
          found = {name: pl.name, mag: pl.mag, dist: pl.dist, alt: p.alt, az: p.az}
          break
        }
      }
    }
    showInfo(found, e.clientX, e.clientY)
  }
})

canvas.addEventListener('mouseup', () => { isDragging = false })
canvas.addEventListener('mouseleave', () => { isDragging = false; showInfo(null) })

// Touch-Events
let touches = []
let lastTouchDist = 0
let touchStartAz = 0, touchStartAlt = 0

canvas.addEventListener('touchstart', e => {
  e.preventDefault()
  touches = Array.from(e.touches)
  if(touches.length === 1){
    isDragging = true
    dragStartX = touches[0].clientX
    dragStartY = touches[0].clientY
    dragStartAz = cam.targetAz
    dragStartAlt = cam.targetAlt
  } else if(touches.length === 2){
    isDragging = false
    lastTouchDist = Math.hypot(
      touches[0].clientX - touches[1].clientX,
      touches[0].clientY - touches[1].clientY
    )
  }
})

canvas.addEventListener('touchmove', e => {
  e.preventDefault()
  const newTouches = Array.from(e.touches)
  if(newTouches.length === 1 && touches.length === 1){
    const dx = newTouches[0].clientX - dragStartX
    const dy = newTouches[0].clientY - dragStartY
    const sens = 0.005 * (cam.fov*R2D/60)
    cam.targetAz = norm(dragStartAz - dx * sens)
    cam.targetAlt = clamp(dragStartAlt + dy * sens, 5*D2R, 85*D2R)
  } else if(newTouches.length === 2){
    const dist = Math.hypot(
      newTouches[0].clientX - newTouches[1].clientX,
      newTouches[0].clientY - newTouches[1].clientY
    )
    const zoomFactor = lastTouchDist / dist
    const newFov = clamp(cam.fov * zoomFactor, 20*D2R, 120*D2R)
    cam.fov = newFov
    document.getElementById('zoomSlider').value = cam.fov*R2D
    document.getElementById('zoomDisplay').textContent = Math.round(cam.fov*R2D)+'°'
    lastTouchDist = dist
  }
  touches = newTouches
})

canvas.addEventListener('touchend', e => {
  e.preventDefault()
  touches = Array.from(e.touches)
  if(touches.length === 0){
    isDragging = false
    // Tap-Info
    if(e.changedTouches.length === 1){
      const touch = e.changedTouches[0]
      const rect = canvas.getBoundingClientRect()
      const mx = touch.clientX - rect.left
      const my = touch.clientY - rect.top
      const now = new Date(Date.now() + timeOffset*1000)
      const jd = julianDay(now)
      const lst = localSiderealTime(jd, observer.lon)
      
      let found = null
      for(const s of STARS){
        const p = projectStar(s.ra, s.dec, lst)
        if(p && Math.abs(p.x - mx) < 20 && Math.abs(p.y - my) < 20){
          found = {name: s.name, bayer: s.bayer, mag: s.mag, alt: p.alt, az: p.az}
          break
        }
      }
      if(!found){
        const jd2 = julianDay(new Date(Date.now() + timeOffset*1000))
        const T = centuryFromJ2000(jd2)
        for(let i=0;i<PLANETS.length;i++){
          const pl = planetPos(i, T)
          const p = projectStar(pl.ra, pl.dec, lst)
          if(p && Math.abs(p.x - mx) < 25 && Math.abs(p.y - my) < 25){
            found = {name: pl.name, mag: pl.mag, dist: pl.dist, alt: p.alt, az: p.az}
            break
          }
        }
      }
      if(found) showInfo(found, touch.clientX, touch.clientY)
      else showInfo(null)
    }
  }
})

// Mausrad-Zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault()
  const delta = e.deltaY > 0 ? 1.05 : 0.95
  cam.fov = clamp(cam.fov * delta, 20*D2R, 120*D2R)
  document.getElementById('zoomSlider').value = cam.fov*R2D
  document.getElementById('zoomDisplay').textContent = Math.round(cam.fov*R2D)+'°'
}, {passive:false})

// Zeitslider
document.getElementById('timeSlider').addEventListener('input', function(){
  timeOffset = parseFloat(this.value)
  updateTimeDisplay()
})

function updateTimeDisplay(){
  const el = document.getElementById('timeDisplay')
  const offset = timeOffset
  if(Math.abs(offset) < 60){
    el.textContent = 'Jetzt'
  } else {
    const mins = Math.round(offset/60)
    const h = Math.floor(Math.abs(mins)/60)
    const m = Math.abs(mins)%60
    const sign = mins < 0 ? '-' : '+'
    el.textContent = `${sign}${h}h${m.toString().padStart(2,'0')}m`
  }
}

document.getElementById('btnNow').addEventListener('click', function(){
  timeOffset = 0
  document.getElementById('timeSlider').value = 0
  updateTimeDisplay()
})

document.getElementById('btnTimeBack').addEventListener('click', function(){
  timeOffset -= 3600
  if(timeOffset < -43200) timeOffset = 43200
  document.getElementById('timeSlider').value = timeOffset
  updateTimeDisplay()
})

document.getElementById('btnTimeFwd').addEventListener('click', function(){
  timeOffset += 3600
  if(timeOffset > 43200) timeOffset = -43200
  document.getElementById('timeSlider').value = timeOffset
  updateTimeDisplay()
})

// Play/Pause
document.getElementById('btnPlay').addEventListener('click', function(){
  animating = !animating
  this.textContent = animating ? '⏸' : '▶'
  if(animating) animateTime()
})

function animateTime(){
  if(!animating) return
  timeOffset += 60 * animSpeed * animDir
  if(timeOffset > 43200) timeOffset = -43200
  if(timeOffset < -43200) timeOffset = 43200
  document.getElementById('timeSlider').value = timeOffset
  updateTimeDisplay()
  setTimeout(animateTime, 100)
}

// Zoom-Slider
document.getElementById('zoomSlider').addEventListener('input', function(){
  cam.fov = parseFloat(this.value) * D2R
  document.getElementById('zoomDisplay').textContent = this.value+'°'
})

// ──────────────────────────────────────────────────────────────

// GPS
document.getElementById('btnGPS').addEventListener('click', function(){
  if(!navigator.geolocation){
    alert('Geolokalisierung wird von Ihrem Browser nicht unterstützt.')
    return
  }
  this.textContent = '⏳'
  navigator.geolocation.getCurrentPosition(
    pos => {
      observer.lat = pos.coords.latitude * D2R
      observer.lon = pos.coords.longitude * D2R
      observer.name = `${pos.coords.latitude.toFixed(4)}°, ${pos.coords.longitude.toFixed(4)}°`
      document.getElementById('locDisplay').textContent = observer.name
      this.textContent = '📍'
      // Reverse-Geocoding
      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&accept-language=de`)
        .then(r=>r.json())
        .then(data => {
          if(data && data.display_name){
            const parts = data.display_name.split(',')
            observer.name = parts.slice(0,3).join(',').trim()
            document.getElementById('locDisplay').textContent = observer.name
          }
        })
        .catch(()=>{})
    },
    err => {
      alert('Standort konnte nicht ermittelt werden: ' + err.message)
      this.textContent = '📍'
    },
    {enableHighAccuracy:true, timeout:10000}
  )
})

// Standort-Suche
document.getElementById('btnGeo').addEventListener('click', function(){
  const query = document.getElementById('locInput').value.trim()
  if(!query) return
  this.textContent = '⏳'
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&accept-language=de`)
    .then(r=>r.json())
    .then(data => {
      if(data && data.length > 0){
        observer.lat = parseFloat(data[0].lat) * D2R
        observer.lon = parseFloat(data[0].lon) * D2R
        observer.name = data[0].display_name.split(',').slice(0,3).join(',').trim()
        document.getElementById('locDisplay').textContent = observer.name
      } else {
        alert('Kein Ort gefunden.')
      }
      this.textContent = '🔍'
    })
    .catch(() => {
      alert('Fehler bei der Suche.')
      this.textContent = '🔍'
    })
})

// Enter-Taste im Eingabefeld
document.getElementById('locInput').addEventListener('keydown', e => {
