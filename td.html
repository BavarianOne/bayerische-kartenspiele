<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Defense 3D</title>
  <link rel="stylesheet" href="td.css">
  <script src="three.min.js"></script>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="debug" style="position:absolute;top:50px;left:10px;color:#0f0;background:rgba(0,0,0,0.8);padding:8px;font-size:12px;z-index:500;font-family:monospace;max-width:400px;white-space:pre-wrap;pointer-events:none;"></div>

  <!-- Start Overlay -->
  <div id="startOverlay" class="overlay show">
    <div class="card">
      <h1>🏰 Medieval Defense</h1>
      <p>Defend your castle against waves of enemies!<br>Place towers strategically along the path to stop them.</p>
      <button id="startBtn" class="btn">▶ Start Game</button>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="gameOver" class="overlay">
    <div class="card">
      <h1>💀 Game Over</h1>
      <p>You survived <span id="goWaves">0</span> waves<br>Score: <span id="goScore">0</span></p>
      <button id="restartBtn" class="btn">🔄 Play Again</button>
    </div>
  </div>

  <!-- Build Panel -->
  <div id="buildPanel"></div>

  <div id="topBar">
    <div class="stat"><span class="icon">🪙</span><span id="gold">300</span></div>
    <div class="stat"><span class="icon">❤️</span><span id="lives">20</span></div>
    <div class="stat"><span class="icon">🌊</span><span id="wave">1</span></div>
    <div class="stat"><span class="icon">📊</span><span id="score">0</span></div>
  </div>

  <script src="td.js"></script>
</body>
</html>
