                ctx.shadowBlur = 15;
                
                ctx.beginPath();
                ctx.moveTo(0, -s);
                ctx.lineTo(s, 0);
                ctx.lineTo(0, s);
                ctx.lineTo(-s, 0);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // 2X text
                ctx.fillStyle = CONFIG.COLORS.WHITE;
                ctx.font = `bold ${s * 0.8}px Courier New`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('2X', 0, s * 0.1);
            }
            
            renderShield(ctx, cx, cy, size, color, glowColor) {
                ctx.translate(cx, cy);
                const s = size * 1.4;
                
                // Hexagon shield
                ctx.fillStyle = Math3D.hexToRgba(color, 0.3);
                ctx.strokeStyle = glowColor;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 20;
                
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * s;
                    const y = Math.sin(angle) * s;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // Inner pulse
                const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
                ctx.strokeStyle = Math3D.hexToRgba(glowColor, pulse);
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * s * 0.6;
                    const y = Math.sin(angle) * s * 0.6;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
        }
        
        // ============================================
        // GAME MANAGER
        // ============================================
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let canvasWidth = CONFIG.DESIGN_WIDTH;
        let canvasHeight = CONFIG.DESIGN_HEIGHT;
        
        // Game State
        const GAME_STATES = { START: 0, PLAYING: 1, LEVEL_UP: 2, GAME_OVER: 3 };
        let gameState = GAME_STATES.START;
        let animationId = null;
        let lastTime = 0;
        
        // Game Objects
        let input = null;
        let particles = null;
        let background = null;
        let player = null;
        let obstacles = [];
        let collectibles = [];
        
        // Game Variables
        let score = 0;
        let distance = 0;
        let phase = 1;
        let speed = CONFIG.INITIAL_SPEED;
        let spawnTimer = 0;
        let spawnInterval = CONFIG.BASE_SPAWN_INTERVAL;
        let multiplier = 1;
        let multiplierTimer = 0;
        let coins = 0;
        let bestDistance = parseInt(localStorage.getItem('nv_best_distance') || '0');
        let bestCoins = parseInt(localStorage.getItem('nv_best_coins') || '0');
        let phaseTransition = false;
        let phaseTransitionTimer = 0;
        
        // Power-ups
        let activePowerups = {
            magnet: 0,
            jetpack: 0,
            sneakers: 0,
            multiplier: 0,
            shield: 0
        };
        
        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const levelUpScreen = document.getElementById('level-up-screen');
        const hudTop = document.getElementById('hud-top');
        const laneIndicator = document.getElementById('lane-indicator');
        const distanceValue = document.getElementById('distance-value');
        const levelValue = document.getElementById('level-value');
        const multiplierValue = document.getElementById('multiplier-value');
        const finalDistance = document.getElementById('final-distance');
        const bestDistanceEl = document.getElementById('best-distance');
        const finalLevel = document.getElementById('final-level');
        const finalCoins = document.getElementById('final-coins');
        const levelUpNumber = document.getElementById('level-up-number');
        
        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            input = new InputManager();
            particles = new ParticleSystem();
            background = new Background3D();
            player = new Player3D();
            
            // Event listeners
            document.getElementById('btn-start').addEventListener('click', startGame);
            document.getElementById('btn-restart').addEventListener('click', startGame);
            document.getElementById('btn-menu').addEventListener('click', showStartScreen);
            
            // Touch control for lane change (screen halves)
            canvas.addEventListener('touchstart', handleCanvasTouch, { passive: false });
            canvas.addEventListener('click', handleCanvasClick);
            
            updateBestDistanceDisplay();
            requestAnimationFrame(gameLoop);
        }
        
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            const maxWidth = rect.width;
            const maxHeight = rect.height;
            
            // Maintain 16:9 aspect ratio
            const aspectRatio = CONFIG.DESIGN_WIDTH / CONFIG.DESIGN_HEIGHT;
            let width = maxWidth;
            let height = width / aspectRatio;
            
            if (height > maxHeight) {
                height = maxHeight;
                width = height * aspectRatio;
            }
            
            canvasWidth = width;
            canvasHeight = height;
            canvas.width = width;
            canvas.height = height;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }
        
        function handleCanvasTouch(e) {
            if (gameState !== GAME_STATES.PLAYING) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const laneChange = touch.clientX < centerX ? -1 : 1;
            
            const newLane = Math3D.clamp(player.targetLane + laneChange, 0, CONFIG.LANE_COUNT - 1);
            if (newLane !== player.targetLane) {
                player.targetLane = newLane;
                player.laneSwitchProgress = 0;
                const proj = player.getScreenPos(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
                particles.addLaneTrail(proj.x, proj.y, player.glowColor);
                if (navigator.vibrate) navigator.vibrate(20);
            }
        }
        
        function handleCanvasClick(e) {
            if (gameState !== GAME_STATES.PLAYING) return;
            if (input.isMobile) return; // Handled by touch
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const laneChange = e.clientX < centerX ? -1 : 1;
            
            const newLane = Math3D.clamp(player.targetLane + laneChange, 0, CONFIG.LANE_COUNT - 1);
            if (newLane !== player.targetLane) {
                player.targetLane = newLane;
                player.laneSwitchProgress = 0;
                const proj = player.getScreenPos(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
                particles.addLaneTrail(proj.x, proj.y, player.glowColor);
            }
        }
        
        // ============================================
        // GAME STATE MANAGEMENT
        // ============================================
        function startGame() {
            gameState = GAME_STATES.PLAYING;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            levelUpScreen.classList.add('hidden');
            hudTop.classList.remove('hidden');
            laneIndicator.classList.remove('hidden');
            
            // Reset game variables
            score = 0;
            distance = 0;
            phase = 1;
            speed = CONFIG.INITIAL_SPEED;
            spawnTimer = 0;
            spawnInterval = CONFIG.BASE_SPAWN_INTERVAL;
            multiplier = 1;
            multiplierTimer = 0;
            coins = 0;
            phaseTransition = false;
            phaseTransitionTimer = 0;
            
            // Reset powerups
            activePowerups = { magnet: 0, jetpack: 0, sneakers: 0, multiplier: 0, shield: 0 };
            
            // Reset objects
            player = new Player3D();
            player.setPhase(phase);
            obstacles = [];
            collectibles = [];
            particles = new ParticleSystem();
            background = new Background3D();
            
            updateHUD();
            updateLaneIndicator();
        }
        
        function showStartScreen() {
            gameState = GAME_STATES.START;
            startScreen.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
            levelUpScreen.classList.add('hidden');
            hudTop.classList.add('hidden');
            laneIndicator.classList.add('hidden');
        }
        
        function gameOver() {
            gameState = GAME_STATES.GAME_OVER;
            hudTop.classList.add('hidden');
            laneIndicator.classList.add('hidden');
            
            // Update best distance
            if (distance > bestDistance) {
                bestDistance = Math.floor(distance);
                localStorage.setItem('nv_best_distance', bestDistance.toString());
            }
            if (coins > bestCoins) {
                bestCoins = coins;
                localStorage.setItem('nv_best_coins', bestCoins.toString());
            }
            
            finalDistance.textContent = Math.floor(distance) + 'm';
            bestDistanceEl.textContent = bestDistance + 'm';
            finalLevel.textContent = phase;
            finalCoins.textContent = coins;
            
            gameOverScreen.classList.remove('hidden');
            
            // Crash particles
            const proj = player.getScreenPos(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
            particles.addCrash(proj.x, proj.y, player.glowColor);
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
        
        function triggerPhaseUp(newPhase) {
            phase = newPhase;
            phaseTransition = true;
            phaseTransitionTimer = 1.5; // seconds
            
            // Visual feedback
            levelUpScreen.style.setProperty('--flash-color', CONFIG.PHASE_COLORS[(phase - 1) % CONFIG.PHASE_COLORS.length].primary);
            levelUpNumber.textContent = phase.toString().padStart(2, '0');
            levelUpScreen.classList.remove('hidden');
            
            // Background transition
            background.setPhase(phase);
            player.setPhase(phase);
            
            // Particles
            const proj = player.getScreenPos(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
            const colors = CONFIG.PHASE_COLORS[(phase - 1) % CONFIG.PHASE_COLORS.length];
            particles.addPhaseShift(proj.x, proj.y, [colors.primary, colors.secondary, colors.accent]);
            
            // Speed increase
            speed = CONFIG.INITIAL_SPEED * (1 + (phase - 1) * CONFIG.SPEED_INCREMENT);
            speed = Math.min(speed, CONFIG.INITIAL_SPEED * CONFIG.MAX_SPEED_MULTIPLIER);
            
            // Spawn rate increase
            spawnInterval = Math.max(CONFIG.MIN_SPAWN_INTERVAL, CONFIG.BASE_SPAWN_INTERVAL - (phase - 1) * 150);
            
            if (navigator.vibrate) navigator.vibrate([50, 30, 50, 30, 100]);
        }
        
        // ============================================
        // SPAWNING SYSTEM
        // ============================================
        function updateSpawning(dt) {
            spawnTimer += dt * 1000;
            
            if (spawnTimer >= spawnInterval) {
                spawnTimer = 0;
                spawnPattern();
            }
        }
        
        function spawnPattern() {
            const pattern = CONFIG.PHASE_PATTERNS[Math.min(phase, 5)] || CONFIG.PHASE_PATTERNS[5];
            
            // Determine how many lanes to fill (1-3)
            const lanesToFill = Math3D.randomInt(1, Math.min(3, phase));
            const availableLanes = [0, 1, 2];
            Math3D.shuffle = (arr) => { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; };
            const shuffledLanes = Math3D.shuffle([...availableLanes]);
            const selectedLanes = shuffledLanes.slice(0, lanesToFill);
            
            // Ensure at least one lane is free
            if (selectedLanes.length === 3) {
                selectedLanes.pop(); // Remove one to leave a path
            }
            
            for (const lane of selectedLanes) {
                // Spawn obstacle
                if (Math.random() < 0.75) { // 75% chance obstacle
                    const obsType = Math3D.weightedChoice(pattern.obstacles, pattern.weights);
                    obstacles.push(new Obstacle3D(lane, CONFIG.HORIZON_Z + Math3D.random(0, 20), obsType));
                }
                
                // Spawn collectible (sometimes in same lane, sometimes different)
                if (Math.random() < 0.4) { // 40% chance collectible
                    const collType = Math3D.weightedChoice(pattern.collectibles, [pattern.coinWeight, ...pattern.collectibles.slice(1).map(() => 0.3)]);
                    collectibles.push(new Collectible3D(lane, CONFIG.HORIZON_Z + Math3D.random(0, 30), collType));
                }
            }
            
            // Sometimes spawn collectibles in empty lanes
            const emptyLanes = [0, 1, 2].filter(l => !selectedLanes.includes(l));
            for (const lane of emptyLanes) {
                if (Math.random() < 0.3) {
                    const collType = Math3D.randomChoice(pattern.collectibles);
                    collectibles.push(new Collectible3D(lane, CONFIG.HORIZON_Z + Math3D.random(0, 30), collType));
                }
            }
        }
        
        // ============================================
        // COLLISION DETECTION
        // ============================================
        function checkCollisions() {
            const playerBox = player.getHitbox(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
            if (!playerBox) return;
            
            // Check obstacles
            for (const obs of obstacles) {
                const obsBox = obs.getHitbox(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
                if (!obsBox) continue;
                
                if (boxesOverlap(playerBox, obsBox)) {
                    if (obs.lethal) {
                        if (activePowerups.shield > 0) {
                            // Shield blocks hit
                            activePowerups.shield = 0;
                            particles.addCrash(obsBox.proj.x, obsBox.proj.y, CONFIG.COLORS.CYAN);
                            if (navigator.vibrate) navigator.vibrate(50);
                        } else if (!player.invincible) {
                            gameOver();
                            return;
                        }
                    }
                }
            }
            
            // Check collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const col = collectibles[i];
                if (col.collected) continue;
                
                const colBox = col.getHitbox(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
                if (!colBox) continue;
                
                // Magnet powerup extends range
                let collectRange = 1.2;
                if (activePowerups.magnet > 0) collectRange = 2.5;
                
                // Check if player is in same lane (lane-based collection)
                const playerLaneCenter = CONFIG.LANE_POSITIONS[player.lane];
                const colLaneCenter = CONFIG.LANE_POSITIONS[col.lane];
                const laneDist = Math.abs(playerLaneCenter - colLaneCenter);
                
                if (laneDist < 0.1 || activePowerups.magnet > 0) {
                    // Same lane or magnet active - check screen overlap
                    if (boxesOverlap(playerBox, colBox)) {
                        collectItem(col, i);
                    }
                }
            }
        }
        
        function boxesOverlap(box1, box2) {
            return box1.x < box2.x + box2.w &&
                   box1.x + box1.w > box2.x &&
                   box1.y < box2.y + box2.h &&
                   box1.y + box1.h > box2.y;
        }
        
        function collectItem(col, index) {
            col.collected = true;
            collectibles.splice(index, 1);
            
            const proj = col.getHitbox(canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
            if (proj) {
                particles.addCollect(proj.proj.x, proj.proj.y, col.config.glow);
            }
            
            if (col.powerup) {
                activatePowerup(col.powerup, col.duration);
                particles.addPowerup(proj.proj.x, proj.proj.y, col.config.glow);
            } else {
                // Coin
                const coinValue = col.value * multiplier;
                coins += col.value;
                score += coinValue;
                multiplier = Math.min(CONFIG.MULTIPLIER_MAX, multiplier + CONFIG.MULTIPLIER_INCREMENT);
                multiplierTimer = 3; // Reset multiplier decay timer
            }
            
            updateHUD();
        }
        
        function activatePowerup(type, duration) {
            activePowerups[type] = duration;
            
            // Visual feedback
            switch (type) {
                case 'magnet':
                    // Magnet attracts coins from adjacent lanes
                    break;
                case 'jetpack':
                    // Jetpack - could make player fly over obstacles (simplified: invincibility)
                    player.makeInvincible();
                    break;
                case 'sneakers':
                    // Super sneakers - higher jump (not applicable in lane runner, maybe speed boost)
                    speed *= 1.3;
                    break;
                case 'multiplier':
                    multiplier = Math.min(CONFIG.MULTIPLIER_MAX, multiplier * 2);
                    break;
                case 'shield':
                    // Shield blocks one hit
                    break;
            }
        }
        
        function updatePowerups(dt) {
            for (const key in activePowerups) {
                if (activePowerups[key] > 0) {
                    activePowerups[key] -= dt * 1000;
                    if (activePowerups[key] <= 0) {
                        activePowerups[key] = 0;
                        // Revert effects
                        if (key === 'sneakers') speed = CONFIG.INITIAL_SPEED * (1 + (phase - 1) * CONFIG.SPEED_INCREMENT);
                    }
                }
            }
            
            // Multiplier decay
            if (multiplier > 1) {
                multiplierTimer -= dt;
                if (multiplierTimer <= 0) {
                    multiplier = Math.max(1, multiplier - CONFIG.MULTIPLIER_DECAY * dt);
                }
            }
        }
        
        // ============================================
        // UPDATE LOOP
        // ============================================
        function update(dt) {
            if (gameState !== GAME_STATES.PLAYING) return;
            
            // Update distance & score
            distance += speed * dt;
            score += Math.floor(speed * dt * CONFIG.DISTANCE_SCORE_RATE * multiplier);
            
            // Check phase up
            const newPhase = getPhaseFromDistance(distance);
            if (newPhase > phase) {
                triggerPhaseUp(newPhase);
            }
            
            // Phase transition timer
            if (phaseTransition) {
                phaseTransitionTimer -= dt;
                if (phaseTransitionTimer <= 0) {
                    phaseTransition = false;
                    levelUpScreen.classList.add('hidden');
                }
            }
            
            // Update game objects
            player.update(dt, input, speed);
            background.update(dt, speed, distance);
            particles.update(dt);
            updatePowerups(dt);
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update(dt, speed);
                if (obstacles[i].isBehindCamera()) obstacles.splice(i, 1);
            }
            
            // Update collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                collectibles[i].update(dt, speed);
                if (collectibles[i].isBehindCamera()) collectibles.splice(i, 1);
            }
            
            // Spawn new entities
            updateSpawning(dt);
            
            // Check collisions
            checkCollisions();
            
            // Update HUD
            updateHUD();
            updateLaneIndicator();
        }
        
        // ============================================
        // RENDER LOOP
        // ============================================
        function render() {
            // Clear
            ctx.fillStyle = CONFIG.COLORS.BG_DARK;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            // Render background (3D)
            background.render(ctx, canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
            
            // Render entities (far to near for proper occlusion)
            // Collect all entities with their Z
            const allEntities = [];
            for (const obs of obstacles) allEntities.push({ z: obs.z, obj: obs, type: 'obstacle' });
            for (const col of collectibles) allEntities.push({ z: col.z, obj: col, type: 'collectible' });
            // Sort by Z descending (far to near)
            allEntities.sort((a, b) => b.z - a.z);
            
            const colors = background.getColors();
            
            for (const ent of allEntities) {
                ent.obj.render(ctx, canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH, colors);
            }
            
            // Render player (always at front)
            player.render(ctx, canvasWidth, canvasHeight, CONFIG.FOCAL_LENGTH);
            
            // Render particles
            particles.render(ctx, 1);
        }
        
        // ============================================
        // HUD & UI
        // ============================================
        function updateHUD() {
            distanceValue.textContent = Math.floor(distance) + 'm';
            levelValue.textContent = phase;
            multiplierValue.textContent = 'x' + multiplier.toFixed(1);
        }
        
        function updateLaneIndicator() {
            const dots = laneIndicator.querySelectorAll('.lane-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === player.lane);
            });
        }
        
        function updateBestDistanceDisplay() {
            bestDistanceEl.textContent = bestDistance + 'm';
        }
        
        // ============================================
        // MAIN GAME LOOP
        // ============================================
        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1); // Cap at 100ms
            lastTime = timestamp;
            
            update(dt);
            render();
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Initialize
        init();
    </script>
</body>
</html>
