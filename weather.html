<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .weather-current {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            margin-bottom: 30px;
        }

        .weather-icon {
            font-size: 120px;
            text-align: center;
        }

        .weather-info h2 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #667eea;
        }

        .weather-info p {
            font-size: 1.2rem;
            color: #666;
            margin: 8px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .detail-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .detail-item label {
            display: block;
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .detail-item value {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .satellite-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .satellite-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .section-title {
            font-size: 1.8rem;
            color: #333;
            margin: 40px 0 20px 0;
            font-weight: bold;
        }

        .hourly-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        .hourly-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            min-width: 80px;
            flex-shrink: 0;
        }

        .hourly-item .time {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .hourly-item .icon {
            font-size: 2rem;
            margin: 8px 0;
        }

        .hourly-item .temp {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .daily-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .daily-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .daily-item h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .daily-item .icon {
            font-size: 3rem;
            margin: 15px 0;
        }

        .daily-item .temps {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }

        .daily-item .max-temp {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .daily-item .min-temp {
            color: #3498db;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .daily-item .description {
            color: #666;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }

        .error {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .location-search {
            margin-bottom: 20px;
        }

        .location-search input {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #667eea;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            transition: border-color 0.3s;
        }

        .location-search input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .location-search button {
            padding: 12px 30px;
            margin-left: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .location-search button:hover {
            transform: translateY(-2px);
        }

        #satelliteMap {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .map-controls {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }

        .map-toggle {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .map-toggle:hover {
            transform: translateY(-2px);
        }

        .map-toggle.active {
            background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%);
        }

        @media (max-width: 768px) {
            .weather-current {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .weather-info h2 {
                font-size: 2rem;
            }

            .main-card {
                padding: 20px;
            }

            .hourly-forecast {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            }

            #satelliteMap {
                height: 300px;
            }

            .map-controls {
                flex-direction: column;
            }

            .map-toggle {
                width: 100%;
            }

            .location-search {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .location-search input {
                max-width: 100%;
            }

            .location-search button {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☀️ Weather Dashboard</h1>
            <p>Your personal weather forecast</p>
        </div>

        <div class="main-card">
            <div class="location-search">
                <input type="text" id="locationInput" placeholder="Enter city name (e.g., Munich, Berlin)">
                <button onclick="searchLocation()">Search</button>
            </div>

            <div id="weatherContent">
                <div class="loading">Loading weather data...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        let map = null;
        let currentLayer = 'satellite';
        let layers = {};

        const weatherIcons = {
            'clear': '☀️',
            'cloudy': '☁️',
            'rainy': '🌧️',
            'snowy': '❄️',
            'stormy': '⛈️',
            'foggy': '🌫️',
            'partly_cloudy': '⛅',
            'drizzle': '🌦️'
        };

        async function getWeatherData(latitude, longitude, locationName) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&temperature_unit=celsius&wind_speed_unit=kmh&precipitation_unit=mm&timezone=auto`
                );

                if (!response.ok) {
                    throw new Error('Weather data not found');
                }

                const data = await response.json();
                displayWeather(data, locationName, latitude, longitude);
            } catch (error) {
                document.getElementById('weatherContent').innerHTML = `<div class="error">Error loading weather data: ${error.message}</div>`;
            }
        }

        async function searchLocation() {
            const input = document.getElementById('locationInput').value.trim();
            if (!input) return;

            try {
                const response = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input)}&count=1`
                );
                const data = await response.json();

                if (!data.results || data.results.length === 0) {
                    document.getElementById('weatherContent').innerHTML = '<div class="error">Location not found. Please try another city.</div>';
                    return;
                }

                const result = data.results[0];
                const locationName = `${result.name}${result.admin1 ? ', ' + result.admin1 : ''}${result.country ? ', ' + result.country : ''}`;
                getWeatherData(result.latitude, result.longitude, locationName);
            } catch (error) {
                document.getElementById('weatherContent').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function getWeatherIcon(code) {
            if (code === 0 || code === 1) return weatherIcons.clear;
            if (code === 2 || code === 3) return weatherIcons.cloudy;
            if (code === 45 || code === 48) return weatherIcons.foggy;
            if (code >= 51 && code <= 67) return weatherIcons.drizzle;
            if (code >= 71 && code <= 77 || code === 85 || code === 86) return weatherIcons.snowy;
            if (code >= 80 && code <= 82) return weatherIcons.rainy;
            if (code >= 85 && code <= 86) return weatherIcons.snowy;
            if (code >= 95 && code <= 99) return weatherIcons.stormy;
            return weatherIcons.partly_cloudy;
        }

        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Depositing rime fog',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with slight hail',
                99: 'Thunderstorm with heavy hail'
            };
            return descriptions[code] || 'Unknown';
        }

        function initializeMap(latitude, longitude, locationName) {
            // Destroy existing map if it exists
            if (map) {
                map.remove();
            }

            // Create map
            map = L.map('satelliteMap').setView([latitude, longitude], 10);

            // Define layers
            layers.satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri',
                maxZoom: 18
            });

            layers.normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            });

            layers.clouds = L.tileLayer('https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=d3ad5f57f299a83fadfb1da11427bb17', {
                attribution: '© OpenWeatherMap',
                maxZoom: 18
            });

            // Add marker for location
            L.marker([latitude, longitude]).addTo(map)
                .bindPopup(`<b>${locationName}</b><br>Current Location`)
                .openPopup();

            // Add satellite layer by default
            layers.satellite.addTo(map);

            // Make map responsive
            setTimeout(() => {
                map.invalidateSize();
            }, 100);
        }

        function toggleMapLayer(layerName) {
            if (!map) return;

            // Remove all layers
            Object.keys(layers).forEach(key => {
                if (map.hasLayer(layers[key])) {
                    map.removeLayer(layers[key]);
                }
            });

            // Add selected layer
            if (layers[layerName]) {
                layers[layerName].addTo(map);
                currentLayer = layerName;
            }

            // Update button styles
            document.querySelectorAll('.map-toggle').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function displayWeather(data, locationName, latitude, longitude) {
            const current = data.current;
            const hourly = data.hourly;
            const daily = data.daily;

            let html = `
                <div class="weather-current">
                    <div class="weather-icon">${getWeatherIcon(current.weather_code)}</div>
                    <div class="weather-info">
                        <h2>${Math.round(current.temperature_2m)}°C</h2>
                        <p>${locationName}</p>
                        <p>${getWeatherDescription(current.weather_code)}</p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <label>Humidity</label>
                        <value>${current.relative_humidity_2m}%</value>
                    </div>
                    <div class="detail-item">
                        <label>Wind Speed</label>
                        <value>${Math.round(current.wind_speed_10m)} km/h</value>
                    </div>
                </div>

                <a href="https://www.google.com/maps/place/${encodeURIComponent(locationName)}/@0,0,3z?satellite=true" 
                   target="_blank" class="satellite-link">📡 View in Google Maps</a>

                <div class="map-controls">
                    <button class="map-toggle active" onclick="toggleMapLayer('satellite')">🛰️ Satellite</button>
                    <button class="map-toggle" onclick="toggleMapLayer('clouds')">☁️ Cloud Cover</button>
                    <button class="map-toggle" onclick="toggleMapLayer('normal')">🗺️ Map</button>
                </div>

                <div id="satelliteMap"></div>

                <h3 class="section-title">⏰ Hourly Forecast (Next 24 Hours)</h3>
                <div class="hourly-forecast">
            `;

            // Show next 24 hours
            for (let i = 0; i < 24; i++) {
                const time = new Date(hourly.time[i]).getHours();
                const temp = Math.round(hourly.temperature_2m[i]);
                const icon = getWeatherIcon(hourly.weather_code[i]);
                html += `
                    <div class="hourly-item">
                        <div class="time">${String(time).padStart(2, '0')}:00</div>
                        <div class="icon">${icon}</div>
                        <div class="temp">${temp}°</div>
                    </div>
                `;
            }

            html += `</div><h3 class="section-title">📅 3-Day Forecast</h3><div class="daily-forecast">`;

            // Show next 3 days
            for (let i = 0; i < Math.min(3, daily.time.length); i++) {
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'long' });
                const icon = getWeatherIcon(daily.weather_code[i]);
                const maxTemp = Math.round(daily.temperature_2m_max[i]);
                const minTemp = Math.round(daily.temperature_2m_min[i]);
                const description = getWeatherDescription(daily.weather_code[i]);
                const precipitation = daily.precipitation_sum[i];

                html += `
                    <div class="daily-item">
                        <h3>${dayName}</h3>
                        <div class="icon">${icon}</div>
                        <div class="temps">
                            <div>
                                <div class="max-temp">${maxTemp}°</div>
                                <small>High</small>
                            </div>
                            <div>
                                <div class="min-temp">${minTemp}°</div>
                                <small>Low</small>
                            </div>
                        </div>
                        <div class="description">${description}</div>
                        ${precipitation > 0 ? `<div style="margin-top: 10px; font-size: 0.9rem;">💧 ${precipitation.toFixed(1)}mm</div>` : ''}
                    </div>
                `;
            }

            html += `</div>`;
            document.getElementById('weatherContent').innerHTML = html;
            
            // Initialize map after content is rendered
            setTimeout(() => {
                initializeMap(latitude, longitude, locationName);
            }, 100);
        }

        // Load weather for default location (Munich)
        window.addEventListener('load', function() {
            getWeatherData(48.5442, 12.1469, 'Landshut, Germany');
        });

        // Allow Enter key to search
        document.getElementById('locationInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchLocation();
            }
        });
    </script>
</body>
</html>
