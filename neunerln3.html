<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bayerisches Neunerln</title>
    <style>
        :root {
            --bg-color: #1b4d22;
            --card-bg: #fffbf0;
            --text-dark: #2c2c2c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            min-height: 100dvh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            overflow-y: auto;
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
        }

        /* Header / Status */
        header {
            background: rgba(0,0,0,0.4);
            padding: 12px 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }

        /* Spielfeld (Mitte) */
        .game-field {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 14px;
            position: relative;
            padding: 8px 10px 6px;
            min-height: 0;
        }

        .opponent-info {
            font-size: 0.95rem;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 15px;
            letter-spacing: 0.5px;
        }

        .table-center {
            display: flex;
            gap: 18px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Karten-Styling Base */
        .card {
            width: 72px;
            height: 108px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            color: var(--text-dark);
            position: relative;
            border: 1px solid #ddd;
        }

        .card.deck-style {
            background: linear-gradient(135deg, #8b0000 25%, #5c0000 25%, #5c0000 50%, #8b0000 50%, #8b0000 75%, #5c0000 75%, #5c0000 100%);
            background-size: 20px 20px;
            border: 2px solid white;
            box-shadow: 3px 4px 10px rgba(0,0,0,0.5);
        }

        .card .suit-top { font-size: 1.4rem; line-height: 1; }
        .card .rank { font-weight: bold; font-size: 1.2rem; text-align: center; }
        .card .suit-bottom { font-size: 1.4rem; text-align: right; line-height: 1; }

        /* Farben der bayerischen Symbole */
        .suit-Eichel { color: #553c1e; }
        .suit-Gras { color: #2e7d32; }
        .suit-Herz { color: #d32f2f; }
        .suit-Schellen { color: #f57c00; }

        /* Spieler-Handbereich (unten) */
        .player-area {
            background: rgba(0,0,0,0.25);
            padding: 8px 0 6px 0;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        /* Handkarten-Scrollbox */
        .hand-scroll {
            width: 100%;
            overflow-x: auto;
            display: flex;
            padding: 10px 12px 14px 12px;
            justify-content: flex-start;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        /* Fächer-Effekt */
        .player-area .card {
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), margin 0.2s;
            flex-shrink: 0;
            margin-right: -20px; 
            scroll-snap-align: start;
        }

        .player-area .card:last-child {
            margin-right: 12px; 
        }

        .player-area .card:active {
            transform: translateY(-25px) scale(1.08);
            z-index: 99;
        }

        @media (max-width: 480px) {
            .card {
                width: 62px;
                height: 94px;
                padding: 6px;
            }
            .card .suit-top, .card .suit-bottom { font-size: 1.1rem; }
            .card .rank { font-size: 1rem; }
            .player-area .card { margin-right: -18px; }
            .game-field { gap: 10px; }
            .opponent-info { font-size: 0.85rem; padding: 5px 12px; }
            header { padding: 10px 8px; font-size: 0.95rem; }
        }

        /* Farbwunsch-Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: var(--text-dark);
            width: 85%;
            max-width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .suit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .suit-btn {
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #f9f9f9;
            cursor: pointer;
        }
        
        .suit-btn:active { background: #e0e0e0; }
    </style>
</head>
<body>

    <header id="status-bar">Dein Zug! Lege eine Karte oder ziehe.</header>

    <div class="game-field">
        <div class="opponent-info" id="opponent-info">Gegner: 5 Karten</div>
        
        <div class="table-center">
            <div class="card deck-style" id="deck" onclick="playerDraw()"></div>
            <div id="discard-pile"></div>
        </div>
        
        <div id="wish-indicator" style="font-weight: bold; color: #ffeb3b; font-size: 1rem; text-shadow: 1px 1px 2px black;"></div>
    </div>

    <div class="player-area">
        <span style="font-size: 0.9rem; font-weight: bold; opacity: 0.9;">Deine Handkarten:</span>
        <div class="hand-scroll" id="player-hand"></div>
    </div>

    <div class="modal" id="wish-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 5px;">Farbe wünschen (9er gelegt):</h3>
            <div class="suit-grid">
                <button class="suit-btn suit-Eichel" onclick="chooseSuit('Eichel')">🌰<br>Eichel</button>
                <button class="suit-btn suit-Gras" onclick="chooseSuit('Gras')">🍃<br>Gras</button>
                <button class="suit-btn suit-Herz" onclick="chooseSuit('Herz')">❤️<br>Herz</button>
                <button class="suit-btn suit-Schellen" onclick="chooseSuit('Schellen')">🔔<br>Schellen</button>
            </div>
        </div>
    </div>

    <script>
        const suits = ['Eichel', 'Gras', 'Herz', 'Schellen'];
        const ranks = ['7', '8', '9', '10', 'Unter', 'Ober', 'König', 'Ass'];
        const suitSymbols = { 'Eichel': '🌰', 'Gras': '🍃', 'Herz': '❤️', 'Schellen': '🔔' };

        let deck = [];
        let playerHand = [];
        let computerHand = [];
        let discardPile = [];
        let currentWish = null;
        let active7Effect = false; // Steuert, ob wegen einer 7 gezogen werden MUSS

        function initGame() {
            deck = [];
            for (let suit of suits) {
                for (let rank of ranks) {
                    deck.push({ suit, rank });
                }
            }
            deck.sort(() => Math.random() - 0.5);

            playerHand = deck.splice(0, 5);
            computerHand = deck.splice(0, 5);

            // Erste Karte darf keine Sonderkarte sein, um Fehlstarts zu vermeiden
            let startCard = deck.pop();
            while(['7', '8', '9'].includes(startCard.rank)) {
                deck.unshift(startCard);
                startCard = deck.pop();
            }
            discardPile.push(startCard);
            active7Effect = false;
            currentWish = null;

            updateUI();
            document.getElementById('status-bar').innerText = "Dein Zug! Lege eine Karte oder tippe auf den roten Stapel.";
        }

        function createCardHTML(card, isPlayable = false, index = -1) {
            return `
                <div class="card suit-${card.suit}" ${isPlayable ? `onclick="playCard(${index})"` : ''} style="${isPlayable ? 'border: 2px solid #ffeb3b; box-shadow: 0 0 10px #ffeb3b;' : 'opacity: 0.75;'}">
                    <div class="suit-top">${suitSymbols[card.suit]}</div>
                    <div class="rank">${card.rank}</div>
                    <div class="suit-bottom">${suitSymbols[card.suit]}</div>
                </div>
            `;
        }

        function updateUI() {
            const topCard = discardPile[discardPile.length - 1];
            document.getElementById('discard-pile').innerHTML = createCardHTML(topCard);

            if (currentWish) {
                document.getElementById('wish-indicator').innerText = `Wunsch: ${suitSymbols[currentWish]} ${currentWish}`;
            } else {
                document.getElementById('wish-indicator').innerText = '';
            }

            document.getElementById('opponent-info').innerText = `Gegner: ${computerHand.length} Karten`;

            const handContainer = document.getElementById('player-hand');
            handContainer.innerHTML = '';
            playerHand.forEach((card, idx) => {
                // Wenn eine 7 aktiv ist, darf man gar nichts legen, sondern MUSS ziehen
                const playable = active7Effect ? false : isValidMove(card);
                handContainer.innerHTML += createCardHTML(card, playable, idx);
            });
        }

        function isValidMove(card) {
            const topCard = discardPile[discardPile.length - 1];
            if (currentWish) {
                return card.suit === currentWish || card.rank === '9';
            }
            return card.suit === topCard.suit || card.rank === topCard.rank || card.rank === '9';
        }

        function playCard(idx) {
            if (active7Effect) return; // Schutz falls Klickfehler

            const card = playerHand.splice(idx, 1)[0];
            discardPile.push(card);
            currentWish = null;

            handleCardEffect(card, 'player');
        }

        function handleCardEffect(card, playerType) {
            const nextTurn = (playerType === 'player') ? 'computer' : 'player';
            
            if (card.rank === '7') {
                active7Effect = true;
                if (playerType === 'player') {
                    document.getElementById('status-bar').innerText = "Du hast eine 7 gelegt! Gegner muss 1 ziehen und aussetzen.";
                    setTimeout(() => { 
                        // Gegner zieht direkt und setzt aus, Spieler ist wieder dran
                        drawCards(computerHand, 1);
                        active7Effect = false;
                        endTurn('player');
                    }, 1500);
                } else {
                    document.getElementById('status-bar').innerText = "⚠️ Gegner hat eine 7 gelegt! Tippe auf den Stapel, um 1 Karte zu ziehen.";
                    updateUI(); // Sorgt dafür, dass Karten ausgegraut werden und Stapel blinkt
                }
            } else if (card.rank === '8') {
                if (playerType === 'player') {
                    document.getElementById('status-bar').innerText = "8er gelegt! Gegner muss aussetzen.";
                    setTimeout(() => { endTurn('player'); }, 1200);
                } else {
                    document.getElementById('status-bar').innerText = "⚠️ Du musst aussetzen! Gegner ist noch mal dran.";
                    setTimeout(() => { endTurn('computer'); }, 1500);
                }
            } else if (card.rank === '9') {
                if (playerType === 'player') {
                    document.getElementById('wish-modal').style.display = 'flex';
                } else {
                    // Computer wünscht sich seine häufigste Farbe
                    const counts = {};
                    computerHand.forEach(c => counts[c.suit] = (counts[c.suit] || 0) + 1);
                    currentWish = suits.reduce((a, b) => (counts[a] || 0) > (counts[b] || 0) ? a : b);
                    document.getElementById('status-bar').innerText = `Gegner hat eine 9 gelegt und wünscht sich: ${currentWish}`;
                    setTimeout(() => { endTurn('player'); }, 1500);
                }
            } else {
                endTurn(nextTurn);
            }
        }

        function chooseSuit(suit) {
            currentWish = suit;
            document.getElementById('wish-modal').style.display = 'none';
            endTurn('computer');
        }

        function playerDraw() {
            if (active7Effect) {
                drawCards(playerHand, 1);
                active7Effect = false;
                document.getElementById('status-bar').innerText = "Du hast 1 Karte gezogen und setzt aus.";
                setTimeout(() => { endTurn('computer'); }, 1200);
                return;
            }

            // Normales freiwilliges Ziehen
            drawCards(playerHand, 1);
            endTurn('computer');
        }

        function drawCards(hand, count) {
            for (let i = 0; i < count; i++) {
                if (deck.length === 0) {
                    const top = discardPile.pop();
                    deck = [...discardPile];
                    deck.sort(() => Math.random() - 0.5);
                    discardPile = [top];
                }
                if (deck.length > 0) hand.push(deck.pop());
            }
        }

        function endTurn(nextPlayer) {
            updateUI();
            
            if (playerHand.length === 0) {
                alert("Gratulation! Du hast gewonnen! 🎉");
                initGame();
                return;
            }
            if (computerHand.length === 0) {
                alert("Der Computer hat gewonnen! 🤖");
                initGame();
                return;
            }

            if (nextPlayer === 'computer') {
                document.getElementById('status-bar').innerText = "Gegner überlegt...";
                setTimeout(computerTurn, 1200);
            } else if (!active7Effect) {
                document.getElementById('status-bar').innerText = currentWish ? `Farbe ${currentWish} gefordert! Lege oder ziehe.` : "Dein Zug!";
            }
        }

        function computerTurn() {
            // Falls die KI wegen einer 7 vom Spieler ziehen muss (wird jetzt oben direkt abgehandelt, zur Sicherheit):
            if (active7Effect) {
                drawCards(computerHand, 1);
                active7Effect = false;
                endTurn('player');
                return;
            }

            const playableIdx = computerHand.findIndex(c => isValidMove(c));
            
            if (playableIdx !== -1) {
                const card = computerHand.splice(playableIdx, 1)[0];
                discardPile.push(card);
                currentWish = null;
                handleCardEffect(card, 'computer');
            } else {
                drawCards(computerHand, 1);
                document.getElementById('status-bar').innerText = "Gegner konnte nicht legen und zieht eine Karte.";
                setTimeout(() => { endTurn('player'); }, 1200);
            }
        }

        initGame();
    </script>
</body>
</html>
