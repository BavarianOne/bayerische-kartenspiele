<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Neon Velocity: Chrono Run - Neon Cyberpunk Endless Runner">
    <meta name="theme-color" content="#0a0a1a">
    <title>Neon Velocity: Chrono Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --neon-green: #00ff00;
            --bg-dark: #0a0a1a;
            --bg-darker: #050510;
            --text-glow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
        }
        
        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor; }
            50% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor, 0 0 80px currentColor; }
        }
        
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        @keyframes levelUpFlash {
            0% { background: var(--bg-dark); }
            25% { background: var(--flash-color); }
            50% { background: var(--bg-dark); }
            75% { background: var(--flash-color); }
            100% { background: var(--bg-dark); }
        }
        
        @keyframes buttonPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px currentColor; }
            50% { transform: scale(1.1); box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Courier New', 'Courier', monospace;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px),
                linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.15) 2px,
                rgba(0,0,0,0.15) 4px
            );
            pointer-events: none;
            z-index: 1000;
            animation: scanline 3s linear infinite;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        
        #game-canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
        }
        
        #ui-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top, 10px) env(safe-area-inset-right, 10px) env(safe-area-inset-bottom, 10px) env(safe-area-inset-left, 10px);
        }
        
        #hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px;
            pointer-events: none;
        }
        
        .hud-panel {
            background: linear-gradient(135deg, rgba(10,10,26,0.9), rgba(10,10,26,0.7));
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 8px 16px;
            box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .hud-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            opacity: 0.7;
        }
        
        .hud-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-yellow);
            text-shadow: var(--text-glow);
            font-family: 'Courier New', monospace;
        }
        
        #hud-level .hud-value { color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-magenta); }
        #hud-hp .hud-value { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); }
        
        #hud-hp .hp-bar {
            width: 80px;
            height: 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
            border: 1px solid var(--neon-green);
        }
        
        #hud-hp .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-yellow));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--neon-green);
        }
        
        #hud-hp.low .hp-fill { background: linear-gradient(90deg, #ff4444, #ff8800); box-shadow: 0 0 10px #ff4444; }
        
        #start-screen, #game-over-screen, #level-up-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, rgba(10,10,26,0.95), rgba(5,5,16,0.98));
            z-index: 20;
            pointer-events: auto;
            padding: 20px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        
        #level-up-screen {
            animation: levelUpFlash 1.5s ease-out;
            pointer-events: none;
        }
        
        .screen-title {
            font-size: clamp(28px, 8vw, 56px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.1;
            margin-bottom: 10px;
            animation: neonPulse 2s ease-in-out infinite;
        }
        
        .title-line {
            display: block;
        }
        
        .title-main { color: var(--neon-cyan); }
        .title-sub { color: var(--neon-magenta); font-size: 0.6em; letter-spacing: 8px; margin-top: -10px; }
        
        .screen-subtitle {
            font-size: clamp(14px, 3vw, 18px);
            color: var(--neon-yellow);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.8;
            animation: pulseGlow 2s ease-in-out infinite;
        }
        
        .btn {
            background: transparent;
            border: 2px solid;
            border-radius: 50px;
            padding: 16px 48px;
            font-family: inherit;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
            min-height: 56px;
            min-width: 180px;
            touch-action: manipulation;
        }
        
        .btn-primary { border-color: var(--neon-cyan); color: var(--neon-cyan); animation: buttonPulse 2s ease-in-out infinite; }
        .btn-primary:active { transform: scale(0.95); box-shadow: 0 0 30px var(--neon-cyan), inset 0 0 30px rgba(0,255,255,0.3); }
        
        .btn-secondary { border-color: var(--neon-magenta); color: var(--neon-magenta); }
        .btn-secondary:active { transform: scale(0.95); box-shadow: 0 0 30px var(--neon-magenta), inset 0 0 30px rgba(255,0,255,0.3); }
        
        .btn-danger { border-color: #ff4444; color: #ff4444; }
        
        .stats-panel {
            display: flex;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .stat-item {
            background: rgba(0,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            padding: 20px 30px;
            min-width: 140px;
        }
        
        .stat-label { font-size: 11px; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--neon-yellow); text-shadow: var(--text-glow); font-family: monospace; }
        
        .level-up-text {
            font-size: clamp(32px, 10vw, 64px);
            font-weight: 900;
            color: var(--flash-color, var(--neon-yellow));
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 0 80px currentColor;
            text-transform: uppercase;
            letter-spacing: 8px;
            animation: pulseGlow 0.3s ease-in-out infinite alternate;
        }
        
        .level-number {
            font-size: clamp(48px, 15vw, 120px);
            font-weight: 900;
            color: var(--flash-color, var(--neon-cyan));
            text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
            line-height: 1;
            margin: 20px 0;
        }
        
        .controls-hint {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        .key-hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 6px;
        }
        
        .key-hint kbd {
            background: rgba(0,255,255,0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            padding: 2px 8px;
            font-family: inherit;
            color: var(--neon-cyan);
        }
        
        .hidden { display: none !important; }
        
        /* Virtual Touch Buttons */
        #touch-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 120px;
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px 20px;
            pointer-events: auto;
            z-index: 15;
        }
        
        .touch-btn {
            width: 80px;
            height: 80px;
            min-width: 80px;
            min-height: 80px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            transition: all 0.1s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .touch-btn:active, .touch-btn.active {
            transform: scale(0.9);
            box-shadow: 0 0 30px currentColor, inset 0 0 30px currentColor;
        }
        
        .touch-btn.jump { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .touch-btn.duck { border-color: var(--neon-magenta); color: var(--neon-magenta); }
        
        .touch-btn svg { width: 36px; height: 36px; stroke: currentColor; stroke-width: 3; fill: none; }
        
        @media (max-width: 768px) {
            #touch-controls { display: flex; }
            #hud-top { padding: 5px; }
            .hud-panel { padding: 6px 12px; }
            .hud-value { font-size: 18px; }
            #hud-hp .hp-bar { width: 60px; }
            .controls-hint { display: none; }
        }
        
        @media (max-width: 480px) {
            .touch-btn { width: 70px; height: 70px; min-width: 70px; min-height: 70px; }
            .touch-btn svg { width: 30px; height: 30px; }
        }
        
        @media (orientation: portrait) and (max-width: 768px) {
            #game-canvas { transform: rotate(90deg); transform-origin: center; width: 100vh; height: 100vw; max-width: 100vh; max-height: 100vw; }
            #game-container { overflow: hidden; }
            #touch-controls { bottom: env(safe-area-inset-bottom, 10px); }
        }
        
        /* High contrast mode support */
        @media (prefers-contrast: high) {
            :root { --neon-cyan: #00ffff; --neon-magenta: #ff00ff; --neon-yellow: #ffff00; }
            .hud-panel { border-width: 2px; }
        }
        
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-overlay">
            <div id="hud-top" class="hidden">
                <div id="hud-score" class="hud-panel">
                    <div class="hud-label">Score</div>
                    <div id="score-value" class="hud-value">0</div>
                </div>
                <div id="hud-level" class="hud-panel">
                    <div class="hud-label">Phase</div>
                    <div id="level-value" class="hud-value">1</div>
                </div>
                <div id="hud-hp" class="hud-panel">
                    <div class="hud-label">Shield</div>
                    <div id="hp-value" class="hud-value">3</div>
                    <div class="hp-bar"><div id="hp-fill" class="hp-fill" style="width: 100%"></div></div>
                </div>
            </div>
            
            <div id="touch-controls">
                <button class="touch-btn jump" id="btn-jump" aria-label="Jump">
                    <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
                    <span style="font-size: 9px; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px;">Jump</span>
                </button>
                <button class="touch-btn duck" id="btn-duck" aria-label="Duck">
                    <svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z"/></svg>
                    <span style="font-size: 9px; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px;">Duck</span>
                </button>
            </div>
        </div>
        
        <!-- Start Screen -->
        <div id="start-screen">
            <h1 class="screen-title">
                <span class="title-line title-main">NEON VELOCITY</span>
                <span class="title-line title-sub">CHRONO RUN</span>
            </h1>
            <p class="screen-subtitle">ENDLESS CYBER RUNNER</p>
            <button class="btn btn-primary" id="btn-start">Start Run</button>
            <div class="controls-hint" id="desktop-hint">
                <div class="key-hint"><kbd>Space</kbd> / <kbd>↑</kbd> Jump</div>
                <div class="key-hint"><kbd>↓</kbd> Duck</div>
            </div>
            <div class="controls-hint" id="mobile-hint" style="display:none;">
                <div class="key-hint">Swipe Up / Tap Left → Jump</div>
                <div class="key-hint">Swipe Down / Tap Right → Duck</div>
            </div>
        </div>
        
        <!-- Game Over Screen -->
        <div id="game-over-screen" class="hidden">
            <h1 class="screen-title" style="color: #ff4444; text-shadow: 0 0 20px #ff4444, 0 0 40px #ff4444;">
                <span class="title-line">SYSTEM</span>
                <span class="title-line title-sub">CRASH</span>
            </h1>
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-label">Final Score</div>
                    <div id="final-score" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Best Score</div>
                    <div id="best-score" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Phase Reached</div>
                    <div id="final-level" class="stat-value">1</div>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-restart">Restart Run</button>
            <button class="btn btn-secondary" id="btn-menu">Main Menu</button>
        </div>
        
        <!-- Level Up Screen -->
        <div id="level-up-screen" class="hidden">
            <div class="level-up-text">PHASE SHIFT</div>
            <div class="level-number" id="level-up-number">02</div>
            <div class="screen-subtitle" style="color: var(--flash-color, var(--neon-cyan));">SPEED INCREASED • NEW THREATS</div>
        </div>
    </div>

    <script>
        // ============================================
        // NEON VELOCITY: CHRONO RUN - Game Engine
        // ============================================
        
        // ============================================
        // CONFIGURATION & CONSTANTS
        // ============================================
        const CONFIG = {
            // Canvas & Rendering
            DESIGN_WIDTH: 800,
            DESIGN_HEIGHT: 450,
            BASE_GROUND_Y: 380,
            BASE_PLAYER_X: 120,
            
            // Physics
            GRAVITY: 1800,
            JUMP_FORCE: -750,
            DUCK_HEIGHT_RATIO: 0.5,
            PLAYER_WIDTH: 36,
            PLAYER_HEIGHT: 56,
            
            // Gameplay
            INITIAL_SPEED: 320,
            SPEED_INCREMENT_PER_LEVEL: 0.15,
            MAX_SPEED_MULTIPLIER: 3.5,
            BASE_SPAWN_INTERVAL: 1500,
            MIN_SPAWN_INTERVAL: 400,
            LEVEL_UP_SCORE_BASE: 500,
            LEVEL_UP_SCORE_INCREMENT: 700,
            MAX_HP: 3,
            INVINCIBILITY_TIME: 1500,
            
            // Scoring
            SCORE_PER_SECOND: 10,
            COIN_VALUE: 50,
            HEALTH_ORB_VALUE: 200,
            LEVEL_UP_BONUS: 500,
            
            // Visual
            PARTICLE_MAX: 150,
            TRAIL_LENGTH: 8,
            BACKGROUND_LAYERS: 3,
            
            // Colors (Neon Palette)
            COLORS: {
                CYAN: '#00ffff',
                MAGENTA: '#ff00ff',
                YELLOW: '#ffff00',
                GREEN: '#00ff00',
                RED: '#ff4444',
                ORANGE: '#ff8800',
                WHITE: '#ffffff',
                BG_DARK: '#0a0a1a',
                BG_DARKER: '#050510',
                GRID: 'rgba(0,255,255,0.05)'
            },
            
            // Level Color Schemes
            LEVEL_COLORS: [
                { bg: '#0a0a1a', primary: '#00ffff', secondary: '#ff00ff', accent: '#ffff00', name: 'NEON CITY' },
                { bg: '#1a001a', primary: '#ff00ff', secondary: '#ffff00', accent: '#00ffff', name: 'MAGENTA ZONE' },
                { bg: '#1a1a00', primary: '#ffff00', secondary: '#00ffff', accent: '#ff00ff', name: 'GOLDEN AGE' },
                { bg: '#001a1a', primary: '#00ffff', secondary: '#00ff00', accent: '#ff00ff', name: 'CYBER VOID' },
                { bg: '#1a0000', primary: '#ff4444', secondary: '#ff8800', accent: '#ffff00', name: 'RED ALERT' },
                { bg: '#0a0a2a', primary: '#8844ff', secondary: '#00ffff', accent: '#ff00ff', name: 'VIOLET SECTOR' }
            ],
            
            // Obstacle Types
            OBSTACLE_TYPES: {
                GROUND: { height: 48, width: 40, yOffset: 0, color: 'primary', points: 10 },
                GROUND_WIDE: { height: 48, width: 80, yOffset: 0, color: 'secondary', points: 15 },
                GROUND_SPIKE: { height: 60, width: 30, yOffset: 0, color: 'accent', points: 20, lethal: true },
                LOW_AIR: { height: 36, width: 40, yOffset: -80, color: 'primary', points: 15 },
                LOW_AIR_WIDE: { height: 36, width: 70, yOffset: -80, color: 'secondary', points: 20 },
                HIGH_AIR: { height: 36, width: 40, yOffset: -140, color: 'accent', points: 20 },
                HIGH_AIR_WIDE: { height: 36, width: 70, yOffset: -140, color: 'primary', points: 25 },
                DOUBLE_GROUND: { height: 48, width: 40, yOffset: 0, color: 'secondary', points: 20, double: true },
                TRIPLE_MIX: { height: 48, width: 40, yOffset: 0, color: 'accent', points: 30, triple: true }
            },
            
            // Patterns unlocked per level
            LEVEL_PATTERNS: {
                1: ['GROUND'],
                2: ['GROUND', 'GROUND_WIDE', 'LOW_AIR'],
                3: ['GROUND', 'GROUND_WIDE', 'LOW_AIR', 'LOW_AIR_WIDE', 'HIGH_AIR'],
                4: ['GROUND', 'GROUND_WIDE', 'LOW_AIR', 'LOW_AIR_WIDE', 'HIGH_AIR', 'HIGH_AIR_WIDE', 'DOUBLE_GROUND'],
                5: ['GROUND', 'GROUND_WIDE', 'LOW_AIR', 'LOW_AIR_WIDE', 'HIGH_AIR', 'HIGH_AIR_WIDE', 'DOUBLE_GROUND', 'GROUND_SPIKE', 'TRIPLE_MIX']
            }
        };
        
        // Level thresholds
        function getLevelThreshold(level) {
            if (level <= 1) return 0;
            let threshold = 0;
            for (let i = 2; i <= level; i++) {
                threshold += CONFIG.LEVEL_UP_SCORE_BASE + (i - 2) * CONFIG.LEVEL_UP_SCORE_INCREMENT;
            }
            return threshold;
        }
        
        function getLevelFromScore(score) {
            let level = 1;
            while (getLevelThreshold(level + 1) <= score) level++;
            return Math.min(level, 20);
        }
        
        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        const Utils = {
            clamp(value, min, max) { return Math.max(min, Math.min(max, value)); },
            lerp(a, b, t) { return a + (b - a) * t; },
            random(min, max) { return Math.random() * (max - min) + min; },
            randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; },
            randomChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
            
            // Hex to RGBA
            hexToRgba(hex, alpha = 1) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            },
            
            // Draw rounded rect
            roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            },
            
            // Draw neon glow rect
            neonRect(ctx, x, y, w, h, r, color, glowIntensity = 15) {
                ctx.save();
                ctx.shadowColor = color;
                ctx.shadowBlur = glowIntensity;
                this.roundRect(ctx, x, y, w, h, r);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            },
            
            // Draw glow line
            glowLine(ctx, x1, y1, x2, y2, color, width = 2, glow = 10) {
                ctx.save();
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.shadowColor = color;
                ctx.shadowBlur = glow;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                ctx.restore();
            }
        };
        
        // ============================================
        // INPUT MANAGER - Keyboard + Touch + Virtual Buttons
        // ============================================
        class InputManager {
            constructor() {
                this.keys = { jump: false, duck: false };
                this.touchStart = { x: 0, y: 0, time: 0 };
                this.swipeThreshold = 50;
                this.swipeTimeLimit = 300;
                this.touchActive = { jump: false, duck: false };
                this.virtualButtonsEnabled = false;
                this.isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                               ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
                
                this.init();
            }
            
            init() {
                // Keyboard
                window.addEventListener('keydown', (e) => this.onKeyDown(e));
                window.addEventListener('keyup', (e) => this.onKeyUp(e));
                
                // Touch - Canvas area for swipes
                const canvas = document.getElementById('game-canvas');
                canvas.addEventListener('touchstart', (e) => this.onTouchStart(e), { passive: false });
                canvas.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
                canvas.addEventListener('touchend', (e) => this.onTouchEnd(e), { passive: false });
                canvas.addEventListener('touchcancel', (e) => this.onTouchEnd(e), { passive: false });
                
                // Virtual Buttons
                const btnJump = document.getElementById('btn-jump');
                const btnDuck = document.getElementById('btn-duck');
                
                [btnJump, btnDuck].forEach(btn => {
                    btn.addEventListener('touchstart', (e) => { e.preventDefault(); this.onVirtualTouchStart(btn); });
                    btn.addEventListener('touchend', (e) => { e.preventDefault(); this.onVirtualTouchEnd(btn); });
                    btn.addEventListener('mousedown', (e) => { e.preventDefault(); this.onVirtualTouchStart(btn); });
                    btn.addEventListener('mouseup', (e) => { e.preventDefault(); this.onVirtualTouchEnd(btn); });
                    btn.addEventListener('mouseleave', (e) => { e.preventDefault(); this.onVirtualTouchEnd(btn); });
                });
                
                // Show virtual buttons on mobile
                if (this.isMobile) {
                    document.getElementById('touch-controls').style.display = 'flex';
                    document.getElementById('desktop-hint').style.display = 'none';
                    document.getElementById('mobile-hint').style.display = 'flex';
                    this.virtualButtonsEnabled = true;
                }
                
                // Prevent context menu
                canvas.addEventListener('contextmenu', e => e.preventDefault());
            }
            
            onKeyDown(e) {
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ') {
                    e.preventDefault();
                    this.keys.jump = true;
                }
                if (e.code === 'ArrowDown' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    this.keys.duck = true;
                }
            }
            
            onKeyUp(e) {
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ') {
                    this.keys.jump = false;
                }
                if (e.code === 'ArrowDown' || e.key === 'ArrowDown') {
                    this.keys.duck = false;
                }
            }
            
            onTouchStart(e) {
                const touch = e.touches[0];
                this.touchStart.x = touch.clientX;
                this.touchStart.y = touch.clientY;
                this.touchStart.time = Date.now();
            }
            
            onTouchMove(e) {
                e.preventDefault(); // Prevent scrolling
            }
            
            onTouchEnd(e) {
                if (e.changedTouches.length === 0) return;
                const touch = e.changedTouches[0];
                const dx = touch.clientX - this.touchStart.x;
                const dy = touch.clientY - this.touchStart.y;
                const dt = Date.now() - this.touchStart.time;
                
                if (dt < this.swipeTimeLimit && Math.abs(dy) > this.swipeThreshold && Math.abs(dy) > Math.abs(dx)) {
                    if (dy < 0) this.keys.jump = true; // Swipe up
                    else this.keys.duck = true; // Swipe down
                    
                    // Auto-release after short delay for swipe
                    setTimeout(() => {
                        this.keys.jump = false;
                        this.keys.duck = false;
                    }, 150);
                }
            }
            
            onVirtualTouchStart(btn) {
                if (btn.id === 'btn-jump') {
                    this.touchActive.jump = true;
                    this.keys.jump = true;
                    btn.classList.add('active');
                } else if (btn.id === 'btn-duck') {
                    this.touchActive.duck = true;
                    this.keys.duck = true;
                    btn.classList.add('active');
                }
            }
            
            onVirtualTouchEnd(btn) {
                if (btn.id === 'btn-jump') {
                    this.touchActive.jump = false;
                    this.keys.jump = false;
                    btn.classList.remove('active');
                } else if (btn.id === 'btn-duck') {
                    this.touchActive.duck = false;
                    this.keys.duck = false;
                    btn.classList.remove('active');
                }
            }
            
            // Getters for game loop
            get jumpPressed() { return this.keys.jump; }
            get duckPressed() { return this.keys.duck; }
            
            // Consume jump (for single press)
            consumeJump() { const v = this.keys.jump; this.keys.jump = false; return v; }
            consumeDuck() { return this.keys.duck; } // Duck is held
        }
        
        // ============================================
        // PARTICLE SYSTEM
        // ============================================
        class ParticleSystem {
            constructor(maxParticles = CONFIG.PARTICLE_MAX) {
                this.particles = [];
                this.maxParticles = maxParticles;
                this.pool = [];
                this.initPool();
            }
            
            initPool() {
                for (let i = 0; i < this.maxParticles; i++) {
                    this.pool.push(this.createParticle());
                }
            }
            
            createParticle() {
                return {
                    x: 0, y: 0, vx: 0, vy: 0,
                    life: 0, maxLife: 1,
                    size: 2, color: CONFIG.COLORS.CYAN,
                    alpha: 1, gravity: 0, fade: true,
                    active: false
                };
            }
            
            getParticle() {
                let p = this.pool.find(p => !p.active);
                if (!p && this.particles.length < this.maxParticles) {
                    p = this.createParticle();
                    this.pool.push(p);
                }
                return p;
            }
            
            emit(x, y, options = {}) {
                const count = options.count || 1;
                for (let i = 0; i < count; i++) {
                    const p = this.getParticle();
                    if (!p) continue;
                    
                    p.x = x + (options.offsetX || 0) + Utils.random(-options.spreadX || 0, options.spreadX || 0);
                    p.y = y + (options.offsetY || 0) + Utils.random(-options.spreadY || 0, options.spreadY || 0);
                    p.vx = Utils.random(options.vxMin || -100, options.vxMax || 100);
                    p.vy = Utils.random(options.vyMin || -100, options.vyMax || 100);
                    p.life = 0;
                    p.maxLife = Utils.random(options.lifeMin || 0.3, options.lifeMax || 1);
                    p.size = Utils.random(options.sizeMin || 2, options.sizeMax || 6);
                    p.color = options.color || CONFIG.COLORS.CYAN;
                    p.alpha = 1;
                    p.gravity = options.gravity || 0;
                    p.fade = options.fade !== false;
                    p.active = true;
                    this.particles.push(p);
                }
            }
            
            // Player trail
            addTrail(x, y, color) {
                this.emit(x, y, {
                    count: 1, vxMin: -20, vxMax: 20, vyMin: -10, vyMax: 10,
                    lifeMin: 0.2, lifeMax: 0.5, sizeMin: 3, sizeMax: 8,
                    color, gravity: 0, fade: true, spreadX: 5, spreadY: 5
                });
            }
            
            // Jump dust
            addJumpDust(x, y, color) {
                this.emit(x, y, {
                    count: 8, vxMin: -80, vxMax: 80, vyMin: -50, vyMax: 0,
                    lifeMin: 0.3, lifeMax: 0.6, sizeMin: 4, sizeMax: 10,
                    color, gravity: 200, fade: true
                });
            }
            
            // Landing dust
            addLandingDust(x, y, color) {
                this.emit(x, y, {
                    count: 12, vxMin: -120, vxMax: 120, vyMin: -150, vyMax: -50,
                    lifeMin: 0.4, lifeMax: 0.8, sizeMin: 5, sizeMax: 12,
                    color, gravity: 400, fade: true
                });
            }
            
            // Collect effect
            addCollect(x, y, color) {
                this.emit(x, y, {
                    count: 15, vxMin: -200, vxMax: 200, vyMin: -200, vyMax: 50,
                    lifeMin: 0.5, lifeMax: 1.2, sizeMin: 4, sizeMax: 10,
                    color, gravity: 100, fade: true
                });
            }
            
            // Hit effect
            addHit(x, y, color) {
                this.emit(x, y, {
                    count: 20, vxMin: -300, vxMax: 300, vyMin: -300, vyMax: 100,
                    lifeMin: 0.5, lifeMax: 1.5, sizeMin: 6, sizeMax: 16,
                    color, gravity: 200, fade: true
                });
            }
            
            // Level up burst
            addLevelUp(x, y, colors) {
                for (const color of colors) {
                    this.emit(x, y, {
                        count: 30, vxMin: -400, vxMax: 400, vyMin: -400, vyMax: 400,
                        lifeMin: 1, lifeMax: 2, sizeMin: 8, sizeMax: 20,
                        color, gravity: 50, fade: true
                    });
                }
            }
            
            update(dt) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.life += dt;
                    const t = p.life / p.maxLife;
                    
                    if (t >= 1) {
                        p.active = false;
                        this.particles.splice(i, 1);
                        continue;
                    }
                    
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += p.gravity * dt;
                    
                    if (p.fade) p.alpha = 1 - t;
                }
            }
            
            render(ctx, scale) {
                for (const p of this.particles) {
                    const t = p.life / p.maxLife;
                    const size = p.size * (1 - t * 0.5) * scale;
                    const alpha = p.alpha * (1 - t);
                    
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 10 * scale;
                    ctx.beginPath();
                    ctx.arc(p.x * scale, p.y * scale, Math.max(1, size), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }
        
        // ============================================
        // BACKGROUND - Parallax Cyberpunk
        // ============================================
        class Background {
            constructor() {
                this.layers = [];
                this.levelColorIndex = 0;
                this.targetColorIndex = 0;
                this.colorTransition = 0;
                this.scanlineOffset = 0;
                this.gridOffset = 0;
                this.buildingHeights = [];
                this.buildingColors = [];
                this.generateBuildings();
            }
            
            generateBuildings() {
                this.buildingHeights = [];
                this.buildingColors = [];
                const count = 20;
                for (let i = 0; i < count; i++) {
                    this.buildingHeights[i] = Utils.random(80, 250);
                    this.buildingColors[i] = Utils.randomChoice([
                        CONFIG.COLORS.CYAN, CONFIG.COLORS.MAGENTA, CONFIG.COLORS.YELLOW,
                        CONFIG.COLORS.GREEN, '#ff4488', '#8844ff'
                    ]);
                }
            }
            
            setLevel(level) {
                this.targetColorIndex = (level - 1) % CONFIG.LEVEL_COLORS.length;
                this.colorTransition = 0;
            }
            
            update(dt, speed, level) {
                const colors = CONFIG.LEVEL_COLORS;
                const current = colors[this.levelColorIndex];
                const target = colors[this.targetColorIndex];
                
                if (this.levelColorIndex !== this.targetColorIndex) {
                    this.colorTransition = Math.min(1, this.colorTransition + dt * 2);
                    this.levelColorIndex = this.targetColorIndex;
                }
                
                this.scanlineOffset += speed * dt * 0.1;
                this.gridOffset += speed * dt * 0.05;
            }
            
            getCurrentColors() {
                const c = CONFIG.LEVEL_COLORS[this.levelColorIndex];
                const t = CONFIG.LEVEL_COLORS[this.targetColorIndex];
                const lerp = this.colorTransition;
                return {
                    bg: Utils.lerpColor ? Utils.lerpColor(c.bg, t.bg, lerp) : c.bg,
                    primary: Utils.lerpColor ? Utils.lerpColor(c.primary, t.primary, lerp) : c.primary,
                    secondary: Utils.lerpColor ? Utils.lerpColor(c.secondary, t.secondary, lerp) : c.secondary,
                    accent: Utils.lerpColor ? Utils.lerpColor(c.accent, t.accent, lerp) : c.accent
                };
            }
            
            render(ctx, width, height, scale, speed) {
                const colors = this.getCurrentColors();
                
                // Base background
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, colors.bg);
                grad.addColorStop(0.5, this.darken(colors.bg, 0.3));
                grad.addColorStop(1, CONFIG.COLORS.BG_DARKER);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                
                // Grid lines (perspective)
                ctx.save();
                ctx.strokeStyle = Utils.hexToRgba(colors.primary, 0.08);
                ctx.lineWidth = 1 * scale;
                const gridSize = 50 * scale;
                const offset = (this.gridOffset * scale) % gridSize;
                
                for (let x = -offset; x < width + gridSize; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, height * 0.4);
                    ctx.lineTo(width / 2, height);
                    ctx.stroke();
                }
                for (let y = height * 0.4; y < height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
                ctx.restore();
                
                // Distant buildings
                ctx.save();
                const buildingWidth = (width / this.buildingHeights.length) * 1.2;
                for (let i = 0; i < this.buildingHeights.length; i++) {
                    const x = (i * buildingWidth - (speed * 0.05 * Date.now() * 0.001) % buildingWidth) % (width + buildingWidth) - buildingWidth;
                    const h = this.buildingHeights[i] * scale;
                    const y = height * 0.4 - h;
                    
                    const grad = ctx.createLinearGradient(x, y, x, y + h);
                    grad.addColorStop(0, Utils.hexToRgba(this.buildingColors[i], 0.3));
                    grad.addColorStop(1, Utils.hexToRgba(this.buildingColors[i], 0.05));
                    ctx.fillStyle = grad;
                    ctx.fillRect(x, y, buildingWidth * 0.9, h);
                    
                    // Windows
                    ctx.fillStyle = Utils.hexToRgba(CONFIG.COLORS.YELLOW, 0.4);
                    for (let wx = x + 5; wx < x + buildingWidth * 0.9 - 5; wx += 15 * scale) {
                        for (let wy = y + 10; wy < y + h - 10; wy += 20 * scale) {
                            if (Math.random() > 0.7) ctx.fillRect(wx, wy, 6 * scale, 8 * scale);
                        }
                    }
                }
                ctx.restore();
                
                // Ground line
                ctx.save();
                ctx.strokeStyle = colors.primary;
                ctx.lineWidth = 3 * scale;
                ctx.shadowColor = colors.primary;
                ctx.shadowBlur = 10 * scale;
                ctx.beginPath();
                ctx.moveTo(0, CONFIG.BASE_GROUND_Y * scale);
                ctx.lineTo(width, CONFIG.BASE_GROUND_Y * scale);
                ctx.stroke();
                ctx.restore();
                
                // Scanlines
                ctx.save();
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.lineWidth = 1 * scale;
                for (let y = (this.scanlineOffset * scale) % (4 * scale); y < height; y += 4 * scale) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
                ctx.restore();
            }
            
            darken(color, amount) {
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                return `rgb(${Math.floor(r * (1 - amount))}, ${Math.floor(g * (1 - amount))}, ${Math.floor(b * (1 - amount))})`;
            }
        }
        
        // Add hexToRgba and lerpColor to Utils
        Utils.hexToRgba = function(hex, alpha = 1) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };
        
        Utils.lerpColor = function(c1, c2, t) {
            const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
            const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t);
            const g = Math.round(g1 + (g2 - g1) * t);
            const b = Math.round(b1 + (b2 - b1) * t);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        };
        
        // ============================================
        // PLAYER CLASS
        // ============================================
        class Player {
            constructor() {
                this.reset();
                this.trail = [];
                this.animTime = 0;
            }
            
            reset() {
                this.x = CONFIG.BASE_PLAYER_X;
                this.y = CONFIG.BASE_GROUND_Y;
                this.vy = 0;
                this.width = CONFIG.PLAYER_WIDTH;
                this.height = CONFIG.PLAYER_HEIGHT;
                this.groundY = CONFIG.BASE_GROUND_Y;
                this.isJumping = false;
                this.isDucking = false;
                this.targetHeight = this.height;
                this.hp = CONFIG.MAX_HP;
                this.maxHp = CONFIG.MAX_HP;
                this.invincible = 0;
                this.blinkTimer = 0;
                this.visible = true;
                this.trail = [];
            }
            
            update(dt, input, gameSpeed) {
                this.animTime += dt;
                
                // Invincibility
                if (this.invincible > 0) {
                    this.invincible -= dt * 1000;
                    this.blinkTimer += dt * 1000;
                    this.visible = Math.floor(this.blinkTimer / 100) % 2 === 0;
                    if (this.invincible <= 0) this.visible = true;
                }
                
                // Jump
                if (input.jumpPressed && !this.isJumping) {
                    this.vy = CONFIG.JUMP_FORCE;
                    this.isJumping = true;
                    this.isDucking = false;
                }
                
                // Duck
                this.isDucking = input.duckPressed && !this.isJumping;
                this.targetHeight = this.isDucking ? this.height * CONFIG.DUCK_HEIGHT_RATIO : this.height;
                
                // Smooth height transition
                this.height = Utils.lerp(this.height, this.targetHeight, dt * 15);
                this.y = this.groundY - this.height;
                
                // Physics
                this.vy += CONFIG.GRAVITY * dt;
                this.y += this.vy * dt;
                
                // Ground collision
                if (this.y >= this.groundY - this.height) {
                    this.y = this.groundY - this.height;
                    this.vy = 0;
                    if (this.isJumping) {
                        this.isJumping = false;
                        // Landing particles handled by game manager
                    }
                }
                
                // Trail
                this.trail.unshift({ x: this.x + this.width / 2, y: this.y + this.height / 2, time: this.animTime });
                if (this.trail.length > CONFIG.TRAIL_LENGTH) this.trail.pop();
            }
            
            getHitbox() {
                return {
                    x: this.x + (this.width * 0.15),
                    y: this.y + (this.height * 0.1),
                    width: this.width * 0.7,
                    height: this.height * 0.85
                };
            }
            
            takeDamage() {
                if (this.invincible > 0) return false;
                this.hp--;
                this.invincible = CONFIG.INVINCIBILITY_TIME;
                this.blinkTimer = 0;
                return this.hp <= 0;
            }
            
            heal(amount = 1) {
                this.hp = Math.min(this.maxHp, this.hp + amount);
            }
            
            render(ctx, scale, colors) {
                if (!this.visible) return;
                
                const x = this.x * scale;
                const y = this.y * scale;
                const w = this.width * scale;
                const h = this.height * scale;
                const primary = colors.primary;
                const secondary = colors.secondary;
                
                ctx.save();
                
                // Trail
                for (let i = this.trail.length - 1; i >= 0; i--) {
                    const t = this.trail[i];
                    const alpha = (1 - i / this.trail.length) * 0.3;
                    const size = (1 - i / this.trail.length) * w * 0.5;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = primary;
                    ctx.shadowColor = primary;
                    ctx.shadowBlur = 15 * scale;
                    ctx.beginPath();
                    ctx.arc(t.x * scale, t.y * scale, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                
                // Body glow
                ctx.shadowColor = primary;
                ctx.shadowBlur = 20 * scale;
                
                // Main body
                const radius = 6 * scale;
                Utils.roundRect(ctx, x, y, w, h, radius);
                const bodyGrad = ctx.createLinearGradient(x, y, x, y + h);
                bodyGrad.addColorStop(0, primary);
                bodyGrad.addColorStop(0.5, secondary);
                bodyGrad.addColorStop(1, primary);
                ctx.fillStyle = bodyGrad;
                ctx.fill();
                
                // Core glow line
                ctx.shadowBlur = 0;
                ctx.strokeStyle = CONFIG.COLORS.WHITE;
                ctx.lineWidth = 2 * scale;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.2, y + h * 0.5);
                ctx.lineTo(x + w * 0.8, y + h * 0.5);
                ctx.stroke();
                
                // Eye/Visor
                const eyeY = y + h * (this.isDucking ? 0.3 : 0.35);
                const eyeH = h * (this.isDucking ? 0.25 : 0.3);
                Utils.roundRect(ctx, x + w * 0.15, eyeY, w * 0.7, eyeH, 4 * scale);
                ctx.fillStyle = Utils.hexToRgba(CONFIG.COLORS.WHITE, 0.9);
                ctx.shadowColor = CONFIG.COLORS.WHITE;
                ctx.shadowBlur = 10 * scale;
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Neon accent lines
                ctx.strokeStyle = secondary;
                ctx.lineWidth = 1.5 * scale;
                ctx.shadowColor = secondary;
                ctx.shadowBlur = 8 * scale;
                // Top line
                ctx.beginPath();
                ctx.moveTo(x + w * 0.1, y + 2 * scale);
                ctx.lineTo(x + w * 0.9, y + 2 * scale);
                ctx.stroke();
                // Bottom line
                ctx.beginPath();
                ctx.moveTo(x + w * 0.1, y + h - 2 * scale);
                ctx.lineTo(x + w * 0.9, y + h - 2 * scale);
                ctx.stroke();
                
                // Jump boost effect
                if (this.isJumping && this.vy < -200) {
                    const boostH = Math.min(30 * scale, (-this.vy - 200) * 0.05 * scale);
                    ctx.fillStyle = Utils.hexToRgba(primary, 0.5);
                    ctx.shadowColor = primary;
                    ctx.shadowBlur = 15 * scale;
                    Utils.roundRect(ctx, x, y + h, w, boostH, radius);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        // ============================================
        // OBSTACLE CLASS
        // ============================================
        class Obstacle {
            constructor(type, x, colors, gameSpeed, level) {
                this.type = type;
                this.x = x;
                this.colors = colors;
                this.gameSpeed = gameSpeed;
                this.level = level;
                this.passed = false;
                this.scored = false;
                
                const def = CONFIG.OBSTACLE_TYPES[type];
                this.width = def.width;
                this.height = def.height;
                this.yOffset = def.yOffset;
                this.colorKey = def.color;
                this.lethal = def.lethal || false;
                this.double = def.double || false;
                this.triple = def.triple || false;
                this.points = def.points || 10;
                
                this.y = CONFIG.BASE_GROUND_Y + this.yOffset;
                this.animOffset = Utils.random(0, Math.PI * 2);
                this.glowPhase = 0;
            }
            
            update(dt, gameSpeed) {
                this.x -= gameSpeed * dt;
                this.glowPhase += dt * 5;
            }
            
            getHitboxes() {
                const boxes = [];
                const baseX = this.x;
                const baseY = this.y;
                const w = this.width;
                const h = this.height;
                
                if (this.triple) {
                    // Ground, low air, high air
                    boxes.push({ x: baseX, y: baseY, width: w, height: h });
                    boxes.push({ x: baseX, y: baseY - 80, width: w, height: h });
                    boxes.push({ x: baseX, y: baseY - 140, width: w, height: h });
                } else if (this.double) {
                    boxes.push({ x: baseX, y: baseY, width: w, height: h });
                    boxes.push({ x: baseX, y: baseY - 80, width: w, height: h });
                } else {
                    boxes.push({ x: baseX, y: baseY, width: w, height: h });
                }
                
                // Shrink hitbox slightly for fairness
                return boxes.map(b => ({
                    x: b.x + w * 0.1,
                    y: b.y + h * 0.1,
                    width: w * 0.8,
                    height: h * 0.8
                }));
            }
            
            render(ctx, scale, colors) {
                const color = colors[this.colorKey] || colors.primary;
                const glowIntensity = 15 + Math.sin(this.glowPhase) * 5;
                
                const boxes = this.getHitboxes();
                
                for (const box of boxes) {
                    const x = box.x * scale;
                    const y = box.y * scale;
                    const w = box.width * scale;
                    const h = box.height * scale;
                    
                    ctx.save();
                    ctx.shadowColor = color;
                    ctx.shadowBlur = glowIntensity * scale;
                    
                    // Main body
                    Utils.roundRect(ctx, x, y, w, h, 4 * scale);
                    const grad = ctx.createLinearGradient(x, y, x + w, y + h);
                    grad.addColorStop(0, color);
                    grad.addColorStop(0.5, Utils.hexToRgba(color, 0.8));
                    grad.addColorStop(1, color);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    
                    // Spikes on lethal
                    if (this.lethal) {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = colors.accent;
                        const spikes = 4;
                        for (let i = 0; i < spikes; i++) {
                            const sx = x + (w / spikes) * i + w / spikes * 0.5;
                            ctx.beginPath();
                            ctx.moveTo(sx - 6 * scale, y);
                            ctx.lineTo(sx, y - 15 * scale);
                            ctx.lineTo(sx + 6 * scale, y);
                            ctx.fill();
                        }
                    }
                    
                    // Neon trim
                    ctx.strokeStyle = Utils.hexToRgba(CONFIG.COLORS.WHITE, 0.6);
                    ctx.lineWidth = 1.5 * scale;
                    ctx.shadowColor = CONFIG.COLORS.WHITE;
                    ctx.shadowBlur = 5 * scale;
                    Utils.roundRect(ctx, x, y, w, h, 4 * scale);
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }
            
            isOffscreen(canvasWidth) {
                return this.x + this.width < 0;
            }
        }
        
        // ============================================
        // COLLECTIBLE CLASS
        // ============================================
        class Collectible {
            constructor(type, x, y, colors) {
                this.type = type; // 'coin' or 'health'
                this.x = x;
                this.y = y;
                this.colors = colors;
                this.collected = false;
                this.animTime = Utils.random(0, Math.PI * 2);
                this.floatOffset = Utils.random(0, Math.PI * 2);
                this.scale = 1;
                this.rotation = 0;
                
                if (type === 'coin') {
                    this.value = CONFIG.COIN_VALUE;
                    this.size = 18;
                    this.color = colors.accent;
                    this.glowColor = colors.accent;
                } else {
                    this.value = CONFIG.HEALTH_ORB_VALUE;
                    this.size = 22;
                    this.color = CONFIG.COLORS.GREEN;
                    this.glowColor = CONFIG.COLORS.GREEN;
                }
            }
            
            update(dt, gameSpeed) {
                this.x -= gameSpeed * dt;
                this.animTime += dt * 3;
                this.floatOffset += dt * 2;
                this.rotation += dt * 2;
                this.scale = 1 + Math.sin(this.animTime) * 0.15;
            }
            
            getHitbox() {
                const s = this.size * this.scale * 0.7;
                return {
                    x: this.x - s * 0.5,
                    y: this.y - s * 0.5,
                    width: s,
                    height: s
                };
            }
            
            render(ctx, scale) {
                const x = this.x * scale;
                const y = this.y * scale;
                const s = this.size * this.scale * scale;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                
                // Glow
                ctx.shadowColor = this.glowColor;
                ctx.shadowBlur = 20 * scale;
                
                if (this.type === 'coin') {
                    // Neon coin - rotating diamond
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        const angle = (i * Math.PI / 2) - Math.PI / 4;
                        const px = Math.cos(angle) * s * 0.7;
                        const py = Math.sin(angle) * s * 0.7;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    // Inner glow
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = Utils.hexToRgba(CONFIG.COLORS.WHITE, 0.8);
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        const angle = (i * Math.PI / 2) - Math.PI / 4;
                        const px = Math.cos(angle) * s * 0.3;
                        const py = Math.sin(angle) * s * 0.3;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Health orb - pulsating circle with cross
                    const pulse = 1 + Math.sin(this.animTime * 2) * 0.2;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.7 * pulse, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Cross
                    ctx.strokeStyle = CONFIG.COLORS.WHITE;
                    ctx.lineWidth = 3 * scale;
                    ctx.lineCap = 'round';
                    ctx.shadowColor = CONFIG.COLORS.WHITE;
                    ctx.shadowBlur = 5 * scale;
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.3, 0);
                    ctx.lineTo(s * 0.3, 0);
                    ctx.moveTo(0, -s * 0.3);
                    ctx.lineTo(0, s * 0.3);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
            
            isOffscreen() {
                return this.x + this.size < 0;
            }
        }
        
        // ============================================
        // GAME MANAGER - Main Controller
        // ============================================
        class GameManager {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.input = new InputManager();
                this.particles = new ParticleSystem();
                this.background = new Background();
                this.player = new Player();
                
                this.obstacles = [];
                this.collectibles = [];
                
                this.state = 'START'; // START, PLAYING, LEVEL_UP, GAME_OVER
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('nvcr_highscore') || '0', 10);
                this.level = 1;
                this.gameSpeed = CONFIG.INITIAL_SPEED;
                this.spawnTimer = 0;
                this.spawnInterval = CONFIG.BASE_SPAWN_INTERVAL;
                this.distance = 0;
                this.lastLevelUpScore = 0;
                this.levelUpTimer = 0;
                
                this.colors = CONFIG.LEVEL_COLORS[0];
                this.screenFlash = 0;
                this.flashColor = CONFIG.COLORS.WHITE;
                
                this.lastTime = 0;
                this.running = false;
                
                this.initUI();
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Start game loop
                requestAnimationFrame((t) => this.gameLoop(t));
            }
            
            initUI() {
                // Start button
                document.getElementById('btn-start').addEventListener('click', () => this.startGame());
                document.getElementById('btn-restart').addEventListener('click', () => this.startGame());
                document.getElementById('btn-menu').addEventListener('click', () => this.showStartScreen());
                
                // Keyboard start
                window.addEventListener('keydown', (e) => {
                    if (this.state === 'START' && (e.code === 'Space' || e.code === 'ArrowUp')) {
                        e.preventDefault();
                        this.startGame();
                    }
                    if (this.state === 'GAME_OVER' && e.code === 'Space') {
                        this.startGame();
                    }
                });
                
                // Touch start on canvas
                this.canvas.addEventListener('touchstart', (e) => {
                    if (this.state === 'START') {
                        e.preventDefault();
                        this.startGame();
                    } else if (this.state === 'GAME_OVER') {
                        e.preventDefault();
                        this.startGame();
                    }
                }, { passive: false });
                
                // Update high score display
                document.getElementById('best-score').textContent = this.highScore;
            }
            
            resize() {
                const container = document.getElementById('game-container');
                const rect = container.getBoundingClientRect();
                const maxWidth = rect.width;
                const maxHeight = rect.height;
                
                // Maintain 16:9 aspect ratio
                const aspect = CONFIG.DESIGN_WIDTH / CONFIG.DESIGN_HEIGHT;
                let width = maxWidth;
                let height = width / aspect;
                
                if (height > maxHeight) {
                    height = maxHeight;
                    width = height * aspect;
                }
                
                this.canvas.width = CONFIG.DESIGN_WIDTH;
                this.canvas.height = CONFIG.DESIGN_HEIGHT;
                this.canvas.style.width = `${width}px`;
                this.canvas.style.height = `${height}px`;
                
                this.scale = width / CONFIG.DESIGN_WIDTH;
            }
            
            startGame() {
                this.state = 'PLAYING';
                this.score = 0;
                this.level = 1;
                this.gameSpeed = CONFIG.INITIAL_SPEED;
                this.spawnTimer = 0;
                this.spawnInterval = CONFIG.BASE_SPAWN_INTERVAL;
                this.distance = 0;
                this.lastLevelUpScore = 0;
                this.screenFlash = 0;
                
                this.player.reset();
                this.obstacles = [];
                this.collectibles = [];
                this.particles.particles = [];
                
                this.colors = CONFIG.LEVEL_COLORS[0];
                this.background.setLevel(1);
                
                this.hideAllScreens();
                document.getElementById('hud-top').classList.remove('hidden');
                this.running = true;
            }
            
            showStartScreen() {
                this.state = 'START';
                this.running = false;
                this.hideAllScreens();
                document.getElementById('start-screen').classList.remove('hidden');
                document.getElementById('hud-top').classList.add('hidden');
                document.getElementById('best-score').textContent = this.highScore;
            }
            
            showGameOver() {
                this.state = 'GAME_OVER';
                this.running = false;
                this.hideAllScreens();
                document.getElementById('game-over-screen').classList.remove('hidden');
                document.getElementById('hud-top').classList.add('hidden');
                
                document.getElementById('final-score').textContent = this.score;
                document.getElementById('final-level').textContent = this.level;
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('nvcr_highscore', this.highScore.toString());
                    document.getElementById('best-score').textContent = this.highScore;
                }
                document.getElementById('best-score').textContent = this.highScore;
            }
            
            triggerLevelUp(newLevel) {
                this.state = 'LEVEL_UP';
                this.level = newLevel;
                this.levelUpTimer = 1.5; // seconds
                this.lastLevelUpScore = this.score;
                this.screenFlash = 1;
                this.flashColor = CONFIG.LEVEL_COLORS[(newLevel - 1) % CONFIG.LEVEL_COLORS.length].primary;
                
                // Increase difficulty
                this.gameSpeed = CONFIG.INITIAL_SPEED * (1 + (newLevel - 1) * CONFIG.SPEED_INCREMENT_PER_LEVEL);
                this.gameSpeed = Math.min(this.gameSpeed, CONFIG.INITIAL_SPEED * CONFIG.MAX_SPEED_MULTIPLIER);
                
                this.spawnInterval = Math.max(
                    CONFIG.MIN_SPAWN_INTERVAL,
                    CONFIG.BASE_SPAWN_INTERVAL * Math.pow(0.9, newLevel - 1)
                );
                
                // Update background colors
                this.background.setLevel(newLevel);
                this.colors = CONFIG.LEVEL_COLORS[(newLevel - 1) % CONFIG.LEVEL_COLORS.length];
                
                // Level up bonus
                this.score += CONFIG.LEVEL_UP_BONUS;
                
                // Particles
                this.particles.addLevelUp(
                    this.player.x + this.player.width / 2,
                    this.player.y + this.player.height / 2,
                    [this.colors.primary, this.colors.secondary, this.colors.accent]
                );
                
                this.hideAllScreens();
                document.getElementById('level-up-screen').classList.remove('hidden');
                document.getElementById('level-up-number').textContent = newLevel.toString().padStart(2, '0');
                document.getElementById('level-up-screen').style.setProperty('--flash-color', this.flashColor);
            }
            
            hideAllScreens() {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('game-over-screen').classList.add('hidden');
                document.getElementById('level-up-screen').classList.add('hidden');
            }
            
            gameLoop(timestamp) {
                if (!this.lastTime) this.lastTime = timestamp;
                const dt = Math.min((timestamp - this.lastTime) / 1000, 1/30); // Cap at 30fps minimum
                this.lastTime = timestamp;
                
                if (this.running) {
                    this.update(dt);
                }
                this.render();
                
                requestAnimationFrame((t) => this.gameLoop(t));
            }
            
            update(dt) {
                // Screen flash
                if (this.screenFlash > 0) {
                    this.screenFlash = Math.max(0, this.screenFlash - dt * 2);
                }
                
                // Level up transition
                if (this.state === 'LEVEL_UP') {
                    this.levelUpTimer -= dt;
                    if (this.levelUpTimer <= 0) {
                        this.state = 'PLAYING';
                        this.hideAllScreens();
                    }
                    // Still update background during transition
                    this.background.update(dt, this.gameSpeed, this.level);
                    this.particles.update(dt);
                    return;
                }
                
                // Input
                const jumpPressed = this.input.consumeJump();
                const duckPressed = this.input.consumeDuck();
                
                // Player
                const wasJumping = this.player.isJumping;
                this.player.update(dt, { jumpPressed, duckPressed }, this.gameSpeed);
                
                // Landing particles
                if (wasJumping && !this.player.isJumping) {
                    this.particles.addLandingDust(
                        (this.player.x + this.player.width / 2) * this.scale,
                        (this.player.y + this.player.height) * this.scale,
                        this.colors.primary
                    );
                }
                
                // Trail particles
                if (Math.random() < 0.3) {
                    this.particles.addTrail(
                        (this.player.x + this.player.width / 2) * this.scale,
                        (this.player.y + this.player.height / 2) * this.scale,
                        this.colors.primary
                    );
                }
                
                // Distance & Score
                this.distance += this.gameSpeed * dt;
                this.score += CONFIG.SCORE_PER_SECOND * dt;
                
                // Level progression
                const newLevel = getLevelFromScore(Math.floor(this.score));
                if (newLevel > this.level) {
                    this.triggerLevelUp(newLevel);
                }
                
                // Spawn obstacles
                this.spawnTimer += dt * 1000;
                if (this.spawnTimer >= this.spawnInterval) {
                    this.spawnObstacle();
                    this.spawnTimer = 0;
                    
                    // Chance to spawn collectible
                    if (Math.random() < 0.3) {
                        this.spawnCollectible();
                    }
                }
                
                // Update obstacles
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obs = this.obstacles[i];
                    obs.update(dt, this.gameSpeed);
                    
                    // Collision
                    if (!obs.scored && this.checkCollision(this.player.getHitbox(), obs.getHitboxes())) {
                        obs.scored = true;
                        const dead = this.player.takeDamage();
                        this.particles.addHit(
                            (this.player.x + this.player.width / 2) * this.scale,
                            (this.player.y + this.player.height / 2) * this.scale,
                            this.colors.secondary
                        );
                        this.screenFlash = 0.3;
                        this.flashColor = CONFIG.COLORS.RED;
                        if (dead) {
                            this.showGameOver();
                            break;
                        }
                    }
                    
                    // Score for passing
                    if (!obs.passed && obs.x + obs.width < this.player.x) {
                        obs.passed = true;
                        this.score += obs.points;
                    }
                    
                    // Remove offscreen
                    if (obs.isOffscreen(CONFIG.DESIGN_WIDTH)) {
                        this.obstacles.splice(i, 1);
                    }
                }
                
                // Update collectibles
                for (let i = this.collectibles.length - 1; i >= 0; i--) {
                    const col = this.collectibles[i];
                    col.update(dt, this.gameSpeed);
                    
                    if (this.checkCollision(this.player.getHitbox(), [col.getHitbox()])) {
                        this.collectibles.splice(i, 1);
                        this.score += col.value;
                        this.particles.addCollect(
                            col.x * this.scale,
                            col.y * this.scale,
                            col.glowColor
                        );
                        if (col.type === 'health') {
                            this.player.heal(1);
                        }
                    } else if (col.isOffscreen()) {
                        this.collectibles.splice(i, 1);
                    }
                }
                
                // Particles
                this.particles.update(dt);
                
                // Background
                this.background.update(dt, this.gameSpeed, this.level);
                
                // Update HUD
                this.updateHUD();
            }
            
            checkCollision(playerBox, obstacleBoxes) {
                for (const obs of obstacleBoxes) {
                    if (playerBox.x < obs.x + obs.width &&
                        playerBox.x + playerBox.width > obs.x &&
                        playerBox.y < obs.y + obs.height &&
                        playerBox.y + playerBox.height > obs.y) {
                        return true;
                    }
                }
                return false;
            }
            
            spawnObstacle() {
                const availablePatterns = CONFIG.LEVEL_PATTERNS[this.level] || CONFIG.LEVEL_PATTERNS[5];
                const type = Utils.randomChoice(availablePatterns);
                
                // Add some variation in X position
                const x = CONFIG.DESIGN_WIDTH + Utils.random(0, 200);
                
                const obs = new Obstacle(type, x, this.colors, this.gameSpeed, this.level);
                this.obstacles.push(obs);
            }
            
            spawnCollectible() {
                const type = Math.random() < 0.85 ? 'coin' : 'health';
                // Spawn at jump height or duck height
                const isHigh = Math.random() < 0.5;
                const y = isHigh ? 
                    CONFIG.BASE_GROUND_Y - Utils.random(100, 160) : 
                    CONFIG.BASE_GROUND_Y - Utils.random(30, 70);
                const x = CONFIG.DESIGN_WIDTH + Utils.random(100, 300);
                
                const col = new Collectible(type, x, y, this.colors);
                this.collectibles.push(col);
            }
            
            updateHUD() {
                document.getElementById('score-value').textContent = Math.floor(this.score);
                document.getElementById('level-value').textContent = this.level;
                document.getElementById('hp-value').textContent = this.player.hp;
                
                const hpFill = document.getElementById('hp-fill');
                const hpPercent = (this.player.hp / this.player.maxHp) * 100;
                hpFill.style.width = `${hpPercent}%`;
                
                const hpPanel = document.getElementById('hud-hp');
                if (this.player.hp <= 1) hpPanel.classList.add('low');
                else hpPanel.classList.remove('low');
            }
            
            render() {
                const ctx = this.ctx;
                const w = CONFIG.DESIGN_WIDTH;
                const h = CONFIG.DESIGN_HEIGHT;
                
                // Clear
                ctx.fillStyle = this.colors.bg;
                ctx.fillRect(0, 0, w, h);
                
                // Background
                this.background.render(ctx, w, h, this.scale, this.gameSpeed);
                
                // Screen flash
                if (this.screenFlash > 0) {
                    ctx.save();
                    ctx.globalAlpha = this.screenFlash;
                    ctx.fillStyle = this.flashColor;
                    ctx.fillRect(0, 0, w, h);
                    ctx.restore();
                }
                
                // Obstacles
                for (const obs of this.obstacles) {
                    obs.render(ctx, this.scale, this.colors);
                }
                
                // Collectibles
                for (const col of this.collectibles) {
                    col.render(ctx, this.scale);
                }
                
                // Player
                this.player.render(ctx, this.scale, this.colors);
                
                // Particles
                this.particles.render(ctx, this.scale);
                
                // Ground glow line
                ctx.save();
                ctx.strokeStyle = this.colors.primary;
                ctx.lineWidth = 2 * this.scale;
                ctx.shadowColor = this.colors.primary;
                ctx.shadowBlur = 10 * this.scale;
                ctx.beginPath();
                ctx.moveTo(0, CONFIG.BASE_GROUND_Y * this.scale);
                ctx.lineTo(w, CONFIG.BASE_GROUND_Y * this.scale);
                ctx.stroke();
                ctx.restore();
            }
        }
        
        // ============================================
        // INITIALIZE GAME
        // ============================================
        let game;
        
        // Wait for DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                game = new GameManager();
            });
        } else {
            game = new GameManager();
        }
        
        // Prevent pull-to-refresh on mobile
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('#game-container')) {
                e.preventDefault();
            }
        }, { passive: false });
        
    </script>
