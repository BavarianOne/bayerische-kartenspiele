<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>3D Maze Game</title>
<style>
  body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;touch-action:none}
  #intro{display:flex;flex-direction:column;align-items:center}
  #hud{display:none;justify-content:space-around;font-size:18px;padding:10px;background:#222}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  #w,#s,#a,#d{
    position:fixed;
    width:70px;height:70px;
    background:rgba(255,255,255,0.2);
    border:3px solid #fff;
    border-radius:12px;
    text-align:center;
    line-height:70px;
    font-size:28px;
    font-weight:700;
    z-index:10000;
    color:#fff;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #w:active,#a:active,#s:active,#d:active{background:rgba(255,255,255,0.4)}
  #w{top:15px;left:80px}
  #a{top:85px;left:15px}
  #s{top:85px;left:80px}
  #d{top:85px;left:145px}
  #fs{border:none;background:#00ff00;color:#000;padding:10px 20px;font-size:18px;cursor:pointer;border-radius:5px;margin:10px}
  @media (max-width: 600px) {
    #w,#s,#a,#d{width:80px;height:80px;font-size:32px;line-height:80px}
    #w{top:10px;left:90px}
    #a{top:90px;left:10px}
    #s{top:90px;left:90px}
    #d{top:90px;left:170px}
  }
</style>
<script src="three.min.js"></script>
</head>
<body>
<div id="intro">
  <h1>3D Maze Game</h1>
  <ul style="text-align:left;display:inline-block;margin:10px auto">
    <li>Find the gold trophy at the end of the maze</li>
    <li>Use arrow/WASD to move</li>
    <li>Mouse to look around</li>
    <li>Find green keys to open red doors</li>
    <li>Avoid red enemies and purple traps</li>
    <li>Collect blue orbs for +time</li>
  </ul>
  <button id="sB">Start Game</button>
  <p style="margin:5px 0">Level: <select id="lvl"><option value="1">1 - Beginner</option><option value="2">2 - Easy</option><option value="3">3 - Medium</option><option value="4">4 - Hard</option><option value="5">5 - Expert</option><option value="6">6 - Master</option><option value="7">7 - Insane</option></select></p>
</div>
<div id="hud"><div>Level: <span id="lv">1</span></div><div>Keys: <span id="ky">0/0</span></div><div>Time: <span id="tm">0</span> s</div><div>Score: <span id="sc">0</span></div><div>Lives: <span id="li">3</span></div></div>
<button id="fs">Full Screen</button>
<div id="w">W</div><div id="a">A</div><div id="s">S</div><div id="d">D</div>
<canvas id="cnv"></canvas>
<script src="maze3d.js"></script>
</body>
</html>
