<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let snake = [{ x: 100, y: 100 }];
        let direction = 'RIGHT';
        let foodX;
        let foodY;
        let score = 0;
        let gameRunning = true;

        function placeFood() {
            foodX = Math.floor(Math.random() * (canvas.width / 20)) * 20;
            foodY = Math.floor(Math.random() * (canvas.height / 20)) * 20;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'green';
            snake.forEach(segment => ctx.fillRect(segment.x, segment.y, 20, 20));
            ctx.fillStyle = 'red';
            ctx.fillRect(foodX, foodY, 20, 20);
        }

        function moveUp() {
            if (direction !== 'DOWN') direction = 'UP';
        }

        function moveDown() {
            if (direction !== 'UP') direction = 'DOWN';
        }

        function moveLeft() {
            if (direction !== 'RIGHT') direction = 'LEFT';
        }

        function moveRight() {
            if (direction !== 'LEFT') direction = 'RIGHT';
        }

        function update() {
            let head = { x: snake[0].x, y: snake[0].y };

            switch (direction) {
                case 'UP':
                    head.y -= 20;
                    break;
                case 'DOWN':
                    head.y += 20;
                    break;
                case 'LEFT':
                    head.x -= 20;
                    break;
                case 'RIGHT':
                    head.x += 20;
                    break;
            }

            if (head.x === foodX && head.y === foodY) {
                score++;
                placeFood();
                snake.push({ x: snake[snake.length - 1].x, y: snake[snake.length - 1].y });
            } else {
                snake.pop();
            }

            snake.unshift(head);

            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                gameRunning = false;
                alert('Game Over! Your score is ' + score);
                // Reset the game state
                resetGame();
            }
        }

        function resetGame() {
            snake = [{ x: 100, y: 100 }];
            direction = 'RIGHT';
            foodX = null;
            foodY = null;
            score = 0;
            gameRunning = true;

            // Reattach the key event listener
            document.removeEventListener('keydown', handleKeyDown);
            document.addEventListener('keydown', handleKeyDown);
        }

        function handleKeyDown(e) {
            if (!gameRunning) return; // Do nothing if the game is not running

            if (e.key === 'ArrowUp') moveUp();
            else if (e.key === 'ArrowDown') moveDown();
            else if (e.key === 'ArrowLeft') moveLeft();
            else if (e.key === 'ArrowRight') moveRight();
        }

        placeFood();

        setInterval(() => {
            if (gameRunning) {
                update();
                draw();
            }
        }, 100);

        // Attach the key event listener initially
        document.addEventListener('keydown', handleKeyDown);
    </script>
</body>
</html>
