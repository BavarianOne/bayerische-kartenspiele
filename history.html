<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historische Orte Entdecken - Repariert</title>
    
    <!-- Leaflet CSS für die Karte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        :root {
            --bg-color: #f4f4f7;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 50%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #34495e;
        }

        .map-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        #map {
            width: 100%;
            height: 450px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1;
        }

        /* Schwebender Button auf der Karte */
        .map-search-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }
        .map-search-btn:hover {
            background-color: #c0392b;
        }

        .gallery-title {
            color: var(--primary-color);
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd;
            cursor: pointer;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.4;
            word-break: break-word;
        }

        .card-meta {
            font-size: 12px;
            color: #7f8c8d;
        }

        .card-meta a {
            color: #3498db;
            text-decoration: none;
        }

        .status-message {
            text-align: center;
            font-size: 18px;
            color: #7f8c8d;
            grid-column: 1 / -1;
            padding: 40px 0;
        }

        .popup-img {
            max-width: 150px;
            max-height: 150px;
            display: block;
            margin-top: 5px;
            border-radius: 4px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Zeitreise-Karte</h1>
        <p>Suche einen Ort oder bewege die Karte und klicke auf den roten Button, um alte Bilder zu laden.</p>
    </header>

    <div class="search-box">
        <input type="text" id="location-input" placeholder="Ort eingeben (z.B. München, Landshut...)" onkeypress="if(event.key === 'Enter') searchLocation()">
        <button onclick="searchLocation()">Suchen</button>
    </div>

    <div class="map-wrapper">
        <button class="map-search-btn" onclick="triggerSearchFromMap()">➔ Hier nach alten Bildern suchen</button>
        <div id="map"></div>
    </div>

    <h2 class="gallery-title">Historische Funde</h2>
    <div id="loader" class="loader"></div>
    <div id="gallery" class="gallery">
        <div class="status-message">Nutze die Suche oder klicke auf den roten Button auf der Karte.</div>
    </div>
</div>

<!-- Leaflet JS für die Karte -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    let map;
    let markerLayer;

    window.onload = function() {
        // Startet standardmäßig direkt in München/Bayern
        map = L.map('map').setView([48.1351, 11.5820], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        markerLayer = L.layerGroup().addTo(map);
        
        // Erste Initialsuche beim Laden starten
        triggerSearchFromMap();
    };

    async function searchLocation() {
        const query = document.getElementById('location-input').value.trim();
        if (!query) return;

        try {
            const osmUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
            const response = await fetch(osmUrl);
            const data = await response.json();

            if (data.length === 0) {
                alert("Ort wurde leider nicht gefunden.");
                return;
            }

            const lat = parseFloat(data[0].lat);
            const lon = parseFloat(data[0].lon);

            map.setView([lat, lon], 14);
            
            // Kleine Verzögerung, damit die Karte Zeit zum Ausrichten hat
            setTimeout(() => { triggerSearchFromMap(); }, 400);
        } catch (error) {
            console.error("Fehler bei der Ortssuche:", error);
        }
    }

    function triggerSearchFromMap() {
        const center = map.getCenter();
        loadImagesForCoords(center.lat, center.lng);
    }

    async function loadImagesForCoords(lat, lon) {
        const gallery = document.getElementById('gallery');
        const loader = document.getElementById('loader');
        
        gallery.innerHTML = '';
        loader.style.display = 'block';
        markerLayer.clearLayers();

        try {
            // Radius berechnen (in Metern) anhand des Zoomlevels
            const zoom = map.getZoom();
            const radius = zoom >= 14 ? 2000 : (20 - zoom) * 2000;

            // Schritt 1: Geosearch über Wikimedia Commons (Keine Custom Header im Browser-Fetch!)
            const wikiUrl = `https://commons.wikimedia.org/w/api.php?action=query&list=geosearch&gsradius=${radius}&gscoord=${lat}%7C${lon}&gslimit=100&format=json&origin=*`;
            
            const wikiResponse = await fetch(wikiUrl);
            const wikiData = await wikiResponse.json();

            // Falls die API einen Fehler wirft oder nichts findet
            if (wikiData.error || !wikiData.query || !wikiData.query.geosearch || wikiData.query.geosearch.length === 0) {
                gallery.innerHTML = `<div class="status-message">Keine georeferenzierten Bilder im Umkreis von ${Math.round(radius/1000)} km gefunden. Schiebe die Karte ein Stück weiter.</div>`;
                loader.style.display = 'none';
                return;
            }

            const pageIds = wikiData.query.geosearch.map(item => item.pageid);
            const slicedIds = pageIds.slice(0, 50).join('|');

            // Schritt 2: Detaildaten für die Bild-IDs holen
            const detailsUrl = `https://commons.wikimedia.org/w/api.php?action=query&pageids=${slicedIds}&prop=pageimages|imageinfo&iiprop=url|extmetadata&pithumbsize=400&format=json&origin=*`;
            
            const detailsResponse = await fetch(detailsUrl);
            const detailsData = await detailsResponse.json();
            
            if (!detailsData.query || !detailsData.query.pages) {
                gallery.innerHTML = `<div class="status-message">Fehler beim Laden der Bilddetails.</div>`;
                loader.style.display = 'none';
                return;
            }

            const pages = detailsData.query.pages;
            let htmlContent = '';
            let imageCount = 0;

            const geoLookup = {};
            wikiData.query.geosearch.forEach(item => {
                geoLookup[item.pageid] = { lat: item.lat, lon: item.lon };
            });

            for (const id in pages) {
                const page = pages[id];
                if (!page.thumbnail) continue;

                const title = page.title.replace('File:', '');
                let description = '';
                let date = 'Unbekannt';
                
                if (page.imageinfo && page.imageinfo[0] && page.imageinfo[0].extmetadata) {
                    const meta = page.imageinfo[0].extmetadata;
                    description = meta.ImageDescription ? meta.ImageDescription.value : '';
                    date = meta.DateTimeOriginal ? meta.DateTimeOriginal.value : 'Unbekannt';
                }

                const searchString = (title + " " + description).toLowerCase();
                // Breiter gefasster Filter für historische Treffer
                const isHistoric = /historisch|history|18\d{2}|19\d{2}|altes|old|postcard|postkarte|ansichtskarte|damals|krieg|schloss|bahnhof|kirche|jahrhundert|vintage|monument/i.test(searchString);

                if (isHistoric) {
                    imageCount++;
                    const imgSrc = page.thumbnail.source;
                    const originalUrl = (page.imageinfo && page.imageinfo[0]) ? page.imageinfo[0].descriptionurl : '#';
                    const cleanDesc = description.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 90) + "...";
                    const itemLat = geoLookup[id].lat;
                    const itemLon = geoLookup[id].lon;

                    // Marker auf die Karte setzen
                    const marker = L.marker([itemLat, itemLon]);
                    marker.bindPopup(`
                        <div style="max-width: 160px;">
                            <strong>${title.substring(0, 25)}...</strong><br>
                            <img src="${imgSrc}" class="popup-img" style="width:100%; max-height:120px; object-fit:cover; margin:5px 0;"><br>
                            <a href="${originalUrl}" target="_blank" style="font-size:11px;">Commons-Link ↗</a>
                        </div>
                    `);
                    markerLayer.addLayer(marker);

                    // Karte für die Galerie bauen
                    htmlContent += `
                        <div class="card">
                            <img src="${imgSrc}" alt="${title}" loading="lazy" onclick="zoomToMarker(${itemLat}, ${itemLon})">
                            <div class="card-content">
                                <div class="card-title">${title.substring(0, 45)}...</div>
                                <div class="card-meta">
                                    <p>${description ? cleanDesc : 'Keine Beschreibung verfügbar.'}</p>
                                    <p><strong>Jahr/Datum:</strong> ${date.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 20)}</p>
                                    <p><a href="${originalUrl}" target="_blank">Originaldatei ansehen ↗</a></p>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            loader.style.display = 'none';

            if (imageCount === 0) {
                gallery.innerHTML = `<div class="status-message">Keine explizit historischen Fotos direkt in diesem Ausschnitt gefunden. Verschiebe die Karte z.B. näher zum Marienplatz oder Hauptbahnhof!</div>`;
            } else {
                gallery.innerHTML = htmlContent;
            }

        } catch (error) {
            console.error("Fehler:", error);
            loader.style.display = 'none';
            gallery.innerHTML = `<div class="status-message">API-Verbindungsfehler. Bitte lade die Seite einmal neu.</div>`;
        }
    }

    function zoomToMarker(lat, lon) {
        map.setView([lat, lon], 16);
        markerLayer.eachLayer(function(layer) {
            if (layer.getLatLng().lat === lat && layer.getLatLng().lng === lon) {
                layer.openPopup();
            }
        });
        window.scrollTo({ top: 200, behavior: 'smooth' });
    }
</script>

</body>
</html>
