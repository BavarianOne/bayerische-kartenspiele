<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historische Orte - Mit Zeitleiste</title>
    
    <!-- Leaflet CSS für die Karte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        :root {
            --bg-color: #f4f4f7;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 50%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .map-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        #map {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1;
        }

        .map-search-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }
        .map-search-btn:hover {
            background-color: #c0392b;
        }

        /* Zeitleisten-Bereich */
        .timeline-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            text-align: center;
        }

        .timeline-slider {
            width: 80%;
            margin: 15px 0;
            cursor: pointer;
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            width: 80%;
            margin: 0 auto;
            color: #7f8c8d;
            font-size: 14px;
        }

        .current-year-display {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd;
            cursor: pointer;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .badge-year {
            background-color: var(--primary-color);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .status-message {
            text-align: center;
            font-size: 18px;
            color: #7f8c8d;
            grid-column: 1 / -1;
            padding: 40px 0;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Interaktive Zeitreise</h1>
        <p>Ort suchen, Ausschnitt wählen und mit der Zeitleiste durch die Jahrzehnte springen.</p>
    </header>

    <div class="search-box">
        <input type="text" id="location-input" placeholder="Ort eingeben (z.B. Berlin, München...)" onkeypress="if(event.key === 'Enter') searchLocation()">
        <button onclick="searchLocation()">Suchen</button>
    </div>

    <div class="map-wrapper">
        <button class="map-search-btn" onclick="triggerSearchFromMap()">➔ Bilder für diesen Ausschnitt laden</button>
        <div id="map"></div>
    </div>

    <!-- Die neue Zeitleiste -->
    <div class="timeline-container">
        <div>Zeige Bilder bis zum Jahr: <span id="year-val" class="current-year-display">1950</span></div>
        <input type="range" min="1850" max="1990" value="1950" class="timeline-slider" id="time-slider" oninput="updateTimelineFilter(this.value)">
        <div class="timeline-labels">
            <span>1850</span>
            <span>1900</span>
            <span>1930</span>
            <span>1950</span>
            <span>1970</span>
            <span>1990</span>
        </div>
    </div>

    <div id="loader" class="loader"></div>
    <div id="gallery" class="gallery">
        <div class="status-message">Klicke auf den roten Button auf der Karte, um die Zeitleiste zu füttern.</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    let map;
    let markerLayer;
    let allFetchedImages = []; // Speicher für alle aktuell geladenen Bilder

    window.onload = function() {
        // Startet standardmäßig in Berlin Mitte
        map = L.map('map').setView([52.5162, 13.3777], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        markerLayer = L.layerGroup().addTo(map);
        triggerSearchFromMap();
    };

    async function searchLocation() {
        const query = document.getElementById('location-input').value.trim();
        if (!query) return;

        try {
            const osmUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
            const response = await fetch(osmUrl);
            const data = await response.json();

            if (data.length === 0) {
                alert("Ort nicht gefunden.");
                return;
            }

            map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 14);
            setTimeout(() => { triggerSearchFromMap(); }, 400);
        } catch (error) {
            console.error(error);
        }
    }

    function triggerSearchFromMap() {
        const center = map.getCenter();
        loadImagesForCoords(center.lat, center.lng);
    }

    // Hilfsfunktion: Versucht radikal eine echte Jahreszahl (1600-1990) aus dem Text zu ziehen
    function extractYear(text) {
        if (!text) return null;
        // Findet vierstellige Zahlen, die mit 16, 17, 18 oder 19 beginnen
        const match = text.match(/\b(16|17|18|19)\d{2}\b/);
        return match ? parseInt(match[0], 10) : null;
    }

    async function loadImagesForCoords(lat, lon) {
        const gallery = document.getElementById('gallery');
        const loader = document.getElementById('loader');
        
        gallery.innerHTML = '';
        loader.style.display = 'block';
        markerLayer.clearLayers();
        allFetchedImages = []; // Cache leeren

        try {
            const zoom = map.getZoom();
            const radius = zoom >= 14 ? 2500 : (20 - zoom) * 2000;

            // 1. Geosearch
            const wikiUrl = `https://commons.wikimedia.org/w/api.php?action=query&list=geosearch&gsradius=${radius}&gscoord=${lat}%7C${lon}&gslimit=150&format=json&origin=*`;
            const wikiResponse = await fetch(wikiUrl);
            const wikiData = await wikiResponse.json();

            if (!wikiData.query || !wikiData.query.geosearch || wikiData.query.geosearch.length === 0) {
                gallery.innerHTML = `<div class="status-message">Keine Bilder in diesem Ausschnitt gefunden.</div>`;
                loader.style.display = 'none';
                return;
            }

            const pageIds = wikiData.query.geosearch.map(item => item.pageid);
            const slicedIds = pageIds.slice(0, 50).join('|');

            // 2. Details holen
            const detailsUrl = `https://commons.wikimedia.org/w/api.php?action=query&pageids=${slicedIds}&prop=pageimages|imageinfo&iiprop=url|extmetadata&pithumbsize=400&format=json&origin=*`;
            const detailsResponse = await fetch(detailsUrl);
            const detailsData = await detailsResponse.json();

            const pages = detailsData.query.pages;
            const geoLookup = {};
            wikiData.query.geosearch.forEach(item => { geoLookup[item.pageid] = { lat: item.lat, lon: item.lon }; });

            for (const id in pages) {
                const page = pages[id];
                if (!page.thumbnail) continue;

                const title = page.title.replace('File:', '');
                let description = '';
                let rawDate = '';
                
                if (page.imageinfo && page.imageinfo[0] && page.imageinfo[0].extmetadata) {
                    const meta = page.imageinfo[0].extmetadata;
                    description = meta.ImageDescription ? meta.ImageDescription.value : '';
                    rawDate = meta.DateTimeOriginal ? meta.DateTimeOriginal.value : '';
                }

                // Jahreszahl-Erkennung über alle verfügbaren Textfelder herbeiführen
                let detectedYear = extractYear(rawDate) || extractYear(title) || extractYear(description);

                // Wenn KEINE Jahreszahl gefunden wurde, filtern wir es rigoros aus (Schutz vor modernen Bildern)
                if (detectedYear && detectedYear <= 1995) {
                    allFetchedImages.push({
                        id: id,
                        title: title,
                        year: detectedYear,
                        imgSrc: page.thumbnail.source,
                        originalUrl: page.imageinfo[0].descriptionurl,
                        description: description.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 90) + "...",
                        lat: geoLookup[id].lat,
                        lon: geoLookup[id].lon
                    });
                }
            }

            // Chronologisch sortieren (Älteste zuerst)
            allFetchedImages.sort((a, b) => a.year - b.year);

            loader.style.display = 'none';
            
            // Aktuellen Slider-Wert nutzen, um Galerie initial zu rendern
            const currentSliderVal = document.getElementById('time-slider').value;
            updateTimelineFilter(currentSliderVal);

        } catch (error) {
            console.error(error);
            loader.style.display = 'none';
            gallery.innerHTML = `<div class="status-message">Fehler beim Laden der Zeitleiste.</div>`;
        }
    }

    // Filtert und rendert die Ansicht live, wenn der Slider bewegt wird
    function updateTimelineFilter(selectedYear) {
        document.getElementById('year-val').innerText = selectedYear;
        const gallery = document.getElementById('gallery');
        
        // Alte Marker von der Karte löschen, wir bauen sie passend zum Jahr neu
        markerLayer.clearLayers();
        
        // Nur Bilder filtern, deren Jahr KLEINER ODER GLEICH dem ausgewählten Slider-Jahr ist
        const filtered = allFetchedImages.filter(img => img.year <= parseInt(selectedYear, 10));

        if (filtered.length === 0) {
            gallery.innerHTML = `<div class="status-message">Keine historischen Bilder bis zum Jahr ${selectedYear} in diesem Bereich gefunden. Schiebe den Regler weiter nach rechts.</div>`;
            return;
        }

        let htmlContent = '';
        filtered.forEach(img => {
            // Marker auf Karte setzen
            const marker = L.marker([img.lat, img.lon]);
            marker.bindPopup(`
                <div style="max-width: 160px;">
                    <span style="background:#2c3e50; color:white; padding:2px 5px; border-radius:3px; font-size:10px;">Jahr: ${img.year}</span><br>
                    <img src="${img.imgSrc}" style="width:100%; max-height:120px; object-fit:cover; margin:5px 0;"><br>
                    <a href="${img.originalUrl}" target="_blank" style="font-size:11px;">Original öffnen ↗</a>
                </div>
            `);
            markerLayer.addLayer(marker);

            // Galerie-Card erstellen
            htmlContent += `
                <div class="card">
                    <img src="${img.imgSrc}" alt="${img.title}" onclick="map.setView([${img.lat}], [${img.lon}], 16)">
                    <div class="card-content">
                        <span class="badge-year">Jahr: ${img.year}</span>
                        <div class="card-title">${img.title.substring(0, 45)}...</div>
                        <div class="card-meta">
                            <p>${img.description}</p>
                            <p><a href="${img.originalUrl}" target="_blank">Originaldatei ansehen ↗</a></p>
                        </div>
                    </div>
                </div>
            `;
        });

        gallery.innerHTML = htmlContent;
    }
</script>

</body>
</html>
