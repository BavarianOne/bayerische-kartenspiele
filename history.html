<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historische Orte Entdecken - Interaktiv</title>
    
    <!-- Leaflet CSS für die Karte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        :root {
            --bg-color: #f4f4f7;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2c3e50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 50%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #34495e;
        }

        /* Karten-Layout */
        #map {
            width: 100%;
            height: 450px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            z-index: 1;
        }

        .gallery-title {
            color: var(--primary-color);
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd;
            cursor: pointer;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 12px;
            color: #7f8c8d;
        }

        .card-meta a {
            color: #3498db;
            text-decoration: none;
        }

        .status-message {
            text-align: center;
            font-size: 18px;
            color: #7f8c8d;
            grid-column: 1 / -1;
            padding: 40px 0;
        }

        .popup-img {
            max-width: 150px;
            max-height: 150px;
            display: block;
            margin-top: 5px;
            border-radius: 4px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Zeitreise-Karte</h1>
        <p>Suche einen Ort oder bewege die Karte, um historische Fotos aus der Umgebung zu laden.</p>
    </header>

    <div class="search-box">
        <input type="text" id="location-input" placeholder="Ort oder Adresse eingeben..." onkeypress="if(event.key === 'Enter') searchLocation()">
        <button onclick="searchLocation()">Suchen</button>
    </div>

    <!-- Das Karten-Element -->
    <div id="map"></div>

    <h2 class="gallery-title">Historische Funde in diesem Ausschnitt</h2>
    <div id="loader" class="loader"></div>
    <div id="gallery" class="gallery">
        <div class="status-message">Bewege die Karte oder starte eine Suche, um Bilder zu laden.</div>
    </div>
</div>

<!-- Leaflet JS für die Karte -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    let map;
    let markerLayer;
    let isSearching = false;

    // Karte beim Laden initialisieren
    window.onload = function() {
        // Startposition (Mitte von Deutschland als Standard)
        map = L.map('map').setView([51.1657, 10.4515], 6);

        // OpenStreetMap Kacheln hinzufügen
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap-Mitwirkende'
        }).addTo(map);

        // Separater Layer für die Bildmarker, damit wir sie leicht löschen können
        markerLayer = L.layerGroup().addTo(map);

        // Event-Listener: Sobald das Verschieben/Zoomen der Karte ENDET, neue Bilder laden
        map.on('moveend', function() {
            const center = map.getCenter();
            // Wir suchen nur automatisch, wenn der Zoom tief genug ist (damit es nicht zu viele Daten auf einmal sind)
            if (map.getZoom() >= 11) {
                loadImagesForCoords(center.lat, center.lng);
            } else {
                document.getElementById('gallery').innerHTML = `<div class="status-message">Zoome näher heran, um historische Bilder für diesen Ausschnitt zu laden.</div>`;
            }
        });
    };

    // Funktion für die manuelle Ortssuche oben
    async function searchLocation() {
        const query = document.getElementById('location-input').value.trim();
        if (!query) return;

        try {
            const osmUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
            const osmResponse = await fetch(osmUrl, {
                headers: { 'User-Agent': 'HistoricPlacesMapApp/1.0' }
            });
            const osmData = await osmResponse.json();

            if (osmData.length === 0) {
                alert("Ort leider nicht gefunden.");
                return;
            }

            const lat = parseFloat(osmData[0].lat);
            const lon = parseFloat(osmData[0].lon);

            // Karte zum gefundenen Ort bewegen (Zoom-Stufe 14)
            map.setView([lat, lon], 14);
            
            // Die Bildersuche wird danach automatisch über das 'moveend'-Event gestartet
        } catch (error) {
            console.error("Fehler bei der Ortssuche:", error);
        }
    }

    // Kernfunktion: Holt die Bilder aus Wikimedia Commons basierend auf Koordinaten
    async function loadImagesForCoords(lat, lon) {
        if (isSearching) return; // Verhindert doppelte parallele Anfragen
        isSearching = true;

        const gallery = document.getElementById('gallery');
        const loader = document.getElementById('loader');
        
        loader.style.display = 'block';
        markerLayer.clearLayers(); // Alte Marker von der Karte entfernen

        try {
            // Berechne dynamisch den Radius basierend auf der Zoomstufe der Karte (in Metern)
            // Zoom 14 -> ca. 3km Radius, Zoom 11 -> ca. 15km Radius
            const currentZoom = map.getZoom();
            const radius = Math.max(1000, Math.min(25000, (20 - currentZoom) * 3000));

            const wikiUrl = `https://commons.wikimedia.org/w/api.php?action=query&list=geosearch&gsradius=${radius}&gscoord=${lat}|${lon}&gslimit=70&format=json&origin=*`;
            const wikiResponse = await fetch(wikiUrl);
            const wikiData = await wikiResponse.json();

            if (!wikiData.query || wikiData.query.geosearch.length === 0) {
                gallery.innerHTML = `<div class="status-message">Keine historischen Fotos in diesem Umkreis gefunden. Verschiebe die Karte an eine andere Stelle.</div>`;
                loader.style.display = 'none';
                isSearching = false;
                return;
            }

            // Details und URLs abfragen
            const pageIds = wikiData.query.geosearch.map(item => item.pageid).join('|');
            const detailsUrl = `https://commons.wikimedia.org/w/api.php?action=query&pageids=${pageIds}&prop=pageimages|imageinfo&iiprop=url|extmetadata|center&pithumbsize=400&format=json&origin=*`;
            
            const detailsResponse = await fetch(detailsUrl);
            const detailsData = await detailsResponse.json();
            const pages = detailsData.query.pages;

            let htmlContent = '';
            let imageCount = 0;

            // Verbinde die Geodaten mit den Bild-Details
            const geoLookup = {};
            wikiData.query.geosearch.forEach(item => {
                geoLookup[item.pageid] = { lat: item.lat, lon: item.lon };
            });

            for (const id in pages) {
                const page = pages[id];
                if (!page.thumbnail) continue;

                const title = page.title.replace('File:', '');
                const metadata = page.imageinfo && page.imageinfo[0].extmetadata;
                const description = metadata && metadata.ImageDescription ? metadata.ImageDescription.value : '';
                const date = metadata && metadata.DateTimeOriginal ? metadata.DateTimeOriginal.value : 'Unbekannt';
                const originalUrl = page.imageinfo ? page.imageinfo[0].descriptionurl : '#';

                // Historischer Filter über reguläre Ausdrücke
                const isHistoric = [title, description].some(text => 
                    /historisch|history|18\d{2}|1900|1910|1920|1930|1940|1950|1960|1970|altes|old|postcard|postkarte|ansichtskarte|damals|krieg|schloss|stadtansicht/i.test(text)
                );

                if (isHistoric) {
                    imageCount++;
                    const imgSrc = page.thumbnail.source;
                    const cleanDesc = description.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 100) + "...";
                    const itemLat = geoLookup[id].lat;
                    const itemLon = geoLookup[id].lon;

                    // 1. Karte erweitern: Marker für das Bild setzen
                    const marker = L.marker([itemLat, itemLon]);
                    marker.bindPopup(`
                        <strong>${title.substring(0, 30)}...</strong><br>
                        <img src="${imgSrc}" class="popup-img"><br>
                        <a href="${originalUrl}" target="_blank">Details ansehen</a>
                    `);
                    markerLayer.addLayer(marker);

                    // 2. Galerie-HTML generieren
                    htmlContent += `
                        <div class="card" id="card-${id}">
                            <img src="${imgSrc}" alt="${title}" loading="lazy" onclick="zoomToMarker(${itemLat}, ${itemLon}, ${id})">
                            <div class="card-content">
                                <div class="card-title">${title.substring(0, 50)}...</div>
                                <div class="card-meta">
                                    <p>${cleanDesc !== '...' ? cleanDesc : 'Keine Beschreibung vorhanden.'}</p>
                                    <p><strong>Jahr/Datum:</strong> ${date.substring(0, 20)}</p>
                                    <p><a href="${originalUrl}" target="_blank">Auf Wikimedia Commons ↗</a></p>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            loader.style.display = 'none';

            if (imageCount === 0) {
                gallery.innerHTML = `<div class="status-message">In diesem Bereich wurden keine eindeutig historischen Aufnahmen gefunden. Zoome weiter hinein oder verschiebe die Karte auf ein Stadtzentrum.</div>`;
            } else {
                gallery.innerHTML = htmlContent;
            }

        } catch (error) {
            console.error(error);
            loader.style.display = 'none';
            gallery.innerHTML = `<div class="status-message">Fehler beim Laden der Bilddaten.</div>`;
        } finally {
            isSearching = false;
        }
    }

    // Hilfsfunktion: Klickt man in der Galerie auf ein Bild, springt die Karte dorthin und öffnet den Marker
    function zoomToMarker(lat, lon, id) {
        map.setView([lat, lon], 16);
        // Sucht den passenden Marker auf der Karte und öffnet sein Popup
        markerLayer.eachLayer(function(layer) {
            if (layer.getLatLng().lat === lat && layer.getLatLng().lng === lon) {
                layer.openPopup();
            }
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
