<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brecher - Breakout Spiel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            background: #0f0f23;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            max-height: 100vh;
        }

        #gameCanvas {
            display: block;
            border-radius: 10px;
            background: #0f0f23;
        }

        #scoreBoard {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        #gameOver, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            min-width: 300px;
        }

        #gameOver h2, #startScreen h1 {
            margin-bottom: 15px;
            font-size: 32px;
        }

        #startScreen h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #gameOver p, #startScreen p {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            margin: 5px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        #powerupIndicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }

        #controlsHint {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="scoreBoard">
            <div>Punkte: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
            <div>Leben: <span id lives">3</span></div>
        </div>
        <div id="powerupIndicator"></div>
        <div id="controlsHint">👆 Touch oder Maus zum Steuern</div>
        <div id="startScreen">
            <h1>🎮 BRECHER</h1>
            <p><strong>Breakout Spiel</strong></p>
            <p>📱 Touch/Maus: Schiebe den Schläger</p>
            <p>⌨️ Tastatur: Pfeiltasten links/rechts, Leertaste zum Schießen</p>
            <p>💥 Sammle Powerups!</p>
            <button class="btn" id="startBtn">SPIEL STARTEN</button>
        </div>
        <div id="gameOver">
            <h2 id="gameOverTitle">Spiel Vorbei!</h2>
            <p>Punkte: <span id="finalScore">0</span></p>
            <p>Level: <span id="finalLevel">1</span></p>
            <button class="btn" id="restartBtn">NOCHMAL SPIELEN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const livesElement = document.getElementById('lives');
        const finalScoreElement = document.getElementById('finalScore');
        const finalLevelElement = document.getElementById('finalLevel');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const powerupIndicator = document.getElementById('powerupIndicator');

        // Responsive canvas
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 800);
            const maxHeight = Math.min(window.innerHeight - 20, 600);
            const aspectRatio = 800 / 600;
            
            let width = maxWidth;
            let height = width / aspectRatio;
            
            if (height > maxHeight) {
                height = maxHeight;
                width = height * aspectRatio;
            }
            
            canvas.width = width;
            canvas.height = height;
            gameContainer.style.width = width + 'px';
            gameContainer.style.height = (height + 50) + 'px';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game objects
        const paddle = {
            width: 100,
            height: 15,
            x: 0,
            y: 0,
            speed: 8,
            color: '#667eea',
            originalWidth: 100
        };

        const ball = {
            x: 0,
            y: 0,
            radius: 8,
            dx: 4,
            dy: -4,
            speed: 5,
            color: '#ffffff'
        };

        const brickConfig = {
            width: 0,
            height: 0,
            rows: 5,
            cols: 10,
            padding: 5,
            offsetTop: 50,
            offsetLeft: 0,
            colors: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff']
        };

        let bricks = [];
        let score = 0;
        let level = 1;
        let lives = 3;
        let gameRunning = false;
        let animationId = null;

        // Powerups
        let powerups = [];
        let activePowerups = {
            widePaddle: 0,
            multiBall: 0,
            laser: 0
        };
        let balls = [];
        let lasers = [];

        // Input
        let rightPressed = false;
        let leftPressed = false;
        let spacePressed = false;
        let touchX = null;
        let isTouching = false;

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
            else if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
            else if (e.key === ' ' || e.key === 'Spacebar') {
                spacePressed = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
            else if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
            else if (e.key === ' ' || e.key === 'Spacebar') spacePressed = false;
        });

        // Touch controls - improved
        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
            isTouching = false;
        });

        function handleTouch(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            if (touch) {
                touchX = touch.clientX - rect.left;
                isTouching = true;
            }
        }

        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;
        });

        canvas.addEventListener('click', (e) => {
            if (gameRunning && activePowerups.laser > 0) {
                shootLaser();
            }
        });

        function initBricks() {
            bricks = [];
            brickConfig.width = (canvas.width - brickConfig.offsetLeft * 2 - brickConfig.padding * (brickConfig.cols - 1)) / brickConfig.cols;
            brickConfig.height = 20;
            
            for (let c = 0; c < brickConfig.cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickConfig.rows; r++) {
                    bricks[c][r] = {
                        x: 0,
                        y: 0,
                        status: 1,
                        color: brickConfig.colors[r % brickConfig.colors.length],
                        health: 1
                    };
                }
            }
        }

        function resetBall() {
            balls = [{
                x: canvas.width / 2,
                y: canvas.height - 50,
                dx: ball.speed * (Math.random() > 0.5 ? 1 : -1),
                dy: -ball.speed,
                radius: 8,
                color: '#ffffff',
                speed: ball.speed
            }];
            paddle.x = (canvas.width - paddle.width) / 2;
        }

        function initGame() {
            paddle.x = (canvas.width - paddle.width) / 2;
            paddle.y = canvas.height - paddle.height - 10;
            paddle.width = paddle.originalWidth;
            resetBall();
            initBricks();
            powerups = [];
            lasers = [];
            activePowerups = { widePaddle: 0, multiBall: 0, laser: 0 };
            score = 0;
            level = 1;
            lives = 3;
            updateUI();
            updatePowerupIndicator();
        }

        function updateUI() {
            scoreElement.textContent = score;
            levelElement.textContent = level;
            livesElement.textContent = lives;
        }

        function updatePowerupIndicator() {
            let text = '';
            if (activePowerups.widePaddle > 0) text += '🔥 Breiter Schläger ';
            if (activePowerups.multiBall > 0) text += '⚡ Multi-Ball ';
            if (activePowerups.laser > 0) text += '💥 Laser ';
            powerupIndicator.textContent = text;
        }

        function spawnPowerup(x, y) {
            const types = ['wide', 'multiball', 'laser', 'life'];
            const type = types[Math.floor(Math.random() * types.length)];
            powerups.push({
                x: x,
                y: y,
                width: 20,
                height: 20,
                type: type,
                speed: 2,
                color: type === 'wide' ? '#00ff00' : type === 'multiball' ? '#ffff00' : type === 'laser' ? '#ff00ff' : '#ff0000'
            });
        }

        function applyPowerup(type) {
            if (type === 'wide') {
                activePowerups.widePaddle = 600; // 10 seconds at 60fps
                paddle.width = paddle.originalWidth * 1.5;
            } else if (type === 'multiball') {
                activePowerups.multiBall = 600;
                const mainBall = balls[0];
                if (mainBall) {
                    balls.push({...mainBall, dx: mainBall.dx * 0.8, dy: -mainBall.dy});
                    balls.push({...mainBall, dx: -mainBall.dx * 0.8, dy: -mainBall.dy});
                }
            } else if (type === 'laser') {
                activePowerups.laser = 600;
            } else if (type === 'life') {
                lives++;
                updateUI();
            }
            updatePowerupIndicator();
        }

        function shootLaser() {
            lasers.push({
                x: paddle.x + paddle.width / 2 - 2,
                y: paddle.y,
                width: 4,
                height: 10,
                speed: 8
            });
        }

        function drawBall(b) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.closePath();
            
            // Glow
            ctx.shadowBlur = 10;
            ctx.shadowColor = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawPaddle() {
            const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
            gradient.addColorStop(0, '#8b9cf7');
            gradient.addColorStop(1, '#5a6fd6');
            
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.closePath();
            
            // Laser indicator
            if (activePowerups.laser > 0) {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(paddle.x + 5, paddle.y - 3, 4, 6);
                ctx.fillRect(paddle.x + paddle.width - 9, paddle.y - 3, 4, 6);
            }
        }

        function drawBricks() {
            for (let c = 0; c < brickConfig.cols; c++) {
                for (let r = 0; r < brickConfig.rows; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickConfig.width + brickConfig.padding) + brickConfig.offsetLeft;
                        const brickY = r * (brickConfig.height + brickConfig.padding) + brickConfig.offsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickConfig.width, brickConfig.height, 5);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                        
                        // Highlight
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickConfig.width, brickConfig.height / 2, 5);
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function drawPowerups() {
            powerups.forEach(p => {
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.width, p.height, 4);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.closePath();
                
                // Icon
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                const icon = p.type === 'wide' ? '↔' : p.type === 'multiball' ? '●' : p.type === 'laser' ? '↑' : '♥';
                ctx.fillText(icon, p.x + p.width/2, p.y + p.height/2 + 4);
            });
        }

        function drawLasers() {
            lasers.forEach(l => {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(l.x, l.y, l.width, l.height);
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#ff00ff';
                ctx.fillRect(l.x, l.y, l.width, l.height);
                ctx.shadowBlur = 0;
            });
        }

        function collisionDetection() {
            // Ball-brick collision for all balls
            balls.forEach(b => {
                for (let c = 0; c < brickConfig.cols; c++) {
                    for (let r = 0; r < brickConfig.rows; r++) {
                        const br = bricks[c][r];
                        if (br.status === 1) {
                            if (b.x > br.x && b.x < br.x + brickConfig.width &&
                                b.y > br.y && b.y < br.y + brickConfig.height) {
                                b.dy = -b.dy;
                                br.status = 0;
                                score += 10 * level;
                                updateUI();
                                
                                // Spawn powerup chance (20%)
                                if (Math.random() < 0.2) {
                                    spawnPowerup(br.x + brickConfig.width/2, br.y + brickConfig.height/2);
                                }
                                
                                // Check win
                                let remainingBricks = 0;
                                for (let cc = 0; cc < brickConfig.cols; cc++) {
                                    for (let rr = 0; rr < brickConfig.rows; rr++) {
                                        if (bricks[cc][rr].status === 1) remainingBricks++;
                                    }
                                }
                                if (remainingBricks === 0) {
                                    nextLevel();
                                }
                            }
                        }
                    }
                }
            });

            // Laser-brick collision
            lasers.forEach((l, lIndex) => {
                for (let c = 0; c < brickConfig.cols; c++) {
                    for (let r = 0; r < brickConfig.rows; r++) {
                        const br = bricks[c][r];
                        if (br.status === 1) {
                            if (l.x > br.x && l.x < br.x + brickConfig.width &&
                                l.y > br.y && l.y < br.y + brickConfig.height) {
                                br.status = 0;
                                score += 10 * level;
                                lasers.splice(lIndex, 1);
                                updateUI();
                            }
                        }
                    }
                }
            });
        }

        function nextLevel() {
            level++;
            ball.speed += 0.5;
            brickConfig.rows = Math.min(brickConfig.rows + 1, 8);
            initBricks();
            resetBall();
            powerups = [];
            lasers = [];
            updateUI();
        }

        function update() {
            // Touch control
            if (touchX !== null) {
                paddle.x = touchX - paddle.width / 2;
            }
            
            // Keyboard control
            if (rightPressed && paddle.x < canvas.width - paddle.width) {
                paddle.x += paddle.speed;
            } else if (leftPressed && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
            
            // Keep paddle in bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x > canvas.width - paddle.width) paddle.x = canvas.width - paddle.width;
            
            // Update powerup timersaldi
            Object.keys(activePowerups).forEach(key => {
                if (activePowerups[key] > 0) {
                    activePowerups[key]--;
                    if (activePowerups[key] === 0) {
                        if (key === 'widePaddle') paddle.width = paddle.originalWidth;
                        updatePowerupIndicator();
                    }
                }
            });
            
            // Update balls
            balls.forEach((b, index) => {
                b.x += b.dx;
                b.y += b.dy;
                
                // Wall collision
                if (b.x + b.radius > canvas.width || b.x - b.radius < 0) {
                    b.dx = -b.dx;
                }
                if (b.y - b.radius < 0) {
                    b.dy = -b.dy;
                }
                
                // Paddle collision
                if (b.y + b.radius > paddle.y &&
                    b.x > paddle.x &&
                    b.x < paddle.x + paddle.width) {
                    b.dy = -Math.abs(b.dy);
                    
                    const hitPoint = b.x - (paddle.x + paddle.width / 2);
                    b.dx = hitPoint * 0.15;
                    
                    const speed = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
                    if (speed < b.speed) {
                        b.dx = (b.dx / speed) * b.speed;
                        b.dy = (b.dy / speed) * b.speed;
                    }
                }
                
                // Bottom collision
                if (b.y - b.radius > canvas.height) {
                    if (balls.length > 1) {
                        balls.splice(index, 1);
                    } else {
                        lives--;
                        updateUI();
                        
                        if (lives === 0) {
                            gameOver();
                        } else {
                            resetBall();
                        }
                    }
                }
            });
            
            // Update powerups
            powerups.forEach((p, index) => {
                p.y += p.speed;
                
                // Paddle collision
                if (p.y + p.height > paddle.y &&
                    p.x > paddle.x &&
                    p.x < paddle.x + paddle.width) {
                    applyPowerup(p.type);
                    powerups.splice(index, 1);
                }
                
                // Remove if off screen
                if (p.y > canvas.height) {
                    powerups.splice(index, 1);
                }
            });
            
            // Update lasers
            lasers.forEach((l, index) => {
                l.y -= l.speed;
                if (l.y < 0) {
                    lasers.splice(index, 1);
                }
            });
            
            // Space to shoot
            if (spacePressed && activePowerups.laser > 0) {
                shootLaser();
                spacePressed = false; // Prevent continuous shooting
            }
            
            collisionDetection();
        }

        function draw() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            balls.forEach(b => drawBall(b));
            drawPaddle();
            drawPowerups();
            drawLasers();
        }

        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            initGame();
            gameRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.textContent = score;
            finalLevelElement.textContent = level;
            gameOverTitle.textContent = score >= 500 ? '🎉 Gewonnen!' : '😞 Spiel Vorbei!';
            gameOverScreen.classList.remove('hidden');
        }

        // Event listeners wrappers to prevent default
        startBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            startGame();
        });
        restartBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            startGame();
        });

        // Prevent scrolling
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
