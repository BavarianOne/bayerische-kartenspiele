<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brecher - Breakout Spiel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            background: #1a1a2e;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            max-height: 100vh;
        }

        #gameCanvas {
            display: block;
            border-radius: 10px;
            background: #0f0f23;
        }

        #scoreBoard {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 20;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        #gameOver h2 {
            margin-bottom: 15px;
            font-size: 32px;
        }

        #gameOver p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        #restartBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #restartBtn:active {
            transform: scale(0.95);
        }

        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        #startScreen h1 {
            margin-bottom: 20px;
            font-size: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #startScreen p {
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.6;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="scoreBoard">
            <div>Punkte: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
            <div>Leben: <span id="lives">3</span></div>
        </div>
        <div id="startScreen">
            <h1>🎮 BRECHER</h1>
            <p><strong>Breakout Spiel</strong></p>
            <p>📱 Touch-Steuerung: Schiebe den Schläger</p>
            <p>⌨️ Tastatur: Pfeiltasten links/rechts</p>
            <p>Zerstöre alle Blöcke!</p>
            <button id="startBtn">SPIEL STARTEN</button>
        </div>
        <div id="gameOver">
            <h2 id="gameOverTitle">Spiel Vorbei!</h2>
            <p>Punkte: <span id="finalScore">0</span></p>
            <p>Level: <span id="finalLevel">1</span></p>
            <button id="restartBtn">NOCHMAL SPIELEN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const livesElement = document.getElementById('lives');
        const finalScoreElement = document.getElementById('finalScore');
        const finalLevelElement = document.getElementById('finalLevel');
        const gameOverTitle = document.getElementById('gameOverTitle');

        // Responsive canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 800);
            const maxHeight = Math.min(window.innerHeight - 20, 600);
            const aspectRatio = 800 / 600;
            
            let width = maxWidth;
            let height = width / aspectRatio;
            
            if (height > maxHeight) {
                height = maxHeight;
                width = height * aspectRatio;
            }
            
            canvas.width = width;
            canvas.height = height;
            gameContainer.style.width = width + 'px';
            gameContainer.style.height = (height + 50) + 'px';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game objects
        const paddle = {
            width: 100,
            height: 15,
            x: 0,
            y: 0,
            speed: 8,
            color: '#667eea'
        };

        const ball = {
            x: 0,
            y: 0,
            radius: 8,
            dx: 4,
            dy: -4,
            speed: 5,
            color: '#ffffff'
        };

        const brick = {
            width: 0,
            height: 0,
            rows: 5,
            cols: 10,
            padding: 5,
            offsetTop: 50,
            offsetLeft: 0,
            colors: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff']
        };

        let bricks = [];
        let score = 0;
        let level = 1;
        let lives = 3;
        let gameRunning = false;
        let animationId = null;

        // Input handling
        let rightPressed = false;
        let leftPressed = false;
        let touchX = null;

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = true;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = false;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = false;
            }
        });

        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchX = e.touches[0].clientX - rect.left;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
        });

        // Mouse controls (for testing on desktop)
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;
        });

        function initBricks() {
            bricks = [];
            brick.width = (canvas.width - brick.offsetLeft * 2 - brick.padding * (brick.cols - 1)) / brick.cols;
            brick.height = 20;
            
            for (let c = 0; c < brick.cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < brick.rows; r++) {
                    bricks[c][r] = {
                        x: 0,
                        y: 0,
                        status: 1,
                        color: brick.colors[r % brick.colors.length]
                    };
                }
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -ball.speed;
            paddle.x = (canvas.width - paddle.width) / 2;
        }

        function initGame() {
            paddle.x = (canvas.width - paddle.width) / 2;
            paddle.y = canvas.height - paddle.height - 10;
            resetBall();
            initBricks();
            score = 0;
            level = 1;
            lives = 3;
            updateUI();
        }

        function updateUI() {
            scoreElement.textContent = score;
            levelElement.textContent = level;
            livesElement.textContent = lives;
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();
            
            // Glow effect
            ctx.shadowBlur = 10;
            ctx.shadowColor = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fillStyle = paddle.color;
            ctx.fill();
            ctx.closePath();
            
            // Gradient effect
            const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
            gradient.addColorStop(0, '#8b9cf7');
            gradient.addColorStop(1, '#5a6fd6');
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function drawBricks() {
            for (let c = 0; c < brick.cols; c++) {
                for (let r = 0; r < brick.rows; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brick.width + brick.padding) + brick.offsetLeft;
                        const brickY = r * (brick.height + brick.padding) + brick.offsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brick.width, brick.height, 5);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                        
                        // Highlight
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brick.width, brick.height / 2, 5);
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function collisionDetection() {
            for (let c = 0; c < brick.cols; c++) {
                for (let r = 0; r < brick.rows; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + brick.width &&
                            ball.y > b.y && ball.y < b.y + brick.height) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score += 10 * level;
                            updateUI();
                            
                            // Check win
                            if (score === brick.rows * brick.cols * 10 * level) {
                                nextLevel();
                            }
                        }
                    }
                }
            }
        }

        function nextLevel() {
            level++;
            ball.speed += 0.5;
            brick.rows = Math.min(brick.rows + 1, 8);
            initBricks();
            resetBall();
            updateUI();
        }

        function update() {
            // Touch control
            if (touchX !== null) {
                paddle.x = touchX - paddle.width / 2;
            }
            
            // Keyboard control
            if (rightPressed && paddle.x < canvas.width - paddle.width) {
                paddle.x += paddle.speed;
            } else if (leftPressed && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
            
            // Keep paddle in bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x > canvas.width - paddle.width) paddle.x = canvas.width - paddle.width;
            
            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // Wall collision
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }
            
            // Paddle collision
            if (ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                ball.dy = -ball.dy;
                
                // Add angle based on where ball hits paddle
                const hitPoint = ball.x - (paddle.x + paddle.width / 2);
                ball.dx = hitPoint * 0.15;
                
                // Ensure minimum speed
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                if (speed < ball.speed) {
                    ball.dx = (ball.dx / speed) * ball.speed;
                    ball.dy = (ball.dy / speed) * ball.speed;
                }
            }
            
            // Bottom collision (lose life)
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                updateUI();
                
                if (lives === 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }
            
            collisionDetection();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw game objects
            drawBricks();
            drawBall();
            drawPaddle();
        }

        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            initGame();
            gameRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.style.display = 'none';
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.textContent = score;
            finalLevelElement.textContent = level;
            gameOverTitle.textContent = score >= 500 ? '🎉 Gewonnen!' : '😞 Spiel Vorbei!';
            gameOverScreen.style.display = 'block';
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Prevent scrolling on mobile
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
